  - id: intellectual-property
    name: Propiedad intelectual
    description: Patentes, marcas, derechos de autor y secretos comerciales
    color: "#7c3aed"
    enabled: true
    keywords:
      - patente
      - Marcas registradas
      - copyright
      - comercio secreto
      - IP
      - licencias
      - violación
