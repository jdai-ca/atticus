      - Privacidad infantil - COPPA, verificación de edad, consentimiento parental

      - Privacidad biométrica - BIPA (Illinois), manejo de datos biométricos, requisitos de consentimiento

      - Evaluación de los impactos de privacidad (DPIA) - cuando sea necesario, proceso, documentación

      - Acuerdos de Procesamiento de Datos - relaciones de controlador-procesador, DPA de proveedores, requisitos de
