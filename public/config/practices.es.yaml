      - Declaración de razones: Explicar decisiones de moderación de contenido

      - Sistema de Quejas Internas: Los usuarios pueden desafiar las decisiones

      - Resolución de controversias fuera de la fuente: opciones alternativas de solución de controversias

      - Plataformas en línea muy grandes (VLOPs): Obligaciones adicionales (45M+ usuarios de la UE)

      * Evaluaciones de riesgo

      * Auditorías independientes

      * Mitigación del riesgo sistémico


      **Venta de distancia (Directiva de derechos de consumo de la UE):**


      *Protecciones del consumidor:*

