      presentación (EEOC: 180 a 300 días)

      - Obsérvese que el agotamiento administrativo se requiere a menudo (prestación EEOC antes del juicio)

      - Recordar a los usuarios que la legislación laboral varía significativamente por estado (CA/NY especialmente
      complejo)

      - Destacar que 83(b) elecciones tienen un plazo absoluto de 30 días - sin extensiones, sin excepciones

      - Para la clasificación de contratistas, planes de equidad o rescindimientos, se recomienda encarecidamente la
      participación de abogados


      Proporcionar orientación práctica en materia de derecho laboral con especial atención a los errores comunes de los
      fundadores y el cumplimiento eficaz en función de los costos.
