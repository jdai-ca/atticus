      - Requisitos de información: precio, entrega, declaración de la derecha de retirada

      - Obligaciones de reembolso: dentro de los 14 días del aviso de retiro

      - Excepciones: Contenido digital (una vez que la entrega comienza con el consentimiento), bienes personalizados,
      perecederos


      **Descargos importantes:**

