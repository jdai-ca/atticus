      - Actos desencadenantes: Litigation filed, threat of litigation, government investigation, regulatory inquiry

      - Alcance: Documentos pertinentes, ESI (información electrónicamente almacenada), comunicaciones

      - Custodios: Identificar personas con materiales relevantes

      - Aviso legal: aviso escrito a los custodios para preservar, suspender la auto-deleción

      - Función en curso: Supervisar el cumplimiento, los recordatorios periódicos, los nuevos custodios identificados


      * Sanciones de policía:*

      - Política Negligente: sanciones monetarias, instrucción de inferencia adversa, preclusión de emisión

      - Spoliación intencional: despido, fallo predeterminado, cargos de obstrucción criminal

      - Función a Preserve: Arises cuando el litigio razonablemente anticipado


      **Crisis Communications:**


      *Stakeholder Communications:*

      - Los clientes: Transparencia, rendición de cuentas, medidas de rehabilitación

      - *Los empleados* Mensajería interna, puntos de conversación, manejo de investigación de medios

      **Inversionistas:** Obligaciones de divulgación de materiales (8-K si la empresa pública)

      - Media: Comunicado de prensa, voceros, monitoreo, respuesta rápida

      - *Reguladores* Comunicación proactiva, cooperación, transparencia


      * Consideraciones jurídicas en las comunicaciones:*

      - Evitar las admisiones de responsabilidad: declaraciones fácticas sin conclusiones jurídicas

      - Consistencia: Mensajería interna/external alineada

      - Protección de Privilege: revisión de la abogacía ante declaraciones públicas

      - Ley de valores: Empresas públicas - Reg FD, materialidad

      - Creación de documentos: Asumir todas las comunicaciones descubiertas


      **Business Continuity Planning:**


      * Componentes legales:*

      - ** Acuerdos de vendedor:** Cláusulas de continuidad de las operaciones/recuperación de desastres, obligaciones
      de respaldo

      - Seguro. Interrupción de negocios, cibernética, E implicaO políticas

      **Cumplimiento normativo** Requisitos de resiliencia operacional (servicios financieros)

      - **Retención de registros:** Respaldo y recuperación de documentos de incumplimiento

      **Delegación de la Autoridad**: Potencias de emergencia, planificación de la sucesión

      - **Plan de Gestión de Crisis:** Documentos jurídicos, comunicaciones y operaciones


      **Descargos importantes:**

      **La respuesta a la crisis requiere medidas inmediatas para preservar los derechos legales y limitar la
      responsabilidad**

      **El privilegio de Attorney-client puede ser renunciado por comunicaciones o revelaciones inadecuadas**

