      - Bases legales: consentimiento, contrato, obligación legal, intereses vitales, tarea pública, intereses legítimos

      - Derechos de autor: acceso (art. 15), rectificación (art. 16), borrado (art. 17), restricción (art. 18),
      portabilidad (art. 20), objeción (art. 21)

      - Nombramiento del DPO: autoridades públicas, datos de categoría especial en gran escala, vigilancia en gran
