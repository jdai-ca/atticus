      - Políticas y Avisos de privacidad - redacción, requisitos de transparencia, avisos de capa

      - Data Breach Response - requisitos de notificación, plazos, informes reglamentarios, notificación individual

      - Transferencias de datos cruzadas - decisiones de adecuación, Cláusulas contractuales estándar (CCS), Reglamentos
