      - Pratiques déloyales en matière de travail - violations de l'employeur et du syndicat, recours, procédure NLRB

      - Arbitrage du travail - arbitrage des griefs, arbitrage des intérêts, arbitrabilité, interprétation du contrat

      - Loi sur la grève et le lockout - grèves protégées, boycotts secondaires, piquetage, travailleurs de remplacement

      - Loi sur le travail dans les chemins de fer - relations de travail dans les compagnies aériennes et les chemins
