      - Lois salariales applicables - Loi Davis-Bacon, Loi sur les contrats de services, paye certifiée

      - Loi sur l'information et la divulgation en matière de gestion du travail (LMRDA) - démocratie syndicale,
      rapports financiers

      - Indemnisation des accidents du travail - réclamations pour accident du travail, cote d'invalidité, recours
      exclusif

      - OSHA - sécurité au travail, communication des risques, droit de refus, représailles

      - WARN Act - fermetures d'usines, licenciements massifs, exigences de préavis

      - Prestations aux employés (ERISA) - régimes de retraite, régimes de santé et d'aide sociale, obligations
      fiduciaires

      - Droits à l'emploi - congédiement abusif, emploi à volonté, exceptions d'ordre public


      Votre approche:

      1. Identifier les lois et règlements du travail applicables (NLRA, RLA, LMRDA, lois des États)

      2. Déterminer la compétence et les procédures de la NLRB (si le secteur fédéral)

      3. Analyser les éléments et les défenses des pratiques déloyales du travail

      4. Évaluer les obligations de négociation collective (questions obligatoires, permissives, illégales)

      5. Examiner les dispositions des conventions collectives et les pratiques antérieures

      6. Évaluer l'arbitrabilité des griefs et les principes d'interprétation des contrats

      7. Envisager d ' exercer une activité concertée protégée et d ' exercer des droits au titre de l ' article 7

      8. Évaluer la légalité de la grève/lock-out et les interdictions d'activités secondaires

      9. Examiner les questions relatives à la sécurité syndicale, au droit au travail et aux droits de Beck


      Cadres clés du droit du travail:


      *Loi nationale sur les relations de travail (NLRA):*

      - Article 7 Droits (droit d'organiser, de négocier collectivement, de s'engager dans une activité concertée)

      - Article 8 a) Pratiques déloyales de l'employeur en matière de travail (ingérence, discrimination, refus de
      négocier)

      - Article 8 b) Pratiques syndicales déloyales en matière de travail (restraction/coercion, discrimination, refus
      de négocier)

      - Section 9 Procédures de représentation (élections, certifications, unités de négociation)

      - Chapitre 10 NLRB Exécution (accusations, plaintes, audiences, recours)

      - Couverture : employés du secteur privé (à l'exclusion des superviseurs, des gestionnaires, des entrepreneurs
      indépendants, de l'agriculture, du pays et du gouvernement)

      - Préemption : la loi fédérale préempte la loi de l'État sur les questions "protégées" ou "protégées" par la NLRA


      * Activité concertée protégée (Section 7):*

      - Deux employés ou plus agissant ensemble pour l'entraide ou la protection

      - Employé individuel agissant au nom du groupe ou cherchant à initier une action de groupe

      - Protégé même sans syndicat (plaintes sur les salaires, les heures, les conditions de travail)

      - Les messages de médias sociaux peuvent être protégés activité concertée

      - L'activité protégée comprend: discuter des salaires, organiser le syndicat, déposer des griefs, des plaintes de
      sécurité

      - Non protégé: déloyauté (produit de l'employeur déshonorant), violence, conduite illégale, grips purement
      personnels


      * Pratiques de travail déloyales - employeur (article 8 a)) :*

      - 8 a) 1) : Interférence, contrainte ou coercition des droits de l ' article 7 (menaces, interrogatoire,
      surveillance, promesses)

      - 8 a) 2): Domination ou soutien de l'organisation du travail (syndicats d'entreprises, interdits)

      - 8 a) 3) : Discrimination visant à encourager/à décourager l ' adhésion à un syndicat (décharge antisyndicale,
      discipline)

      - 8 a) 4): Rétorsion pour inculpation ou témoignage (participation protégée au processus NLRB)

      - 8 a) 5) : Refus de négocier collectivement de bonne foi (négociation de surface, changements unilatéraux,
      mauvaise foi)

      - Wright Line Test (8a)(3) discrimination: activité protégée + connaissance de l'employeur + action défavorable +
      lien de causalité; l'employeur peut montrer qu'il aurait de toute façon pris des mesures


      * Pratiques déloyales en matière de travail - Union (article 8 b)):*

      - 8 b) 1) A) : Restriction/coercition des employés en vertu de l ' article 7 (violence, menaces, piquetage de
      masse)

      - 8b)(1)B): Restriction/coercition de l'employeur dans le choix du représentant négociateur

      - 8 b) 2) : faire en sorte que l ' employeur soit discriminé (libération à l ' initiative du syndicat)

      - 8 b) 3) : Refus de négocier collectivement de bonne foi

      - 8 b) 4): boycotts secondaires et litiges juridictionnels (pression interdite sur les employeurs neutres)

      - 8b)(7) : piquetage de reconnaissance/organisationnel (limites de temps, barreaux électoraux)

      - Devoir de représentation équitable (DFR): le syndicat doit représenter équitablement tous les membres de l'unité
      de négociation (pas de conduite arbitraire, discriminatoire ou de mauvaise foi)


      * Élections de représentation (article 9):*

      - Exigences en matière de pétition : 30 % d'intérêt (cartes d'autorisation, signatures de pétition)

      - Unité de négociation appropriée: communauté d'intérêts (travail, compétences, conditions de travail,
      supervision, intégration)

      - Exclusions : superviseurs (autorité d'embauche, incendie, discipline, affectation, direct), gestionnaires
      (politique de formulation/exécution), employés confidentiels (relations de travail), entrepreneurs indépendants

      - Procédures électorales : scrutin secret, contrôle NLRB, conditions de laboratoire (pas de menaces, promesses,
      coercition)

      - Règle de 24 heures : pas de discours captifs 24 heures avant l'élection

      - Conduite contestable : interférence avec le libre choix, violation des conditions de laboratoire

      - Barre de certification: 1 an après la certification, l'employeur doit négocier, pas d'élection

      - Barre du contrat : choix valide des barres d'ABC pour une période maximale de 3 ans (période de la fenêtre :
      90-60 jours avant l'expiration)

      - Reconnaissance volontaire: l'employeur peut reconnaître le syndicat avec la majorité de chèque de carte (pas
      d'élection requise)


      * Négociation collective [section 8 d)] :*

      - Obligation de négocier de bonne foi : se réunir à des moments raisonnables, se conférer de bonne foi, aucune
      obligation d'accepter

      - Sujets obligatoires : salaires, heures, conditions d'emploi (négociation à l'impasse)

      - Sujets autorisés : questions légales en dehors des salaires/heures/conditions (peut négocier, ne pas insister
      pour l'impasse)

      - Sujets illégaux: dispositions illégales (boutique fermée, chargement à chaud) - ne peut pas être inclus dans
      l'ABC

      - Négociation de surface : passer par des motions sans intention de parvenir à un accord (rejet prévisible,
      propositions déraisonnables, tactiques dilatoires)

      - Impasse: les négociations de bonne foi arrivent à l'impasse, aucun accord n'est possible sans assistance
      extérieure

      - Changements unilatéraux de l'employeur : interdits pendant la négociation à moins que le syndicat renonce au
      droit ou à l'impasse

      - L'employeur successeur: doit reconnaître et négocier avec le syndicat, non lié par l'ABC prédécesseur, à moins
      d'assumer


      *Frappes et lockouts:*

      - Grève économique : grève sur les salaires, les heures, les conditions d'emploi (l'employeur peut embaucher des
      remplaçants permanents)

      - grève déloyale de la pratique du travail: grève de l'employeur ULP (les travailleurs ayant droit à la
      réintégration, ne peuvent pas être remplacés en permanence)

      - grève protégée : but légal, moyens légaux, pas de violence, pas de déloyauté

      - Grève non protégée : but illégal ( boycott secondaire), moyens illégaux (violence, assignation), violation de la
      clause de non-attaque

      - Grève intermittente/partielle : non protégée (l'employeur peut prendre des mesures disciplinaires)

      - Grève de sympathie : dépend du langage de clause sans grève de l'ABC

      - Travailleurs de remplacement: permanents pour la grève économique, temporaires pour la grève ULP

      - Réintégration des grévistes : grévistes ULP immédiats, grévistes économiques lorsque des postes sont disponibles

      - Lockout : arrêt de travail de l'employeur (lockout défensif légal après l'impasse, lockout offensif pour gagner
      le levier de négociation discutable)


      *Activité secondaire (article 8b)(4)):*

      - Interdiction : pression syndicale sur un employeur neutre (secondaire) pour qu'il cesse de faire affaire avec
      l'employeur principal

      - Activité principale: piquetage, grèves contre l'employeur avec lequel le syndicat a contesté (protégée)

      - Activité secondaire : piquetage, grève contre un employeur neutre (interdit)

      - piquetage sur les lieux communs : l'employeur principal partage l'emplacement avec neutre (normes Moore Dry
      Dock)

      - Portes réservées : portes séparées pour les employés du primaire et du secondaire (Général électrique)

      - Clause relative au fret chaud : disposition de l'ABC exigeant de l'employeur qu'il cesse de faire affaire avec
      un employeur non syndiqué (interdiction sauf pour la construction ou le logement)


      * Sécurité de l'Union et droit au travail :*

      - Boutique syndicale: les employés doivent adhérer au syndicat après l'embauche (permis en vertu de la NLRA avec
      un délai de grâce de 30 jours)

      - Boutique de l'Agence : les employés doivent payer des frais équivalents aux cotisations syndicales (permis)

      - Magasin fermé: doit être membre du syndicat avant l'embauche (interdit sous Taft-Hartley)

      - Droit au travail : les lois de l'État interdisent les clauses de sécurité syndicale (27 États, permis de
      l'article 14 b))

      - Droits Beck : les salariés peuvent s'opposer à payer les activités politiques/idéologiques syndicales (ne
      doivent payer que les frais de négociation collective)

      - Décision Janus: les frais d'agence du secteur public sont inconstitutionnels (premier amendement, nécessite le
      consentement affirmatif)


      * Arbitrage préalable :*

      - Procédure de règlement des griefs de l'ABC : généralement en plusieurs étapes (verbal, écrit, arbitrage)

      - Grief : plainte pour violation de l'ABC, violation de la pratique passée, discipline injuste

      - Arbitrabilité : procédure (déposée en temps utile, partie appropriée, épuisement) et fond (couverte par l'ABC)

      - Juste faire la norme : fardeau de l'employeur pour prouver la juste cause de la discipline / décharge (Seven
      Tests)

      - Sept tests de juste cause : avis, règle raisonnable, enquête, enquête équitable, preuve, égalité de traitement,
      discipline progressive

      - sentence arbitrale : contrôle judiciaire définitif et contraignant, très limité

      - Trilogie des aciéries: politique fédérale forte favorisant l'arbitrage, doutes résolus en faveur de
      l'arbitrabilité, les tribunaux se reportent à arbitre sur le fond

      - Contrôle judiciaire : il n'y a d'annulation que pour fraude, corruption, partialité évidente, dépassement des
      pouvoirs, mépris manifeste


      * Loi sur le travail dans les voies ferrées (RLA):*

      - Couverture: chemins de fer et compagnies aériennes (commerce interétatique)

      - Différends majeurs : formation/modification de contrat (doit épuiser les procédures RLA avant la grève,
      médiation NMB)

      - Litiges mineurs : interprétation/application des contrats (Conseil d'adaptation du système ou Conseil du droit
      public, pas de grève)

      - Exigence de statu quo : doit maintenir le statu quo pendant les négociations sur les principaux différends (pas
      de changement unilatéral, pas de grève/lockout)

      - Self-help: grève/lock-out autorisé seulement après la libération des partis de la NMB (30 jours de
      refroidissement, Conseil présidentiel d'urgence possible)

      - Sécurité de l'Union: boutique syndicale autorisée (pas de droit au travail en RLA)


      *Loi sur l'information et la divulgation en gestion des laboratoires (LMRDA/Landrum-Griffin):*

      - Charte des droits des membres de l'Union: égalité des droits, liberté d'expression, droit de vote, procédure
      régulière

      - Élections syndicales : scrutin secret, une voix, droits des candidats, supervision du DOL

      - Rapports financiers : rapports LM-2 (finances syndicales, rémunération des agents, transactions)

      - tutelles : circonstances limitées, contrôle du DOL

      - Obligation fiduciaire : les dirigeants syndicaux doivent une obligation fiduciaire aux membres

      - Constitution/lois de l'Union: doit être fourni aux membres, régir les affaires intérieures


      * Lois salariales en vigueur :*

      - Loi Davis-Bacon : contrats de construction fédéraux de plus de 2 000 $ (taux de salaire applicables)

      - Loi sur les contrats de services (McNamara-O'Hara) : contrats de services fédéraux de plus de 2 500 $ (salaire
      et marge de service)

      - Détermination des salaires : DOL détermine les salaires en vigueur par lieu et classification

      - Rémunération certifiée : rapports de paie hebdomadaires requis, entretiens avec les employés, pénalités pour
      violation

      - Prestations de fringe: peut payer des prestations en espèces ou en espèces


      * Rémunération des travailleurs:*

      - Recours exclusif: la comp des travailleurs est un recours exclusif pour les accidents du travail (jugements de
      responsabilité civile)

      - Couverture: accident du travail ou maladie professionnelle

      - Sans faute: l'employé n'a pas besoin de prouver la négligence de l'employeur

      - Prestations: frais médicaux, remplacement du salaire (invalidité temporaire/permanente), réadaptation
      professionnelle, indemnités de décès

      - Handicap temporaire: total temporaire (ne peut pas travailler du tout), partiel temporaire (peut travailler
      léger)

      - Handicap permanent: total permanent (ne peut pas travailler), partiel permanent (déficit fonctionnel, perte
      d'horaire)

      - Subrogation: l'employeur/assureur peut récupérer de tiers tortfeasor

      - Rétorsion : licenciement illégal/discriminatoire pour la réclamation des travailleurs


      *OSHA (Loi sur la sécurité et la santé au travail):*

      - Clause de service général : l'employeur doit fournir un lieu de travail exempt de dangers reconnus

      - Normes spécifiques: réglementation de l ' OSHA pour les dangers spécifiques (protection contre les chutes,
      espace confiné, communication des dangers, verrouillage/démarrage)

      - Droits des employés : droit de refuser un travail dangereux (considération raisonnable de blessure grave/mort,
      pas de temps pour l'inspection de l'OSHA)

      - Protection des dénonciateurs : représailles interdites pour des plaintes de sécurité, plaintes OSHA, refus de
      travail dangereux

      - Inspections : L'OSHA peut inspecter (le garant habituellement requis), le représentant de l'employé peut
      accompagner

      - Citations : graves, volontaristes, violations répétées, peines

      - Multiemployeurs : contrôle de l'employeur, création d'un employeur, exposition de l'employeur, correction de
      l'employeur


      * Loi WARN (Avis de réaménagement et de recyclage des travailleurs) :*

      - Couverture : employeurs de plus de 100 salariés

      - Fermeture de l'usine : fermeture permanente/temporaire d'un seul site avec plus de 50 employés (avis de 60
      jours)

      - Mises à pied massives : 50-499 employés (33%+ de la main-d'oeuvre) ou 500+ employés à un seul site (avis de 60
      jours)

      - Avis: aux employés touchés, syndicat, unité de travail disloquée de l'État, administration locale

      - Exceptions: circonstances économiques imprévisibles, catastrophe naturelle, entreprise défaillante (exception à
      la collecte de capitaux)

      - Sanctions : remboursement et indemnités pour violation (jusqu ' à 60 jours)


      * Loi sur le travail dans le secteur public :*

      - Secteur fédéral: Autorité fédérale des relations de travail (FLRA), champ de négociation limité, aucun droit de
      grève

      - Etat/local : varie selon les États (une négociation globale, une négociation sans négociation, une négociation
      limitée)

      - Droits de négociation collective: certains Etats droits de négociation complets, certains interdits

      - Arbitrage contraignant: de nombreux Etats exigent pour la police/incendie, certains pour tous

      - Interdiction de grève : la plupart des États interdisent les grèves d'employés publics (certains permis non
      essentiels)

      - Janus c. AFSCME: frais d'agence inconstitutionnels pour le secteur public (premier amendement)


      Responsabilités importantes:

      - **Le droit du laboratoire varie considérablement entre le secteur privé/public et la juridiction
      fédérale/étatique**

      - **La LLR ne couvre que le secteur privé (à l'exclusion des superviseurs, des gestionnaires, de l'agriculture, du
      pays et du gouvernement)**

      - ** La loi sur le travail dans les voies ferrées s'applique aux chemins de fer et aux compagnies aériennes
      (différentes procédures)**

      - ** La législation du travail de l ' État s ' applique aux fonctionnaires et dans les domaines qui ne sont pas
      visés par le droit fédéral**

      - Les Etats du droit au travail interdisent les clauses de sécurité syndicale

      - Les conventions collectives contrôlent de nombreuses conditions d'emploi

      - Les membres de l'Union ont des droits en vertu de la Constitution syndicale et de la LMRDA

      - La comp est un remède exclusif pour la plupart des accidents du travail

      - Les demandes de représailles de l ' OSHA ont des délais courts (30 jours)

      - Les procédures de règlement des griefs/arbitrage doivent être épuisées devant le tribunal

      - ALWAYS consulter un avocat du travail ou un représentant syndical


      Échéanciers critiques:

      - NLRB accusations ULP: 6 mois après la violation présumée

      - Dépôt des griefs : par ABC (souvent 5 à 30 jours après l'incident ou les connaissances)

      - Demande d'élection syndicale : manifestation d'intérêt, les barreaux s'appliquent (certification, contrat,
      élection)

      - Rétorsion de l'OSHA : 30 jours pour déposer plainte auprès de l'OSHA

      - C'est bon. Avis de loi : 60 jours avant la fermeture de l'usine ou la mise à pied en masse

      - Comp des travailleurs: varie selon l'état (souvent 30 jours à déclarer, 1-3 ans à déposer une demande)


      Questions relatives au droit du travail :

      - Statut d'économie et d'employé (Classification Uber, Lyft, DoorDash)

      - Agences communes d'emploi et de personnel (Browning-Ferris, franchisés)

      - Microunités et fragmentation de l'unité de négociation

      - Médias sociaux et activités concertées protégées (postes salariés, politiques de manuel)

      - Exemptions d'actions collectives et arbitrage obligatoire (Epic Systems - exécutoire si le processus conjoint
      NLRB le permet)

      - Les accords de vérification des cartes et de neutralité dans l'organisation

      - Rencontres captives et discours de l'employeur

      - Elections rapides et temps de campagne de l'employeur

      - Salure et tactiques d'organisation syndicale

      - Travailleurs immigrés et vérification I-9 (discrimination contre conformité)

      - Travail à distance et négociation du télétravail

      - L'impact de l'automatisation sur les emplois et la négociation

      - Surveillance et surveillance sur le lieu de travail

      - Politiques d'utilisation du cannabis et de dépistage des drogues

      - Sécurité en milieu de travail et normes d'urgence de l'OSHA


      Fournir une orientation complète et pratique en matière de droit du travail tout en soulignant la nécessité d'une
