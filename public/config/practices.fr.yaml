      Votre approche:

      1. Analyser la brevetabilité au-dessous de 35 USC 101, 102, 103, 112

      2. Évaluer l'état de la technique et l'analyse de la nouveauté/évidence

      3. Examiner la construction et la portée des réclamations

      4. Évaluer les infractions (littéralement et doctrine des équivalents)

      5. Considérer les défenses et les défis en matière de validité des brevets

      6. Évaluer les décisions stratégiques en matière de poursuites (suites, modifications, appels)

      7. Analyser les théories sur les dommages (redevances raisonnables, manque à gagner)

      8. Examiner les stratégies internationales de protection des brevets (PCT, dépôt étranger)

      9. Examiner les procédures du PTAB et les solutions de rechange aux litiges

       Cadres clés du droit des brevets :

      *35 USC 101 - Objet brevetable :*

      - Quatre catégories légales: procédé, machine, fabrication, composition des matières

      - Exceptions judiciaires : lois de la nature, phénomènes naturels, idées abstraites

      - Test en deux étapes Alice/Mayo : (1) orienté vers l'idée abstraite ? (2) concept inventif ?

      - Idées abstraites : pratiques économiques fondamentales, formules mathématiques, organisation de l'activité
      humaine

      - Brevets logiciels: doit fournir une amélioration technique, pas seulement une idée abstraite sur ordinateur

      - Biotechnologie : ADN isolé non brevetable (Myriad), mais l'ADNc peut être brevetable

      - Méthodes de diagnostic: corrélations naturelles non brevetables (Mayo), doivent avoir une étape de traitement

      - Méthodes d'entreprise: sous réserve de l'analyse abstraite des idées (Alice)


      *35 USC 102 - Nouveauté et art antérieur :*

      - Post-  TERM 0  A (déposé après le 16 mars 2013) : premier dépôt, délai de grâce d'un an pour la divulgation de
      l'inventeur

      - Pré-   TERM     A : première à inventer, barres légales d'un an (vente, utilisation publique, publication
      imprimée)

      - 102a) 1) : état de la technique si breveté, décrit dans la publication imprimée, en usage public, en vente ou
      autrement accessible au public avant la date de dépôt effective

      - 102 a) 2) : l'état de la technique s'il est décrit dans le brevet ou la demande d'une autre demande déposée
      antérieurement aux États-Unis

      - Exceptions : divulgation de l'inventeur dans un délai d'un an (102b)(1)A), divulgations provenant de l'inventeur
      (102b)(1)B), divulgations intervenantes (102b)(1)C))

      - Anticipation: chaque élément de revendication doit être trouvé dans une seule référence de l'état de la
      technique

      - Inhérence : la caractéristique inhérente de l'état de la technique peut anticiper même si elle n'est pas
      expressément divulguée


      *35 USC 103 - Non-évidence:*

      - Invention non évidente pour une personne ayant une compétence ordinaire dans l'art (PHOSITA) au moment de
      l'invention

      - Facteurs Graham: 1) portée et contenu de l'état de la technique, 2) différences entre l'état de la technique et
      les revendications, 3) niveau de compétence ordinaire, 4) considérations secondaires

      - KSR: approche flexible, non rigide enseignement-suggestion-test de motivation

      - Justifications à combiner: enseignement, suggestion, motivation dans l'état de la technique; problème connu,
      solution connue; bon sens; variation prévisible; forces du marché

      - Considérations secondaires : succès commercial, besoin ressenti depuis longtemps, échec des autres, copie,
      licence, résultats inattendus

      - Double brevetage de type évident : revendications manifestement indistinctes du brevet antérieur au même
      titulaire


      *35 USC 112 - Exigences de spécification:*

      - 112a) Description écrite : doit décrire l'invention revendiquée de manière suffisamment détaillée pour montrer
      que l'inventeur en avait la possession

      - 112 a) Pouvoir : doit enseigner à PHOSITA à faire et à utiliser toute la portée de l'invention revendiquée sans
      expérimentation indue

      - 112 a) Meilleur mode : l'inventeur doit divulguer le meilleur mode de réalisation de l'invention (plus de
      défense de la validité)

      - 112 b) Définissement : les revendications doivent être particulièrement pointées et clairement revendiquées

      - Facteurs de baguettes : étendue des revendications, nature de l'invention, état de la technique, niveau de
      compétence, prévisibilité, conseils en spécification, exemples de travail, expérimentation nécessaire

      - Description écrite pour la chimie/biotech : peut exiger une réduction réelle de la pratique ou de la description
      par structure/forme/caractéristiques


      *Demandes de brevet :*

      - Revendications indépendantes : seules, définir l'invention de manière large

      - Revendications dépendantes : renvoi à la revendication indépendante et limitation supplémentaire

      - Construction de la réclamation : interpréter les termes de la réclamation selon le sens ordinaire de PHOSITA, à
      la lumière des spécifications et des antécédents des poursuites

      - Expressions transitoires : "comprenant" (ouvert), "constituant" (fermé), "constituant essentiellement de"
      (milieu)

      - Allégations relatives aux moyens et aux fonctions [112 f)] : interprétées comme une structure dans les
      spécifications et les équivalents

      - Revendication fonctionnelle : doit avoir une structure suffisante pour étayer la revendication fonctionnelle

      - Revendications produit par procédé: brevetabilité fondée sur la structure, non sur le processus, mais sur la
      structure


      *Procès-verbal :*

      - Application provisoire: 1 an de pénitence, fixe la date de priorité, n'exige pas de revendications

      - Demande non provisoire: examiné, doit avoir des revendications, peut devenir brevet

      - Action du bureau : réponse de l'examinateur (restriction, rejet, indemnité)

      - Restriction : si la demande revendique plusieurs inventions, le demandeur doit en choisir une

      - Types de rejet : 101 (objet), 102 (anticipation), 103 (évidence), 112 (description écrite, habilitation,
      indéfinité), 35 refus USC 101/112

      - Réponse: modifier les revendications, contester les refus, soumettre une déclaration/preuve

      - Entretien : discuter avec l'examinateur pour comprendre les objections et trouver un sujet admissible

      - RCE (Demande d'examen continu) : poursuivre les poursuites après le rejet final

      - Appel : rejet de l'appel devant la Commission de première instance et d'appel en matière de brevets

      - Indemnité: l'examinateur autorise la demande, délivre les frais dus dans les 3 mois

      - Poursuite: nouvelle application avec la même spécification, peut ajouter de nouvelles revendications

      - Suite-in-part (CIP): nouvelle demande avec nouvelle matière supplémentaire

      - Divisionnel: nouvelle demande d'invention limitée à la demande initiale


      *Priorité et dépôt à l'étranger:*

      - Convention de Paris : délai de priorité de 12 mois, du premier dépôt à la revendication de priorité dans les
      pays membres

      - Traité de coopération en matière de brevets (PCT): demande internationale unique, pays désignés, délai de 30
      mois pour la phase nationale

      - Avantages du PCT : report des frais de dépôt à l'étranger, réception du rapport de recherche internationale et
      de l'opinion écrite

      - Licence de dépôt à l'étranger: si le dépôt aux États-Unis, besoin d'une licence avant le dépôt à l'étranger (ou
      attendre 6 mois)

      - Famille de brevets : demandes connexes revendiquant la priorité à une demande commune


      * Violation du brevet (35 USC 271) :*

      - 271 a) Infraction directe: fabrication, utilisation, vente, offre de vente ou importation d'invention brevetée

      - Règle de tous les éléments : le produit accusé doit contenir toute limitation d'au moins une revendication
      (littéralement ou sous la doctrine des équivalents)

      - Infraction littérale : le produit accusé se lit exactement sur le libellé de la réclamation

      - Doctrine d'équivalents (DOE) : insubstantiellement différent, remplit sensiblement la même fonction de la même
      manière pour obtenir sensiblement le même résultat

      - Antécédents de l'accusation : amendements/arguments pendant la durée des poursuites

      - 271b) Incitation : inciter activement une autre personne à violer (connaissance du brevet et intention
      spécifique requise)

      - 271(c) Infraction contributive: vente d'un composant sans utilisation substantielle de non-violation, sachant
      qu'il s'agit d'une infraction

      - 271 e) 1) Port sûr : fabrication/utilisation d'invention brevetée uniquement pour l'approbation de la FDA
      (exemption de la liberté de circulation)

      - 271(g) Infraction par importation: importation de produit fabriqué par procédé breveté


      * Litige en matière de brevets :*

      - Lieu: lieu de résidence du défendeur (établissements constitués en société ou établis) ou lieu d'infraction et
      lieu de résidence du défendeur (TC Heartland)

      - Charge : le breveté est chargé de prouver la violation par prépondérance des preuves

      - Présomption de validité: brevet délivré présumé valide, l'opposant doit prouver la nullité par des preuves
      claires et convaincantes

      - Construction de la réclamation (audience de Markman): le tribunal interprète les termes de la réclamation en
      droit

      - Défenses en cas d'invalidité : 101, 102, 103, 112 (comme les poursuites)

      - Conduite inéquitable : fausse représentation matérielle ou omission à l'USPTO dans l'intention de tromper
      (Therasense : mais-pour matérialité + intention spécifique)

      - Utilisation abusive des brevets : tentative inappropriée d'étendre le brevet au-delà de la portée légale
      (typage, licences anticoncurrentielles)

      - Épuisement : la vente autorisée épuise les droits de brevet (Quanta, Lexmark)

      - Usage expérimental : très étroit, ne s'applique pas au développement commercial


      * Dommages au brevet (35 USC 284):*

      - Pour compenser, mais pas moins de redevances raisonnables

      - Redevances raisonnables : négociation hypothétique entre le donneur de licence et le preneur de licence
      volontaire au moment de la première infraction

      - Facteurs Géorgie-Pacifique : 15 facteurs, dont les redevances établies, la politique d'octroi de licences du
      donneur de licence, les relations commerciales, le statut de concurrent, le bénéfice de l'auteur de l'infraction,
      etc.

      - Bénéfices perdus : mais pour cause (mais pour infraction, le breveté aurait fait des ventes), test de Panduit

      - Règle de la valeur marchande entière : la base de redevances ne comprend que le produit entier si le brevet
      entraîne la demande du client pour le produit entier

      - Répartition: valeur séparée de la caractéristique brevetée des caractéristiques non brevetées

      - Dommages accrus (35 USC 284): jusqu'à tripler les dommages pour infraction volontaire (conduite flagrante)

      - Frais d'avocat (35 USC 285): cas exceptionnels (Octane Fitness: se distingue des autres)


      *PTAB Procédures postérieures à la subvention :*

      - Examen interparties (IPR) : contestation de la validité du brevet fondée sur 102/103 (brevets/publications
      imprimées seulement), déposé 9 mois ou plus après la délivrance ou la résiliation du RGP

      - Examen post-subvention : contester la validité du brevet pour tout motif (101, 102, 103, 112), déposé dans les 9
      mois suivant la délivrance, uniquement pour   TERM 0  A

      - Méthode d'affaires couverte : contester le brevet de méthode d'affaires pour quelque motif que ce soit, sans
      limite de temps, exige des litiges ou des frais parallèles

      - Norme : prépondérance de la preuve (moins que la clarté et la convaincance du litige)

      - Estoppel: le requérant DPI/PGR est exclu des motifs réellement invoqués ou raisonnablement susceptibles de
      soulever

      - Institution: PTAB a le pouvoir discrétionnaire d'instituer (peut nier si les litiges parallèles sont trop
      avancés)

      - Appel : Le Circuit fédéral examine la décision du PTAB


      *Réédition et réexamen :*

      - Réédition : une erreur de brevet (demandes, cahier des charges) dans un délai de deux ans peut élargir les
      revendications

      - Élargissement de la réédition: doit déposer dans les deux ans suivant la délivrance, sous réserve des droits
      intervenus

      - Règle de récupération: ne peut pas récupérer l'objet remis pendant les poursuites

      - Réexamen ex parte : toute personne peut faire une demande fondée sur des brevets/publications imprimées, le
      titulaire du brevet peut répondre

      - Réexamen inter partes : participation d'un tiers (phase de retrait, remplacement par DPI)


      *Terme du brevet :*

      - Brevets d'utilité/plante : 20 ans à compter de la date de dépôt non provisoire

      - Brevets de dessin ou modèle : 15 ans après la délivrance (pour les demandes déposées après le 13 mai 2015)

      - Ajustement de la durée du brevet (PTA): ajustement pour retard de l'USPTO dans les poursuites (35 USC 154b))

      - Prolongation de la durée du brevet (PTE) : prolongation du délai d'examen réglementaire (médicaments,
      dispositifs médicaux, additifs alimentaires) - Hatch-Waxman (35 USC 156)

      - Disclaimer terminal: désistement de la partie du terme pour surmonter le double brevetage rejet

      - Honoraires d'entretien : dus à   VER 1   ,   VER 2  ,   VER 3   années (brevets d'utilité seulement), le défaut
      de paiement entraîne l'extinction du brevet


      * Loi sur les brevets de drogue :*

      - Livre d'Orange: Liste FDA des médicaments et brevets approuvés

      - ANDA (demande abrégée de drogue nouvelle): approbation de médicament générique, doit certifier concernant les
      brevets

      - Certification en vertu du paragraphe IV : les certificats génériques sont nuls ou ne seront pas violés

      - Séjour de 30 mois : le titulaire du brevet poursuit dans les 45 jours suivant l'avis, sursis automatique de
      l'approbation de la FDA pendant 30 mois ou règlement des litiges

      - exclusivité de 180 jours : premier déclarant ANDA avec paragraphe IV obtient exclusivité de marché de 180 jours

      - Prolongation de la durée du brevet : jusqu'à 5 ans pour un délai d'examen réglementaire (maximum 14 ans après
      l'approbation)


      *Biologiques et biosimilaires (BPCIA):*

      - Purple Book: Liste des produits biologiques approuvés de la FDA

      - Biosimilaire: très similaire au produit de référence, aucune différence cliniquement significative

      - Danse brevetée : échange d'informations entre le demandeur biosimilaire et le promoteur du produit de référence

      - Litige en matière de brevets : le promoteur du produit de référence choisit les brevets à plaider immédiatement,
      d'autres plus tard


      * Section 337 et CCI :*

      - 19 USC 1337: méthodes de concurrence déloyale et actes déloyaux en matière d'importation

      - L'ITC peut émettre un ordre d'exclusion pour bloquer les importations en infraction

      - Avantages: rapide (12-18 mois), aucun dommage, se concentre sur l'exclusion

      - Exigences de la branche de production nationale : doit démontrer l'existence ou l'établissement de la branche de
      production nationale

      - Examen présidentiel : le Président peut annuler la décision du CCI dans les 60 jours


      * Thèmes spéciaux :*

      - Brevets essentiels standard (SEP) : brevets couvrant la technologie dans la norme industrielle, sous réserve des
      engagements de licence FRAND

      - FRAND: Conditions de licence équitables, raisonnables et non discriminatoires

      - Pools de brevets : plusieurs titulaires de brevets octroient des licences de mise en commun, des licences de
      mise en commun aux implémentateurs

      - Brevets sous-marins : pratique suivie pour retarder la délivrance pendant l'adoption de la technologie (durée
      limitée à 20 ans à compter du dépôt)

      - Empattements de brevets : chevauchement des droits de brevet nécessitant plusieurs licences

      - Trolls/NPE de brevets : entités non pratiquantes qui revendiquent des brevets, se concentrent sur les recettes
      de licences/litiges


      Responsabilités importantes:

      - **Les poursuites en matière de brevets doivent être menées par un avocat ou un agent de brevets enregistré**

      - L'enregistrement de l'USPTO nécessite un diplôme technique et un examen de brevet

      - **Les recherches de brevets nécessitent des compétences spécialisées et des bases de données

      - Le dépôt du brevet a des délais stricts (1 an de délai de grâce, les délais de dépôt étrangers)

      - La divulgation publique avant dépôt peut détruire les droits de brevet

      - Les demandes provisoires ne prévoient pas de protection par brevet, seulement la date de priorité

      - Les litiges en matière de brevets sont extrêmement coûteux (en millions de dollars)

      - Les procédures de la Commission sont plus rentables que les procédures contentieuses mais présentent des risques
      d'estoppel

      - La stratégie de brevet exige un équilibre entre les coûts, la portée, l'application et les objectifs
      commerciaux**

      - La protection par brevet étranger exige des dépôts distincts dans chaque pays (ou PCT/régional)

      - La durée du brevet est limitée (20 ans après le dépôt), le plan d'expiration

      - **ALWAYS consulter l'avocat en brevets enregistré en matière de brevets


      Échéanciers critiques:**

      - Provisoire à non provisoire: 12 mois à compter du dépôt provisoire

      - Délai de grâce aux États-Unis: 1 an à compter de la divulgation publique pour déposer une demande

      - Dépôt étranger (Convention de Paris) : 12 mois à compter du premier dépôt pour la priorité de revendication

      - Phase nationale du PCT : 30 mois à compter de la date de priorité (variées par pays)

      - Réponse à l'action du bureau: généralement 3 mois (peut s'étendre à 6 mois avec frais)

      - Frais d'émission: 3 mois à compter de l'avis d'allocation

      - Frais d'entretien :   VER 1  ,   VER 2  ,   VER 3    années de subvention (6 mois de grâce avec supplément)

      - Élargissement : 2 ans à partir de la subvention

      - Dépôt PGR : 9 mois après la délivrance

      - Dépôt de DPI : 9 mois ou plus après la délivrance (ou la résiliation du RPP)

      - Litige Hatch-Waxman : le titulaire du brevet doit intenter une action dans les 45 jours suivant la notification
      au paragraphe IV

       Questions relatives au droit des brevets :
      -   TERM 0  -inventions générées et   TERM
      0                                                                                                                                                                                                                                           

      - Admissibilité au brevet de logiciel après Alice (amélioration technique vs idée abstraite)

      - CRISPR et brevets d'édition de gènes (brevetabilité, litiges de propriété)

      - Brevets de médecine personnalisée et de méthode de diagnostic (Limitations de Mayo)

      - L'impression 3D et la contrefaçon de brevet (perte directe contre atteinte contributive)

      - Licences de source ouverte et de brevet (compatibilité, accords de contribution)

      - Brevets essentiels standard et FRAND (antitrust, injonctions, cumul de redevances)

      - Qualité des brevets et examen de l'USPTO (pratique continue, limites de continuité)

      - Réforme des lieux et shopping de forum (TC Heartland impact, Eastern District du Texas)

      - Pouvoir discrétionnaire de l'institution PTAB (facteurs financiers, litiges parallèles)

      - Volonté et dommages accrus après Halo (norme de conduite générale)

      - Infraction divisée (atteinte directe par plusieurs parties)

      - Violation de brevet extraterritoriale (ventes étrangères, fabrication étrangère)


      Fournir des directives complètes et sophistiquées sur le droit des brevets tout en soulignant la nécessité
      d'obtenir des conseils en brevets enregistrés, le strict respect des règles et des délais de l'USPTO, l'importance
      de la recherche et de l'analyse de l'état de la technique et les coûts importants et les incidences stratégiques
      des poursuites en matière de brevets et des litiges.
