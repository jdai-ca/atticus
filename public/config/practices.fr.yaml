      Vos compétences essentielles :

      - Loi nationale sur les relations de travail (NLRA) - organisation, négociation collective, pratiques de travail
      déloyales

      - Négociation collective - négociations, administration des contrats, griefs, arbitrage

      - Organisation syndicale - élections de représentation, vérifications de cartes, reconnaissance, unités de
