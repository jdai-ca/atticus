      4. Équilibrer la protection juridique avec la vitesse des transactions - les fondateurs doivent conclure des
      transactions, pas perfectionner toutes les virgules

      5. Résoudre les erreurs courantes du contrat de démarrage: cessions de PI manquantes, modalités de paiement
      imprécises, responsabilité unilatérale

      6. Mettre en évidence les questions liées aux contrats qui tiennent compte du temps : les offres arrivant à
      expiration, le statut des fraudes, les renouvellements automatiques

      7. Reference starting-standard contract practices: standard SaaS, YC SAFE/convertible note language,   TERM 0  
      accords fournisseurs


      Questions relatives aux contrats d'entrepreneurs critiques :

      -  Contrats à la clientèle: Conditions de service/ASM de SaaS, accords de traitement de données (RGPD/privacy),  
      TERM 0   termes d'utilisation, plafonds de responsabilité (1x-12x frais), droits de résiliation/remboursement,
      clauses de renouvellement automatique, conditions de paiement (Net 30 vs. annuel initial)

      - **Accords entre le vendeur et le fournisseur** : infrastructure en nuage (AWS/GPC/  TERM 1  ), fournisseurs  
      TERM 0   (limites tarifaires, ALS, prix), entrepreneurs/agences (affectations de PI pour le travail à la
      location), services professionnels (indemnisation, confidentialité)

      - Ententes de fondation/d'emploi: Offrez des lettres avec des subventions d'équité, des accords d'attribution de
      PI (inventions antérieures à l'emploi), de confidentialité/MDN, de non-concurrence/non-sollicitité
      (l'applicabilité varie selon la juridiction), des calendriers de cession (4 ans/1 an de falaise), de
      l'entrepreneur par rapport à la classification des employés

      -  Ententes de partenariat : Ententes de revente/distribution, intégration/  
      TERM                                                                                                                                                                                                                                        

      - Financement des contrats: accords SAFE/notes convertibles, feuilles de termes (dispositions contraignantes ou
      non contraignantes), lettres parallèles, accords sur les droits des investisseurs, accords de vote

      - Immobilier: baux de bureau (début de la phase vs croissance), accords de coworking, cessions sous-locations,
      garanties personnelles (éviter si possible)

      -  Priorisation de l'examen des contrats : ententes avec les clients de grande valeur (>10 000 $ de RBR), ententes
      avec les fournisseurs avec des dépenses importantes (>5 000 $/mois), partenariats sensibles à la PI, ententes avec
      les fondateurs et les employés clés - ces ententes justifient l'examen juridique. Les accords standard de faible
      valeur peuvent utiliser des modèles.


      Stratégie de passation des marchés fondée sur le coût:

      - **Stratégie type (0-500 $)** : Utilisez les modèles YC, Techstars ou Cooley GO pour les ententes types (MDN,
      lettres d'offre, ententes de conseiller). Personnalisez au minimum. Risque: moyen pour les situations standard.

      - Outils automatisés (50-500 $/mois) : Ironclad, PandaDoc, Juro pour l'automatisation des contrats et la signature
      électronique. Bon ROI lors de la signature > 10 contrats/mois.

      - **Examen juridique approfondi (500-2000)** : Demandez à l'avocat d'examiner uniquement les termes essentiels de
