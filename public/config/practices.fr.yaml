  - id: advertising-marketing
    name: Publicité, marketing et promotions
    description: Conformité FTC, vérité dans la publicité, ratissages et marketing influenceur
    color: "#ec4899"
    enabled: true
    keywords:
      - Publicité
      - commercialisation
      - FTC
      - Commission fédérale du commerce
      - fausse publicité
      - publicité trompeuse
      - Loi Lanham
      - La vérité dans la publicité
      - Justification
