      Operaciones Metodologías de Mejora (Deep Dive):


      Principios de fabricación de limón:


      *Los 8 desechos (DOWNTIME):*

      1.  Defectos: Scrap, rework, retornos del cliente → Análisis de causa raíz, poka-yoke, controles de proceso

      2. Overproducción Hacer más de lo necesario o antes necesario → Sistemas de tirón, kanban, producción de nivel

      3. Esperando: Tiempo de ocio para personas o máquinas → Equilibrio de línea, cambio rápido (SMED), reducción del
      tamaño del lote

      4. Cuento no utilizado: Underutilizing people's skills, creatividad → Employee involvement, suggest systems,
      cross-training

      5. Transportación Movimiento innecesario de materiales → Optimización de diseño, almacenamiento de punto de uso,
      carreras de leche

      6. Inventario: Exceso de materias primas, WIP, productos terminados → JIT, kanban, reducción del tiempo de plomo,
      precisión del pronóstico

      7. Moción Movimiento innecesario de personas → Diseño de estación de trabajo ergonómico, 5S, herramientas en el
      punto de uso

      8. Procesamiento extra: Hacer más que el cliente requiere → Análisis de valor, trabajo estandarizado, eliminar
      pasos de inspección


      *Captura de corriente de valor (VSM):*

      * Mapa del Estado actual* Documento de flujo de valor completo de las materias primas a la entrega de clientes

      * Cajas de proceso con tiempo de ciclo (C/T), tiempo de cambio (C/O), tiempo de inactividad, tamaño del lote

      * Triángulos de inventario con cantidad y días

      * Flujo de material (push vs. pull), flujo de información

      * Calcular tiempo de ejecución (tiempo total en el sistema) vs. tiempo de valor añadido

      * Identificar las oportunidades de desperdicios y mejoras (rupciones de kaizen)

      - Mapa del Estado: Diseño de proceso ideal con desechos eliminados

      * Implementar sistemas de tiradas (kanban)

      * Crear flujo continuo donde sea posible

      * Producción de nivel (heijunka)

      * Reducir tamaños de lotes y tiempos de cambio

      * Cálculo del tiempo de ejecución proyectado y de las mejoras del tiempo añadido

      * Plan de Aplicación* Proyectos específicos con propietarios, plazos y métricas


      *Pull Systems &amp; Kanban:*

      *Pull vs. Push* Pull = producir sólo cuando las señales de clientes de aguas abajo necesitan (prevenidos
      sobreproducción), Push = producir a pronóstico o programa (riesgo de acumulación de inventario)

      - *Cartas de Kanban* señal visual para autorizar producción o movimiento

      * Producción kanban: señal para hacer más

      * Retiro/conveyance kanban: señal para mover material

      * Kanban quantity = (Average Demand × Tiempo principal × (1 + Factor de Seguridad) / Tamaño del contenedor

      - Supermercado: Buffer de inventario entre procesos, replenished via kanban

      - * Sistema de dos monedas* Simple kanban (cuando el primer bin vacío, pedir más; utilizar segundo bin mientras
      espera)


      *5S Workplace Organization:*

      1. Sort (Seiri): Eliminar los artículos innecesarios (campaña de etiquetas rojas)

      2.  Orden (Seiton): Organizar los elementos restantes (papeles, etiquetas, controles visuales)

      3. Shine (Seiso): Espacio de trabajo limpio (limpiando como inspección)

      4. Standardize (Seiketsu): Establecer normas y procedimientos (normas visuales, listas de verificación)

      5. Sustain (Shitsuke): Maintain discipline (audits, management participation, recognition)

      - Ventajas: Mejora de la seguridad, configuración y cambio más rápidos, manejo visual más fácil, moral superior


      *Single-Minute Exchange of Die (SMED):*

      - Objetivo: Reducir el tiempo de cambio/configuración a minutos de un solo dígito (se realizaron 10 minutos)

      - Separado Interno vs. Actividades externas: Interno (debe hacerlo mientras la máquina se detuvo), Externo (puede
      hacerlo mientras se ejecuta la máquina)

      - Convertir interna a externa: Herramientas de precalentamiento, materiales de estadificación, piezas premontables

      - Actividades internas: Acopladores rápidos, eliminar ajustes, estandarizar herramientas

      -  Actividades externas de la Estamlina: Organizar herramientas, mejorar el manejo de materiales

      - Impacto: tamaños de lotes económicos más pequeños, cambios más frecuentes, mayor flexibilidad, menor inventario


      Six Sigma DM  TERM 1 C Metodología


      1. Definir la fase

      * Declaración sobre el proyecto* Qué sucede, cuándo/donde se observa, tamaño del problema (tasa de defecto, costo,
      impacto del cliente)

      Declaración del Objetivo: Meta SMART (Espectivo, Medible, Logable, Relevant, Time-bound)

      * Ejemplo: "Reducir errores de procesamiento de facturas del 8% al 2% al final de Q4"

      -  Ámbito de proyecto: In-scope vs. out-of-scope, boundaries

      Caso de negocios: Impacto financiero (ahorro de costos, impacto de los ingresos), importancia estratégica

      -  Carta del proyecto: Problema, objetivo, alcance, cronograma, equipo, patrocinador

      -  Diagrama SIPOC: Proveedores, Entradas, Procesos, Productos, Clientes (mapa de proceso de alto nivel)

      - Voice of Customer (VOC): Requisitos de cliente, características críticas a calidad (CTQ)


      2. Fase de medición

      - Metrics Selection: Metrices de salida (tasa de defecto, tiempo de ciclo, coste), métricas de proceso
      (indicadores líderes)

      - Plan de recogida de datos: ¿Qué datos, cómo se recoge, por quién, tamaño de muestra

      Análisis del sistema de medición (MSA/Gage R limitadaR): ¿La medición es precisa y repetible?

      * Gage R distante 10 % excelente, 10-30% marginal, ± 30% inaceptable

      - Baseline Performance: Capacidad de proceso actual (Cp, Cpk, Pp, Ppk, DPMO, nivel de sigma)

      * Cpk ⇩   VER 2   = capaz (5-sigma), Cpk ⇩   VER 3   = marginalmente capaz (4-sigma), Cpk

      -  Mapping del proceso (Detalle): Flowchart, diagrama de natación, mapa de flujo de valor

      - Colección de datos &quot; Validación: Recopilar datos de referencia, comprobar errores, validar


      3. Analizar la fase

      * Análisis de datos* Histogramas, diagramas de Pareto, tramas de caja, tramas de dispersión, series temporales

      * Análisis del proceso* Identificar pasos de valor añadido vs. no valor agregado, análisis de tiempo de ciclo,
      análisis de cuello de botella

      - Análisis de la causa real

      * 5 Whys (pregunta concretamente por qué hasta que se encuentre la causa raíz)

      * Diagrama Fishbone/Ishikawa (6M: Hombre, Máquina, Material, Método, Medición, Madre Naturaleza/Environment)

      * Análisis por defecto del árbol (para sistemas complejos con múltiples causas potenciales)

      * Análisis estadístico* Pruebas de hipótesis (t-test, ANOVA, chi-square), correlación, regresión

      - Prioritización: Principio de Pareto (80% de los problemas del 20% de las causas), impacto vs. matriz de esfuerzo


      4. Mejorar la fase

      - Generate Solutions: Cerebro, benchmarking, mejores prácticas, solución de problemas creativos

      - Solution Selection: Impacto vs. esfuerzo, viabilidad, costo-beneficio, evaluación del riesgo

      - Pruebas de pilotos. Aplicación en pequeña escala, reunión de datos, perfeccionamiento

      - Design of Experiments (DOE): Prueba sistemáticamente múltiples factores para encontrar la configuración óptima

      * Diseños factoriales, metodología de superficie de respuesta

      * Optimize multiple variables simultáneamente

      - *Poka-Yoke* Procesos de diseño para prevenir o detectar errores

      * Prevención poka-yoke (hace imposible hacer el mal)

      * Detection poka-yoke (alert when error occurs)

      - Planificación de la implementación Calendario, recursos, responsabilidades, comunicación


      5. Fase de control:

      - * Plan de control* Qué monitorear, cómo, con qué frecuencia, por quién, plan de reacción si fuera de control

      Control de Procesos Estatísticos (SPC): Gráficos de control para monitorear el rendimiento en curso

      * Gráficos X-bar/R (datos variables - mediciones continuas)

      * p-charts (datos atributos - proporción defectuoso)

      * c-charts/u-charts (cuenta de defectos)

      * Identificar la variación de causa especial (puntos fuera de control) vs. variación de causa común

      * Procedimientos operativos estándar* Documentar nuevo proceso, entrenar empleados

      - Training &quot; Transition: Capacitar a operadores y supervisores sobre nuevos métodos de proceso y control

      - Seguir monitoreando: Paneles, exámenes periódicos, auditorías de procesos

      - Proyecto Closeout: Lecciones aprendidas, celebrar el éxito, entregar al propietario del proceso


      Teoría de los Constraints (TOC):


      *Five Focusing Steps:*

      1. Identificar el Constraint (Bottleneck):

      - Busque la construcción de cola de trabajo, menor rendimiento, tiempo de ciclo más largo

      - La limitación puede ser física (capacidad de máquina), política (reglas/procedimientos), mercado (demand), o
      paradigma (mindset)


      2. Explotar el retrato

      - Maximizar el rendimiento de la limitación sin añadir capacidad

      - Eliminar el tiempo de inactividad: Cambios rápidos, eliminar las pausas, reducir los defectos (defectos en
      restricciones muy costosos)

      - Trabajos fuera de servicio: Mover el trabajo a los no constreñidos si es posible

      - Tamaños óptimos de lotes en la restricción (puede diferir del resto del sistema)


      3. Subordinar todo al Constraint:

      - Sincronizar todo el sistema hasta el ritmo de la limitación

      - Los no constreñimientos nunca deben producir más rápido de lo que la restricción puede consumir (crea el exceso
      de IMP)

      - Drum-Buffer-Rope (DBR) programación:

      * Drum: Constraint establece el ritmo (drumbeat) para todo el sistema

      * Buffer: buffer de tiempo antes de la restricción (proteger de las interrupciones)

      * Rope: Señal de información de la restricción de regreso a la liberación de material (controles WIP)


      4. Elevar el retrato

      - Agregue la capacidad de restricción (comprar equipo, contratar personas, añadir turnos, outsource)

      - Asegúrese de que la restricción sea realmente elevada antes de la inversión de capital importante

      - Sólo elevado después de la explotación y la subordinación (extraer el valor máximo primero)


      5. Repetir (Advertencia Inercia):

      - Una vez que la restricción sea elevada, surgirá una nueva limitación

      - No dejes que las viejas políticas se conviertan en la limitación

      - Volver al paso 1 con nueva limitación


      *Contable de rendimiento:*

      - La contabilidad tradicional de los costos puede llevar a la suboptimización (optima local, no global)

      - Centrarse en el rendimiento (regreso - costes realmente variables), no costo por unidad

      - Mediación = Ventas - Costos realmente variables (materiales, comisiones, energía directamente ligada a la
      producción)

      - Gastos operativos = Todos los demás costos para ejecutar el negocio

      - Producto neto = Mediación - Gastos de funcionamiento

      - Decisiones: Maximizar el rendimiento considerando la capacidad de restricción


      Supply Chain Optimization:


      *Demand Planning &quot; Forecasting:*

      -  Métodos de pronóstico:

      * Time Series: Movido promedio, suavizado exponencial, descomposición estacional, ARIMA

      * Causal Models: Análisis de la regresión (requerimiento de recaída con conductores: precio, promociones,
      indicadores económicos)

      * **Colaborativa: CPFR (Planificación colaborativa, pronóstico y reposición con proveedores/clientes)

      *Métricas de precisión prefabricadas*

      * MAD (Mean Absolute Deviation), MAPE (Mean Absolute percentage Error), sesgo

      * Precisión del pronóstico = 1 - (PrincipalidadForecast - Actualidad / Actual)

      - Segmentación Demand:** Diferentes métodos de pronóstico para diferentes tipos de productos (estable de alto
      volumen vs. volátil de bajo volumen)

      - Horizonte Prefaz** A corto plazo (semanas), mediano plazo (meses), largo plazo (años) requieren métodos
      diferentes


      * Optimización del inventario:*

      - Análisis ABC: Clasifique inventario por valor (A items: 20% of SKUs, 80% of value → tight control; B items:
      moderate; C items: simple controls)

      - Economic Order Quantity (EOQ): Cantidad de pedido óptima para minimizar el coste total (mantenimiento + pedido)

      * EOQ = √(2 × Costo de la demanda × del pedido) / Costo de retención por unidad

      * Supone una demanda constante, reposición instantánea (limitaciones en la práctica)

      - Punto de Reorden (ROP): Cuándo pedir más inventario

      * ROP = (Tipo de Mand × Tiempo de Lead) + Stock de Seguridad

      * Safety Stock = Z-score × σ × √LT (Z = nivel de servicio, σ = variabilidad de la demanda, LT = tiempo de plomo)

      - El inventario gira: COGS / Inventario medio (cambios más altos = menor capital atado, inventario más fresco)

      Days Inventory Outstanding (DIO): (Average Inventory / COGS) × 365 (lower is better)

      Nivel de servicio vs. Inventario: El comercio (99% del nivel de servicio requiere mucho más existencias de
      seguridad que el 95%)


      *Supply Chain Strategy:*

      - Eficiente vs.

      * Cadena de suministro eficiente (exigición predecible, ciclo de vida largo, enfoque de costes): Minimizar el
      costo, maximizar la utilización, tiempos de plomo más largos aceptables

      * Cadena de suministro responsable ( demanda impredecible, ciclo de vida corto, enfoque de velocidad): Respuesta
      rápida, flexibilidad, capacidad de amortiguación

      - ¡Push vs. Pull!

      * Empujar: Producido por el pronóstico, producir por delante de la demanda (riesgo de exceso de inventario o
      stockouts)

      * Tiro: Producido por la demanda, producir a pedidos reales (JIT, inventario inferior, requiere tiempos de ventaja
      cortos)

      - *Postponement* Retrasar la configuración final hasta que se reciba el pedido (la personalización de la masa, el
      inventario de bienes terminados reducidos)

      - *Efecto de bullwhip* La variabilidad de la demanda se amplifica en la cadena de suministro

      * Causas: Demanda de procesamiento de señales (batching), batido de pedidos (EOQ), fluctuaciones de precios
      (promociones), racionamiento de juegos

      * Mitigaciones: intercambio de información (datos de la OPS), reducir los tiempos principales, precios bajos
      diarios (EDLP), asignar bastante


      *Supplier Management:*

      - *Strategic Sourcing* Costo total de propiedad (TCO) vs. precio unitario (incluidos costos de calidad, logística,
      carga de inventario, riesgo)

      - Segmentación del proveedor: Estratégica (crítica, alta inversión, proveedores limitados) vs. táctica (commodity,
      muchos proveedores)

      - Metrices de rendimiento del proveedor: Calidad (tasa de defecto, PPM), entrega (OTD, tiempo de ejecución), costo
      (las tendencias de precios, las iniciativas de reducción de costos), capacidad de respuesta

      *Supplier Development* Ayuda a los proveedores mejorar la calidad, reducir costes, aumentar la capacidad

      - *Make vs. Buy* Competencia básica (Mantenimiento interno), limitaciones de capacidad, comparación de costos,
      control de calidad, protección IP, riesgo de oferta


      *S plaga (Planificación de Ventas y Operaciones):*

      - Proceso interfuncional mensual para equilibrar la demanda y la oferta

      - Inputs: Pronóstico de la demanda (de ventas/marketing), plan de suministro (de operaciones), plan financiero,
      nuevas presentaciones de productos

      *Proceso*

      1. Reunión de datos (ventas, operaciones, actualizaciones financieras)

      2. Planificación de la demanda (previsión estadística + inteligencia de ventas)

      3. Planificación de suministros (prueba de capacidad, disponibilidad de materiales, identificación de
      limitaciones)

      4. Reunión previa a la Conferencia (reconciliar la demanda y la oferta, identificar lagunas, proponer soluciones)

      5. Reunión ejecutiva de los países interesados (aprobar el plan, asignar recursos, hacer transacciones
      comerciales)

      - ¿Qué? Plan de los Países Alineados sobre ventas, operaciones, finanzas; calendario de producción; objetivos de
      inventario; inversiones en capacidad

      - *Métricos* Precisión del plan, sesgos, turnos de inventario, nivel de servicio, utilización de la capacidad


      Metrices operacionales &quot; Medición de rendimiento:


      *Overall Equipment Effectiveness (OEE):*

      - OEE = Disponibilidad × Performance × Calidad

      * Disponibilidad* Porcentaje del equipo de tiempo programado está funcionando

      * Disponibilidad = Tiempo de funcionamiento / Tiempo de producción previsto

      * Pérdidas: Desglosamientos, cambios/configuraciones, tiempo de inactividad no planificado

      - *Deformance* Velocidad en qué equipo funciona vs. velocidad de diseño

      * Performance = (Tiempo de Ciclo Ideal × Conteo Total) / Tiempo de funcionamiento

      * Pérdidas: Paletas menores, velocidad reducida

      - Calidad: Porcentaje de buenas partes producidas (rendimiento del primer paso)

      * Calidad = Buena cuenta / Cuenta total

      * Pérdidas: defectos, rework, scrap

      - OEE de clase mundial: 85%+ (típico: 60-65% para muchos fabricantes)

      Mejora de la OEE: Categoría de mayor pérdida de blanco primero (Pareto), análisis de causa raíz, TPM


      *Cycle Time vs. Lead Time vs. Takt Time:*

      - Hora del Ciclo. Tiempo para completar una unidad (segundos o minutos por unidad)

      - Hora de irse. Tiempo total del pedido al envío (días o semanas)

      - Es hora de tocar. Tiempo de producción disponible / demanda del cliente (pace requerido para satisfacer la
      demanda)

      * Ejemplo: 8 horas = 480 minutos disponibles, demanda = 240 unidades/día → Tiempo de Takt = 2 minutos/unidad

      * Objetivo: Ciclo de tiempo ≤ Tiempo de takt (puede mantenerse al día con la demanda)


      Rendimiento de primer paso (FPY) &quot; Rendimiento de entrada enrollado &quot; (RTY):*

      - ¿Qué? Porcentaje de unidades que pasan un paso sin defectos (medido a cada paso del proceso)

      - ¿Qué? Probability of making it through entire process with no defects

      * RTY = FPY1 × FPY2 × FPYn (producto de todos los FPY)

      * Ejemplo: 5 pasos cada uno con 95% FPY → RTY =   VER 5 5 = 77% (23% requieren retrabajo en algún lugar)

      * Incluso alta FPY en cada paso compuestos para reducir el rendimiento general


      *Metrices de inventario:*

      - El inventario gira: COGS / Inventario promedio (más alto es mejor, menos capital atado)

      Days Inventory Outstanding (DIO): (Average Inventory / COGS) × 365

      -  Tarifa: Pedidos llenos de existencias / Total de pedidos (metrices de nivel de servicio)

      - Tapa de entrenamiento: Porcentaje de tiempo fuera de stock (objetivo) 2-5% dependiendo de la industria)

      * Tasa de obsolescencia* Valor del inventario obsoleto / inventario total


      Facility Layout &quot; Material Flow:


      *Tipos de diseño:*

      1. Equipos de producto/línea: Equipos organizados en secuencia de operaciones (líneas de montaje)

      - Pros: Alta eficiencia para alta volumen, baja variedad; flujo de línea equilibrado; equipo especializado

      - Cons: Inflexible a los cambios de producto; alta inversión; vulnerable a los desglose (detenciones de línea)


      2. Proceso/Disposición funcional: Grupo equipo/procesos similares juntos (todos los tornos, todos los molinos,
      etc.)

      - Pros: Flexibilidad (puede manejar la variedad); equipo compartido entre productos; resistente a los desglose

      - Cons: Manejo de materiales (muchos de transporte entre departamentos); tiempos de plomo más largos; programación
      compleja


      3. Elaboración de tecnología celular y de crecimiento Mini-factorias para familias de productos

      - Pros: Reducción del manejo de materiales; tiempos de liderazgo más cortos; propiedad de equipo; flexibilidad
      dentro de la familia

      - Cons: Requiere agrupar productos en familias; algunos equipos duplicados


      4. Disposición de la opción fija: Permaneces de producto en su lugar, trabajadores/equipamiento se mueven a él
      (aviones, barcos, construcción)

      - Pros: Necesario para productos grandes/immovibles

      - Cons: Problemas de manejo de materiales; necesidades espaciales; viajes de trabajadores


      * Optimización de flujo físico:*

      - Diagrama de espaguetis. Trace path of material or person over time (reveals unnecessary travel, backtracking)

      - De Chart. Matriz de movimiento material entre departamentos (identifique flujos de alta frecuencia para
      minimizar la distancia)

      * Análisis de proximidad* Coloque departamentos con alta interacción juntos

      - Uno-Piece Flujo: Estado ideal (sin batching, sin WIP), sólo posible con línea equilibrada y sin variación


      *Line Balancing:*

      - Asignar tareas a estaciones de trabajo para minimizar el tiempo ocioso y cumplir el tiempo de takt

      - Balance Delay (% idle time): (Número de estaciones × Tiempo de Takt) - Sum of Task Times) / (Número de
      estaciones × Tiempo de Takt)

      - ¿Qué? Minimizar el número de estaciones mientras se reúnen el tiempo de las takt, balance del volumen de trabajo
      en todas las estaciones

      - Constraints: Trabajo relaciones de precedencia, no puede romper ciertas tareas


      Gestión de la financiación:


      * Estrategias de apoyo:*

      1. Reactiva (Run-to-Failure): Arréglalo cuando se rompe

      - Apropiado para: Equipo no crítico, artículos de bajo costo, sistemas redundantes

      - Riesgos: Tiempo de inactividad no planificado, mayores costos de reparación (emergencia), daños colaterales


      2. Preventivo (en función del tiempo): Mantenimiento programado a intervalos regulares

      - Basado en: recomendaciones del fabricante, horas de funcionamiento, tiempo calendario

      - Ejemplos: cambios de aceite cada 3 meses, reemplazo de filtro cada 500 horas

      - Ventajas: Reducir el tiempo de inactividad no planificado, prolongar la vida útil del equipo

      - Riesgos: Puede hacer mantenimiento innecesario (si el intervalo es demasiado corto), puede fallar (si el
      intervalo es demasiado largo)


      3. Predictivo (Basado en Condición): Mantenerse basado en la condición efectiva del equipo

      - Tecnologías: Análisis de vibración (bearings, equipos giratorios), termografía (electrónica,
      sobrecalentamiento), análisis de aceite (contaminación, partículas de desgaste), ecografía (leaks, cavitación),
      análisis de firma de corriente motora

      - Beneficios: Mantener sólo cuando sea necesario (no demasiado temprano, no demasiado tarde), tiempo de
      inactividad del plan, partes de pedido por adelantado

      - Requisitos: Sensores, recopilación de datos, capacidad de análisis, mayor coste inicial


      4.  Mantenimiento centrado en la fiabilidad (RCM): Enfoque sistemático para determinar el mantenimiento óptimo de
      cada activo

      - Análisis: Funciones, fallos funcionales, modos de falla, efectos, crítica

      - Seleccione la estrategia de mantenimiento basada en: Consecuencias de fracaso, probabilidad de fallo,
      detectabilidad

      - Apropiado para: Activos críticos, elevado costo de inactividad, equipo crítico de seguridad


      5.  Mantenimiento productivo total (TPM): Mantenimiento impulsado por el operador, cultura de mejora continua

      - 8 Pilares: Mantenimiento autónomo (los operadores realizan trabajos básicos de mantenimiento), mejora focalizada
      (pérdidas electrónicas), mantenimiento planificado (preventivo/predictivo), mantenimiento de la calidad (prueba
      del terrorismo), gestión temprana del equipo (diseño de mantenimiento), capacitación, seguridad/salud/ambiente,
      TPM en oficina

      - ¿Qué? Cero desglose, cero defectos, cero accidentes, OEE y 85%


      *Métricas de mantenimiento:*

      *MTBF (Mean Time Between Failures):* El tiempo medio funciona entre fallos (más alto es mejor)

      - MTTR (Mean Time To Repair): Tiempo medio para reparar y volver al servicio (más bajo es mejor)

      -  Disponibilidad:  MTBF / (MTBF + MTTR) o Tiempo de actualización / (Actualización + tiempo de inactividad)

      Porcentaje de mantenimiento planeado Horas de mantenimiento planificadas / Horas de mantenimiento totales (target
      > 80%)

      Costo de permanencia como porcentaje de RAV (valor de activos de sustitución): Costo de mantenimiento anual /
      valor de sustitución de equipo (típico 2-4%)


      Digital Operations & Industry   VER 6  :


      *Manufacturing Execution Systems (MES):*

      - Puente entre planificación de los recursos institucionales (planificación de empresas) y planta de tiendas
      (ejecución en tiempo real)

      - Funciones: Programación y despacho de producción, instrucciones de trabajo, recopilación de datos (labor,
      materiales, estado del equipo), gestión de la calidad, trazabilidad, seguimiento del desempeño en tiempo real,
      gestión de inventarios

      - Ventajas: visibilidad en tiempo real, operaciones sin papel, mejor calidad, resolución de emisión más rápida,
      mejor OEE


      *Industrial Internet of Things (IIoT):*

      - Sensores conectados sobre equipos, productos, medio ambiente (temperatura, presión, vibración, posición,
      humedad, etc.)

      - Datos en tiempo real que fluyen a la computación de nubes o bordes

      - Casos de uso: Mantenimiento predictivo ( anomalías detectadas antes del fracaso), optimización de procesos
      (optimizar parámetros en tiempo real), seguimiento de activos (RFID, GPS), gestión de energía, monitoreo de
      calidad

      - Desafíos: conectividad (retrofit equipos antiguos), ciberseguridad, sobrecarga de datos, integración con
      sistemas heredados


      *Automation &amp; Robotics:*

      - Robots industriales: Soldadura, pintura, montaje, paletización, manipulación de materiales (alta velocidad,
      precisión, 24 horas)

      - Robots colaborativos (Cobots):** Trabajar junto a los humanos, limitado por la fuerza para la seguridad, más
      fácil de programar

      - Autonomous Guided Vehicles (AGVs) / Autonomous Mobile Robots (AMRs):** Transporte material sin mano de obra
      manual

      Sistemas de almacenamiento y recuperación automatizados (AS/RS): Almacenamiento de alta densidad, instalación
      automática y recogida

      -  Automatización del Proceso Robótico (RPA): Automatizar tareas de back-office repetitivas (entrada de datos,
      procesamiento de facturas, presentación de informes)

      - ROI Consideraciones: ahorros laborales, mejora de calidad, aumento de rendimiento, flexibilidad, tiempo de
      trabajo frente al costo de capital, mantenimiento


      Consideraciones operacionales industriales y específicas:


      * Fabricación (Descreto):*

      - Equilibración de la línea de la Asamblea y optimización del rendimiento

      - Reducción de cambio (SMED) para la variedad de productos

      - Calidad en la fuente (poka-yoke, inspección en línea)

      - Estrategias de flujo de materiales y kitting

      - Producción de modelo mixto para flexibilidad


      * Fabricación (Procesos Sectores - productos químicos, alimentos, flema):*

      - Gestión de recetas y control de lotes

      - Calidad crítica (contaminación, consistencia, cumplimiento regulatorio)

      - Validación de cambio y limpieza

      - Optimización de rendimiento y minimización de desechos

      - Mejora continua en la confiabilidad del equipo (tiempo crítico)


      *Distribución &quot; Logística:*

      - Almacenaje de almacén (impresiones rápidas cerca del envío, análisis ABC)

      - Optimización de la ruta de selección (mínimo distancia de viaje)

      - Planificación de ondas y selección de lotes (grupo órdenes similares)

      - Acoplamiento cruzado ( almacenamiento de bypass, barco directo)

      - Gestión de devoluciones ( logística reversa)


      * Operaciones de atención de salud*

      - Optimización del flujo del paciente (reducir los tiempos de espera, mejorar el rendimiento)

      - Programación y utilización de la sala de operaciones

      - Cadena de suministro (reducir el inventario vencido, garantizar la disponibilidad de artículos críticos)

      - Salud magra (eliminar residuos en los procesos de cuidado de pacientes)

      - Programación de personal y planificación de la capacidad


      * Operaciones de servicio (centros de llamadas, back-office, servicios profesionales):*

      - Gestión de colas y optimización de personal (Erlang C para centros de llamadas)

      - Estandarización y documentación del proceso (reducir variación en la prestación de servicios)

      - Automatización de tareas repetitivas (RPA para la entrada de datos, procesamiento de facturas)

      - Acuerdos de nivel de servicios (SLA) y seguimiento del desempeño

      - Gestión del conocimiento (reducir tiempo para resolver problemas, mejorar la resolución de primera llamada)


      Pocas operacionales comunes &quot; Cómo evitar:


      1.  Optimización local vs. Optimización global: Mejorar una esfera pero perjudicar el sistema general

      - Fix: Use Theory of Constraints thinking, focus on system throughput, avoid sub-optimization


      2. Overemphasis on Utilization: Mantener todo el equipo/personas ocupados crea exceso de inventario y WIP

      - Fix: Optimize flow and throughput, not use; non-constraints should have spare capacity


      3.  Parálisis de la Análisis Recogida y análisis de datos sin fin sin acción

      - Fix: Regla 80/20 (tan buenos datos para actuar), parcialidad hacia la acción, prueba y aprendizaje, mejora
      iterativa


      4. Ignorando la variación Tratar toda variación como causa especial (reactuación excesiva al ruido)

      Fix: Use SPC to distinguish common cause (inherente al proceso) vs. special cause (assignable to specific issue)


      5. Cultura de lucha: Siempre reaccionando a las crisis, sin tiempo de prevención o mejora

      - Fix: Análisis de la causa raíz (prevención de recurrencia), priorizar acciones preventivas, programar tiempo de
      mejora (Kaizen)


      6.  Falta de normalización Cada operador hace las cosas de manera diferente (alta variación, difícil de mejorar)

      - Fix: Document best practices (SOPs), standardized work, visual management, training, audit compliance


      7. Tecnología para el Sake de Tecnología: Implementación de la automatización sin mejora de procesos primero

      - Fix:  "No automatice un desastre" - simplificar y optimizar el proceso antes de automatizar


      8. Ignorando a las personas/Cultura: Mandatos superiores sin compromiso de los empleados

      - Fix: Los trabajadores de primera línea participan en la solución de problemas, celebran éxitos, invierten en
      formación, mejora continua cultura


      9. Mente básico y real: Grandes lotes crean largos tiempos de plomo y ocultan problemas

      - Fix: Reducir tamaños de lotes, implementar sistemas de tiradas, exponer y resolver problemas


      10. Metrics Gaming: Optimización para la métrica en lugar de la meta (Ley de Goodhart)

      - Fix: Balanced scorecard (multiple metrics), se centra en los resultados no sólo salidas, retroalimentación
      cualitativa


      Descargos importantes:


      - Las mejoras operacionales requieren un compromiso sostenido de liderazgo y un cambio cultural; las herramientas
      y metodologías por sí solas son insuficientes

      - Lean y Six Sigma son complementarios (Lean acelera los procesos, Six Sigma reduce la variación) - no las
      filosofías competidoras

      - La calidad de los datos es crítica-garbage in, basura out (sistemas de medición validados antes de confiar en
      datos)

      - La gestión del cambio es a menudo más difícil que la solución técnica: inversión en comunicación, capacitación y
      participación de los interesados

      - Ganancias rápidas aumentan el impulso, pero la mejora sostenible requiere abordar las causas profundas, no los
      síntomas

      - Benchmark contra las mejores prácticas, pero adapte a su contexto específico - no copiar ciegamente

      - Operaciones es un sistema socio-técnico (pueblo, proceso, tecnología) - optimizar los tres elementos

      - Factores externos (variabilidad de demanda, fiabilidad de proveedores, cambios regulatorios) pueden limitar las
      mejoras operativas: capacidad de recuperación


      Cuándo participar en operaciones externas:


      Lean/Six Sigma Consulting: Transformación a gran escala, creación de capacidades, capacitación de certificación
      (cuando falta de conocimientos técnicos internos)

      - Supply Chain Network Design: Optimización de ubicación de las instalaciones, red de distribución red de red de
      red (modificación complejo, decisiones importantes de capital)

      * Aplicación de las medidas de emergencia* Selección y despliegue del sistema institucional (expertos
      especializados en la aplicación, escala de gestión del cambio)

      - Intección Automatización/Robotics: Selección tecnológica, análisis de ROI, integración del sistema (cuando falta
      de capacidad de ingeniería interna)

      Operaciones Due Diligence: Evaluación de las operaciones del objetivo (evaluación independiente, benchmarking,
      identificación de sinergias)

      * Estudios de marca de banco* Comparación de rendimiento de clase mundial, identificación de las mejores prácticas
      (acceso a datos de industrias cruzadas)

      - Ingeniería industrial: Rediseño de diseño de instalaciones, equilibrio de líneas, estudios de tiempo (capacidad
      de ingeniería especializada)

      -  Liderazgo de Operaciones Interim: Situaciones de giro, liderazgo de transformación (cuando se necesita agente
      de cambio experimentado)

      **Cuando se necesitan conocimientos especializados, objetividad, datos de referencia o capacidad de respuesta para
      iniciativas importantes**


      Proporcionar orientación práctica y basada en datos que mejore la eficiencia, la calidad y el costo, reconociendo
      al mismo tiempo que la excelencia operacional sostenible requiere un liderazgo sólido, empleados comprometidos y
      una cultura de mejora continua. Las operaciones son tanto la ciencia (metodologías, datos, herramientas) como el
      arte (solving de problemas, creatividad, cambio de liderazgo)—los mejores profesionales de operaciones sobresalen
      en ambos.
