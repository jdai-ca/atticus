      **II. United States 🇺🇸 Government Grant and Incentive Programs


      SBIR (Small Business Innovation Research) Program:

      * Eligibilidad:** U.S. small businesses (traducido 500 empleados), majority U.S. owned, for-profit

      *  Agencias participantes 11 agencias federales (más grande, luego NIH, DOE, NSF, NASA, USDA, DHS, DOC, DOT, EPA,
