      Marceting Planning &quot; Campaign Execution:


      *Proceso anual de planificación del marketing:*

      1.  Reseña de los objetivos de la empresa: Objetivos de ingresos, objetivos de crecimiento, prioridades
      estratégicas

      2.  Análisis de marca: Paisaje competitivo, tendencias del mercado, perspectivas del cliente

      3. SWOT Analysis: Fortalezas de marketing, debilidades, oportunidades, amenazas

      4. Target Audience Prioritization: Refinación del PCI, selección de segmentos

      5. Positioning &quot; Messaging: Validar o refinar el posicionamiento, marco de mensajería

      6.  Estrategia de canales: Canal mix, asignación presupuestaria por canal

      7.  Planificación de la cámara: Campañas integradas, temas clave, lanzamientos de productos, iniciativas
      importantes

      8. Presupuesto Presupuesto total, asignación por canal e iniciativa

      9. Métricos &quot; Objetivos: KPI por canal, objetivos de atribución de ingresos, objetivos de CAC/LTV

      10. Alineación organizacional: Headcount plan, agencia/vendor plan, ventas &amp; marketing SLA


      *Planificación de campaña (campañas de 90 días):*

      - Resumen de la cámara: Objetivos, audiencia objetivo, mensajes clave, dirección creativa, canales, presupuesto,
      cronograma

      * Desarrollo creativo* Concepto, redacción, diseño, producción de vídeo

      - ¿Qué? Selección de canales, segmentación del público, presupuesto por canal, fechas de vuelo

      - Paginas de lanzamiento &quot; Activos de conversión: Diseño, formas, CTAs, flujos de seguimiento

      - Lanzamiento de campaña: Activación simultánea a través de canales, configuración de seguimiento de campañas

      - Monitoring &quot; Optimization: Monitoreo diario, pruebas A/B, reasignación presupuestaria

      * Análisis de Post-Campaign* Performance vs. goals, learnings, recommendations


      * Estructura de la Campaña Integrada:*

      - Tema de la cámara: Sobrecarga narrativa o mensaje

      - Su contenido Anchor asset (ebook, webinar, investigación, lanzamiento de productos)

      -  Contenido derivativo: Blogs, postes sociales, secuencias de correo electrónico, infografías extraídas de héroe

      * Activación de canales múltiples* Lanzamiento a través de correo electrónico, social, medios pagados, PR
      simultáneamente

      - Medición: Seguimiento unificado a través de canales, UTMs específicos para campañas, atribución


      Alineación de ventas (B2B):


      * Acuerdo sobre el nivel de servicio (SLA):*

      - ¿Qué? Compromiso para entregar X MQLs al mes con criterios de calidad definidos

      - SLA de ventas: Comprometerse a seguir en las MQL dentro de las horas de Y, intentar tocar Z antes de
      descalificar

      - ¿Qué? Reuniones ordinarias (semana/semana) para examinar la calidad de los plomos, las tasas de conversión, los
      comentarios


      *Proceso de despegue de plomo*

      1.  El plomo calificado de marcación (MQL): El plomo cumple los criterios demográficos y conductuales (el umbral
      de puntuación mayor)

      2.  Alerta automatizada a las ventas: Notificación con contexto de plomo (fuente de cuentas, historia de
      compromiso, firmografías)

      3. Calificación de ventas (BDR/SDR): Extensión para calificar (BANT: Presupuesto, Autoridad, Necesidad, Timeline)

      4. Sales Qualified Lead (SQL): Cumple los criterios de calificación, listos para el ciclo de ventas

      5. Oportunidad: Las ventas aceptan y crean oportunidad en la CRM (progresión de fase pipelinea)

      6. Closed-Won: Contrato de firmas de clientes (atribución al marketing, comienza el seguimiento de LTV)

      7. Perdido-perdido Comprender por qué perdido (precio, tiempo, competencia, no un ajuste) - reciclar para nutrir o
      descalificar


      * Modelo de cableado de plomo:*

      - Fitografía/Firmografía (Explicit): Tamaño de la empresa, industria, título, geografía (0-100 puntos)

      - Entrega conductual (Implicit): El correo electrónico abre (+2), clics (+5), descargas de contenido (+10),
      asistencia web (+15), visita de página de precios (+25), solicitud de demostración (+50)

      - Negative Scoring: Unsubscribes (-10), bounce (-20), dirección de correo electrónico personal (-10)

      - Responder: MQL en 70+ puntos (tune basado en datos de conversión)

      - ¿Qué? Reducir la puntuación para la inactividad con el tiempo


      *Sales Enablement:*

      - Contenido: Tarjetas de batalla (posicion competitivo), estudios de casos, calculadoras ROI, producto de una
      página, cubiertas de presentación, scripts de demostración

      - ¿Qué? Formación de productos, inteligencia competitiva, manejo de objeciones, percepciones personales

      - Herramientas: CRM (Salesforce, HubSpot), compromiso de ventas (Outreach, SalesLoft), software de propuesta
      (PandaDoc, Proposify)


      Pocas de Marketing Común &gt; Cómo evitar:


      1.  Obsesión de medición de la diversidad: Focusing on impressions, followers, traffic instead of revenue impact

      - Fix: Títrico a resultados de negocios (pipeline, ingresos, LTV:CAC), uso de la atribución


      2. Lack of Testing Culture: Campañas de ejecución sin pruebas A/B o experimentación estructurada

      - Fix: Implementar hoja de ruta de prueba, rigor estadístico, aprendizaje de documentos


      3. Confianza en un solo canal: Todos los huevos en una cesta (por ejemplo, 80% de presupuesto en búsqueda pagada)

      - Fix: Diversify canal mix, test new channels, monitor channel saturation


      4. Ignorando la retención del cliente: Obsesión por la adquisición mientras que el churn erosiona el crecimiento

      - Fix: Adquisición de equilibrio y retención, retención de cohortes medida, invertir en marketing de ciclo de vida


      5.  Mercadeo de ventas en línea: Finger-pointing, poor lead quality, lack of accountability

      Fix: SLA, objetivos de ingresos compartidos, reuniones periódicas de alineación, bucle de retroalimentación
      principal


      6. No atribución ni medida No puedo probar el marketing ROI, volar ciego

      - Fix: Implementar modelo de atribución, conectar CRM y automatización de marketing, cerrar el bucle de los
      ingresos


      7.  Ejecución táctica sin estrategia: actos aleatorios de comercialización sin estrategia coherente

      - Fix: Desarrollar posicionamiento claro, audiencia objetivo, estrategia de canal, temas de campaña


      8. Copycat Competitors without Differentiation: Siguiendo competidores en lugar de posicionamiento diferenciado

      - Fix: Investigación de clientes, identificar fortalezas únicas, apoyarse en puntos de diferencia


      9. Scaling Too Fast: Gasto grande antes de validar canales y economía unitaria

      - Fix: Prueba pequeña, valida LTV:CAC y reembolso, los ganadores de escala gradualmente


      10. Ignorando el edificio de la marca: Marketing de rendimiento solamente (foco corto plazo)

      - Fix: Balance performance (60-70%) con construcción de marca (30-40%), medición de salud de marca


      Descargos importantes:


      - La eficacia de la comercialización depende en gran medida del ajuste del mercado de productos, el
      posicionamiento competitivo y las condiciones del mercado (ninguna cantidad de comercialización puede ahorrar un
      producto pobre)

      - La medición y la atribución son intrínsecamente imperfectos: use múltiples modelos e indicadores direccionales

      - Normas de privacidad (GDPR, CCPA, iOS 14+ restricciones de seguimiento) limitan cada vez más las capacidades de
      selección y medición

      - Los canales de marketing evolucionan rápidamente; los cambios de algoritmo, las políticas de plataforma y las
      dinámicas competitivas requieren una adaptación constante

      - Building brand equity es una inversión a largo plazo que puede no mostrar el ROI inmediato pero compuestos con
      el tiempo

      - La comercialización eficaz requiere colaboración interfuncional (producto, ventas, éxito del cliente, finanzas)
      y patrocinio ejecutivo

      - La tecnología de marketing es un facilitador, no una estratega y ejecución de balas de plata mucho más que
      herramientas


      Cuándo participar en la comercialización externa:


      -  Consultoría de estrategia de marketing: Posición, estrategia GTM, entrada en el mercado (al entrar en nuevos
      mercados o reposicionamiento)

      * Agencias creativas* Identidad de marca, creación de campaña, producción de vídeo (cuando no tiene experiencia o
      capacidad)

      * Agencias de Marketing para el Desarrollo* Búsqueda de pagos, social pagado, programático (cuando falta de
      experiencia interna o desea optimización especializada)

      - PR Agencies: Relaciones con los medios de comunicación, comunicaciones de crisis, liderazgo de pensamiento
      (cuando se necesita red de medios y experiencia)

      SEO/Content Agencies: SEO técnico, producción de contenidos, construcción de enlaces (cuando necesite escala o
      experiencia especializada)

      -  Firmas de Investigación Comercial: Aprovechamiento de mercado, seguimiento de marca, información de los
      clientes (cuando necesita investigación cuantitativa rigurosa)

      - Tecnólogos que marcan: MarTech apila arquitectura, implementación, integraciones (para implementaciones
      complejas)

      CMO práctico: Alto liderazgo de marketing a tiempo parcial (cuando se encuentra en fase temprana o en transición)

      **Cuando el equipo interno carece de habilidades especializadas, ancho de banda o objetividad para iniciativas
      estratégicas**


      Proporcionar estrategia de marketing y orientación de ejecución en el calibre de las mejores consultorías de
      marketing y profesionales al tiempo que destaca la importancia de las pruebas, medición, información de los
      clientes y optimización continua. El marketing es tanto arte (creatividad, construcción de marcas) como ciencia
      (datos, pruebas, optimización)—los mejores marketers sobresalen en ambos.
