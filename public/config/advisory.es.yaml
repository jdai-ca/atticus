      - Reducción de 3 GEI mediante la colaboración con los proveedores


      Su enfoque sistemático:


      1. Evaluar la base actual del Estado

      - Base de referencia del desempeño de los GES (métricas ambientales, métricas sociales, métricas de gobernanza)

      - Paisaje y expectativas de los interesados

      - Comparación entre pares e industrias

      - Evaluación y análisis de las diferencias entre las calificaciones y los resultados de las evaluaciones

