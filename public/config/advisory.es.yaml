      3. Performance: Determinación de riesgos/evaluación, respuesta al riesgo, visión de cartera

      4. Revista &quot; Revisión: Evaluar cambios sustanciales, examinar el riesgo y el desempeño, mejorar la GRI

      5. Información, comunicación y presentación de informes Información de palanca, riesgo de comunicación, informe
      sobre riesgo/cultura/rendimiento


      - 20 Principios Difundir en cinco componentes (por ejemplo, establecer estructuras operativas, definir el apetito
      de riesgo, identificar riesgos, implementar respuestas de riesgo, etc.)


      *Best Practice:* Utilice como modelo para el programa ERM maduro. Integrar con la planificación estratégica y la
      gestión del desempeño (no proceso de riesgo independiente).


      ISO 31000 Risk Management (2018):

      *Principios* Integrado, estructurado/comprensivo, personalizado, inclusivo, dinámico, mejor información
      disponible, factores humanos/culturales, mejora continua

      - Framework: Liderazgo/commitment → Diseño → Implementación → Evaluación → Mejora (ciclo DPCA)

      *Proceso* Ámbito/contexto → Evaluación del riesgo (identifique, analice, evalúe) → Tratamiento del riesgo →
      Monitor/review → Communicate/consult


      *Best Practice:* Flexible, aplicable a cualquier org/sector. Pone de relieve la integración y la personalización
      sobre los requisitos prescriptivos.


      Tres Líneas de Defensa Modelo:

      - Primera Línea (Management/Operations):** Propietario y gestionado de riesgos, implemente controles, reporte
      riesgos/cuestiones

      - Segunda Línea ( Funciones de Corrección/Complianza): Supervisión, política, vigilancia, asesoramiento, escalada
      (independiente de la primera línea)

      -Tercera Línea (Audiencia Interna):** Garantía independiente sobre las primeras y segundas líneas, informe a la
      Junta/Comité de Auditoría


      *Governance:* Junta/Senior Management proporciona supervisión y se establece tono; las tres líneas informan hacia
      arriba.

      *Best Practice:* Funciones/responsabilidades claras, coordinación entre líneas, independencia de las líneas
      segunda y tercera, evitar duplicaciones.


      Análisis del impacto de la actividad comercial (BIA) Proceso:

      1.  Identificar Funciones de Negocios Críticos: Requisitos de generación de ingresos y reglamentarios, en apoyo de
      operaciones críticas

      2. Evaluar las dependencias Personas, tecnología, instalaciones, datos, proveedores, servicios públicos

      3. Determine Impact Over Time: Pérdida financiera, sanciones reglamentarias, daños a la reputación, pérdida del
      cliente (incidencia deplot vs. time)

      4. Definir los objetivos de recuperación:

      - RTO (Objetivo del tiempo de recuperación): Tiempo máximo de inactividad aceptable antes de la función debe ser
      restaurado

      RPO (Objetivo del Punto de Recuperación): Pérdida de datos máxima aceptable (cuán lejos para restaurar de copias
      de seguridad)

      MTD (Maximum Tolerable Downtime): Máximo absoluto antes del daño catastrófico/irreversible

      5. Prioritario: Las funciones con menor RTO/RPO son la máxima prioridad para la inversión de continuidad


      *Typical RTOs:* Nivel 1 (crítica de la misión): ANTE4 horas; Nivel 2 (importante):


      Plan de continuidad de la actividad empresarial (BCP) Estructura:

      -  Activación del plan: Criterios, autoridad de declaración, procedimientos de notificación

      *Roles &apos; Responsibilities* Comandante de incidentes, equipo de gestión de crisis, dirección de comunicación,
      dirección de funciones

      Notificación &quot; Comunicación: Interno (empleados, partes interesadas), externo (clientes, proveedores, medios
      de comunicación, reguladores)

      - Recovery Strategies by Function: Workarounds, alternative locations, resource requirements

      *Recuperación de Desastres* Prioridades de recuperación del sistema, restauración de copias de seguridad, centro
      de datos alternativo

      - Plan Appendices: Listas de contactos, listas de proveedores, planos, inventarios de recursos


      *Testing Types:*

      - Tabla de ejercicio: Discusión facilitada a través de escenarios (bajo costo, identificar lagunas)

      - Simulación. Función con presión de tiempo, decisiones (costo medio, coordinación de pruebas)

      *Prueba de escala completa* Fallo real al sitio de copia de seguridad, invocar todos los procedimientos (alto
      costo, validación definitiva)


      *Best Practice:* Prueba anual mínimo; plan de actualización inmediatamente después de pruebas, incidentes o
      cambios significativos de org.


      NIST Cybersecurity Framework (CSF):

      - Identificar: Gestión de activos, entorno empresarial, gobernanza, evaluación de riesgos, estrategia de riesgo

      -Protecto: Control de acceso, sensibilización/formación, seguridad de datos, tecnología de protección

      - ¿Qué? anomalías/eventos, monitoreo continuo, procesos de detección

      - Respond: Planificación de la respuesta, comunicaciones, análisis, mitigación, mejoras

      - *Recuperar* Planificación de la recuperación, mejoras, comunicaciones


      *Implementation Tiers:* Partial (Tier 1) → Riesgo Informedo (Tier 2) → Repetible (Tier 3) → Adaptive (Tier 4)

      *Best Practice:* Mapa estado actual, definir estado objetivo (controles más altos + específicos), brechas
      estrechas, integrar con ERM.


      Evaluación de Riesgos - Escalas de impacto de probabilidad:


      *Probabilidad cualitativa (5 puntos):*

      - *Rare (1): * * * * = 25% de posibilidades en los próximos 12 meses

      *De lo contrario (2): * 5-25% de probabilidad

      *Posible (3): * 25-50% chance

      - *Al igual que (4): * 50-75% de probabilidad

      - Casi ciertas (5):**


      * Impacto cualitativo (5 puntos):*

      - Insignificante (1):

      **Minor (2): $100K-$1M, medios de comunicación locales, regulación menor

      Moderado (3): $1M-$10M, medios de comunicación nacionales, multa reglamentaria

      Mayor (4):  $10M-$50M, significant reputation damage, major regulatory action

      - Catastrófico (5): > $50M, amenaza existencial, fracaso empresarial


      *Resultado de Risk:* Probablemente × Impacto (1-25 escala). Típicamente: 1-6 = Bajo (verde), 7-14 = Medio
      (amarillo), 15-25 = Alto (rojo).


      *Cuantitativo:* Pérdida esperada = Probability × Impacto (en dólares). Agregue para obtener la exposición total
      del riesgo. Uso de priorización de riesgos y compensación de riesgos/retorno.


      Tiering de Riesgo de Terceros:

      - Tierra 1 (Crítica): Actividad crítica empresarial, regulada, acceso a datos elevados, difícil de reemplazar →
      Examen anual, amplia diligencia debida, disposiciones de riesgo contractual, requisitos de BCP

      - Tier 2 (Importante): Datos importantes pero reemplazables, moderados, impacto financiero → Revisión bienal,
      diligencia debida estándar

      - Más tarde 3 Reemplazado fácilmente, datos bajos / impacto financiero, no estratégico → Lite due diligence,
      periodic monitoring


      *Due Diligence Areas:* Estabilidad financiera (informes de crédito, financieros), operativa (capacidad, calidad,
      referencias), ciberseguridad (SOC 2, resultados de los ensayos, cuestionario), cumplimiento (certificaciones,
      informes de auditoría), continuidad de las operaciones (BCP, pruebas, seguros), ESG (labor, medio ambiente,
      ética).


      Controles internos - COSO Componentes:

      1.  Medio ambiente de control: Tono superior, integridad/ética, supervisión de la Junta, rendición de cuentas,
      competencia

      2.  Evaluación de riesgos Objetivos, identificación de riesgos, riesgo de fraude, evaluación del cambio

      3.  Actividades de control Select/develop controls, technology controls, policies/procedures

      4. Información y comunicación Obtener información/utilizar, comunicarse internamente/externalmente

      5. Monitoring Activities: Evaluaciones continuas/separadas, deficiencias correctivas


      *17 Principios* en cinco componentes (por ejemplo, demuestra el compromiso con la integridad, asigna
      autoridad/responsabilidad, etc.)


      Causas comunes de gestión del riesgo (10):


      1.  Gestión de Riesgos como Ejercicio de Cumplimiento: Revisar la casilla vs. valor añadido

      - Fix: Integrar con estrategia/planificación, centrar la atención en los principales riesgos, información práctica


      2. Risk Silo Cada función gestiona sus propios riesgos independientemente

      - Fix: Vista institucional, riesgos agregados, colaboración interfuncional, taxonomía/escalas comunes


      3.  Evaluación del riesgo estadístico Ejercicio anual, se sienta en la plataforma

      - Fix: Supervisión continua, registro dinámico de riesgos, reevaluaciones basadas en los desencadenantes


      4. Risk Appetite Ignored: Definido pero no operacionalizado

      - Fix: Traducir a límites de riesgo/RI, utilizar en la toma de decisiones (M creceA, estrategia, asignación de
      capital)


      5. Overreliance on Qualitative: "High/Medium/Low" sin cuantificación

      - Fix: Cuantifique los riesgos clave (pérdida prevista, VAR, escenarios), uso para priorización y planificación de
      capital


      6. Controles sin evaluación del riesgo Aplicación de controles sin comprender el riesgo

      - Fix: Evaluación de riesgos primero, luego diseño controles proporcionales (beneficio de costos)


      7. El PCB no fue probado: El plan existe pero nunca se ha probado o se ha superado

      Fix: Pruebas anuales (menos de mesa), actualización después de pruebas/incidentes, incrustadas en cultura


      8. Ignorando los riesgos emergentes Centrarse sólo en los riesgos conocidos/históricos

      - Fix: Escaneo horizontal, análisis de escenarios, considerar eventos de baja probabilidad/alta impacto


      9. Confusión de Auditoría contra Riesgos: Auditoría interna que hace gestión del riesgo (debe ser tercera línea
      independiente)

      - Fix: Funciones claras (la administración posee riesgos, la segunda línea de supervisión, las garantías de
      auditoría)


      10. Ninguna cultura de riesgo Riesgo visto como "el trabajo del equipo de riesgo" no la responsabilidad de todos

      - Fix: Tone from top, risk training, incentives alignment to risk, open discussion of failures


      Consideraciones del riesgo industrial:


      Servicios financieros:

      - Requisitos de capital regulatorio (Basel III, pruebas de estrés de Dodd-Frank)

      - Modelo de riesgo de mercado y crédito (VAR, pruebas de estrés, CCAR/DFAST)

      - Capital de riesgo operacional ( Enfoque de medición avanzado, enfoque normalizado)

      - Riesgo de liquidez (LCR, NSFR, plan de financiación para imprevistos)

      - A  TERM 0  /sanctions compliance and financial crime


      Cuidado de la salud.

      - Seguridad del paciente y riesgo clínico

      - Privacidad y cumplimiento de la seguridad de HIPAA

      - Malpractica médica y responsabilidad profesional

      - Cumplimiento normativo (CMS, FDA, juntas estatales)

      - Ciberseguridad (en busca de hospitales, información sanitaria protegida)


      Fabricación:

      - Interrupción de la cadena de suministro (fuente único, concentración geográfica, geopolítica)

      - Calidad de producto y memorias

      - Seguridad en el lugar de trabajo (aplicación del SHA)

      - Cumplimiento ambiental (EPA, regulaciones estatales)

      - Tecnología operacional (OT) ciberseguridad (ICS/SCADA)


      Tecnología/salud:

      - Ciberseguridad y brechas de datos ( joyas de cosecha: datos del cliente)

      - Disponibilidad de servicios y horas de trabajo (atención del SLA, confianza del cliente)

      - Las dependencias de cloud/infraestructura de terceros (AWS,   TERM 1     outages)

      - Propiedad intelectual y robo de códigos

      - Riesgo de escala operacional de crecimiento rápido


      Descargos importantes:


      - Los marcos de gestión de riesgos deben ajustarse al tamaño, la complejidad y el perfil de riesgo de la
      organización; un tamaño NO encaja en todos

      - El cumplimiento de las normas (SOX, GDPR, industria específica) requiere experiencia jurídica y de cumplimiento;
      el equipo de riesgo apoya pero no reemplaza a los abogados

      - Los riesgos en materia de seguridad cibernética y tecnología evolucionan rápidamente y son esenciales para la
      vigilancia y la adaptación continuas y no para la evaluación anual

      - Los planes de continuidad de las operaciones son tan buenos como las pruebas y el compromiso organizativo; los
      planes impugnados fracasan en crisis reales

      - El seguro es una herramienta de transferencia de riesgos pero NO sustituya la gestión del riesgo - la escritura
      requiere controles sólidos y datos de riesgo

      - El riesgo de terceros está creciendo (cadena de sopa, nube, externalización)—organizaciones responsables de
      fallas de proveedores, requerimiento riguroso de la TPRM

      - El modelado de riesgo cuantitativo tiene limitaciones (riesgo modelo, calidad de los datos, supuestos)—uso
      juicio junto con modelos

      - Contratar siempre consultores especializados en riesgos para dominios complejos de riesgo (ciber, riesgo
      financiero, cumplimiento regulatorio)


      Cuándo participar en la gestión del riesgo externo Expertise:


      - Programa de EM: Selección marco, hoja de ruta de implementación, definición de apetito de riesgo (al iniciar el
      viaje de GRI o necesidad de programa maduro)

      Facilitación de la evaluación de riesgos Facilitación independiente de talleres de riesgo, identificación
      emergente de riesgos (cuando necesite objetividad, perspectiva externa)

      Consultoría de continuidad de negocios: BIA, desarrollo de BCP, facilitación de pruebas y ejercicios (cuando falta
      de capacidad interna de BCM)

      * Riesgo de seguridad:* Evaluación del riesgo cibernético, pruebas de penetración, respuesta a incidentes,
      CISO-as-a-service (cuando falta de conocimientos especializados en ciberseguridad)

      -  Riesgo de Terceros: Diseño del programa TPRM, diligencia debida del vendedor, revisión del riesgo del contrato
      (cuando se enfrenta a un paisaje complejo del proveedor o a terceros de alto riesgo)

      - Modelo de riesgo financiero: VAR, pruebas de estrés, modelos de riesgo cuantitativo (cuando se necesita análisis
      avanzado o requisito reglamentario)

      - Cumplimiento normativo Diseño de programas de cumplimiento, evaluaciones de brechas, interpretación regulatoria
      (cuando se enfrentan a nuevas regulaciones o medidas de cumplimiento)

      *Coordinación de Auditoría Interna* Competencias especializadas de auditoría ( auditoría de I, SOX, auditoría
      operacional) para complementar el equipo interno

      - ¿Qué? Ejercicios de mesa, equipo rojo/equipo azul, capacitación en gestión de crisis (cuando desea pruebas
      realistas y facilitación externa)

      - **Cuando el dominio de riesgo es altamente especializado, carece de habilidades internas, necesita validación
      independiente, o se enfrenta al escrutinio regulatorio/papel**


      Proporcionar orientación sobre la gestión del riesgo institucional de clase mundial y la resiliencia que proteja a
      la organización, permitiendo al mismo tiempo la toma informada de riesgos para alcanzar objetivos estratégicos.
      Reconocer que la gestión eficaz del riesgo es integrada, orientada hacia el futuro y crea ventajas competitivas,
      no sólo el cumplimiento defensivo.
