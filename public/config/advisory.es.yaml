      Marcos de marcación y metodologías (Deep Dive):


      Marco de Posición de la Marca:


      *Positioning Statement Template:*

      Audiencia de emergencia: Para [cliente objetivo específico]

      -  Marco de Referencia Quien [estado de necesidad o oportunidad]

      *Punto de diferencia* Nuestro [producto/servicio] es [beneficio único]

      - Por qué creer:


      Ejemplo: "Para profesionales ocupados (target) que necesitan comidas rápidas y saludables (frame de referencia),
      HelloFresh es el servicio de kit de comidas (categoría) que ofrece recetas de cocina con ingredientes premeditados
      (POD) porque nos asociamos con granjas locales y empleamos chefs profesionales para crear menús diversos y
      equilibrados (RTB)".


      *Points of Parity (POPs) vs. Points of Difference (PODs):*

      - POP: Atributos necesarios para competir pero no suficiente para diferenciar (por ejemplo, cada smartphone debe
      tener una cámara)

      - ¿Qué? Atributos únicos que impulsan la preferencia (por ejemplo, integración de los ecosistemas de Apple,
      seguridad de Volvo)

      - Posición más fuerte = PODs fuertes + Conocer POPs categoría


      * Mapping perceptual*

      - Marcas de mapa en 2-3 atributos clave (por ejemplo, precio vs. calidad, tradicional vs. innovador)

      - Identificar oportunidades de espacio blanco (segmentos no merecidos)

      - Comprender el conjunto competitivo y los sustitutos

      - Supervisar la posición con el tiempo (estudios de seguimiento)


      Customer Journey Mapping:


      *Viaje en el escenario:*

      1.  Conciencia: El cliente se hace consciente del problema o necesidad

      - Canales: Marketing de contenidos, SEO, PR, publicidad de visualización, redes sociales, palabra de boca

      - Objetivo: Introducir el set de consideración

      - métricas: impresiones, alcance, conciencia de marca (adivino/sin ayuda), tráfico web


      2. Consideración: El cliente investiga soluciones y evalúa opciones

      - Canales: Sitio web, páginas de productos, sitios de comparación, opiniones, estudios de casos, webinars, demos

      - Objetivo: La marca Shortlist como opción viable

      - métricas: compromiso del sitio web (páginas por sesión, hora en el sitio), descargas de contenido, solicitudes
      de demostración, tarifas abiertas por correo electrónico


      3. Purchase/Conversión El cliente toma la decisión de compra

      - Canales: Equipo de ventas, checkout de comercio electrónico, conversión de prueba gratuita, página de precios

      - Objetivo: Cerrar la venta

      - Métricas: Tasa de conversión, tasa de abandono del carrito, tasa de ganancia, duración del ciclo de ventas


      4. Retención/A bordo: El cliente obtiene valor y continúa utilizando el producto

      - Canales: Correos electrónicos a bordo, mensajería en aplicación, éxito del cliente, base de conocimientos,
      soporte

      - Objetivo: Conducir la activación, el compromiso y prevenir churn

      - métricas: tasa de activación, adopción de características, DAU/MAU, tasa de churn, NPS


      5.  Promoción: El cliente se convierte en promotor y se refiere a otros

      - Canales: Programas de referencia, opiniones, testimonios, estudios de casos, contenido generado por el usuario,
      comunidad

      - Objetivo: Generar crecimiento de palabra de boca

      - métricas: NPS, tasa de remisión, coeficiente viral (k-factor), calificaciones de revisión, menciones sociales


      *Proceso de Mapeo de Viaje:*

      - Definir personas y segmentos

      - Comportamiento de los clientes de investigación (entrevistas, encuestas, análisis, grabaciones de sesión)

      - Mapa touchpoints en cada etapa (todas las interacciones con marca)

      - Identificar puntos de dolor y momentos de verdad

      - Asignar propiedad (que es responsable de cada punto de contacto)

      - Proyectos de diseño para mejorar la experiencia

      - Impacto de medición e itinerario


      Mercadeo de crecimiento (Metrices de piratas AARRR):


      1.  Adquisición ¿Cómo te encuentran los usuarios?

      - Canales: Orgánica (SEO, contenido, social), pagada (SEM, visualización, anuncios sociales), derivación, directa

      - métricas: tráfico por fuente, CAC por canal, costo por clic (CPC), costo por plomo (CPL)

      - Optimización: optimización de mezclas de canales, pruebas creativas, segmentación de audiencias, estrategias de
      licitación


      2. Activación ¿Los usuarios tienen una gran primera experiencia?

      - Definición: Usuario completa el hito de activación clave (por ejemplo, perfil completo, primera acción, "momento
      de acción")

      - métricas: Tasa de activación (% de los registros que activan), tiempo de activación, puntos de desplegable en el
      a bordo

      - Optimización: Rediseño a bordo, indicadores de progreso, optimización del estado vacío, a bordo personalizado


      3. Retención ¿Regresan los usuarios?

      - Análisis de cohortes: Track % de usuarios que regresan Día 1, Día 7, Día 30, Mes 1, Mes 3, Mes 6, etc.

      - Métricas: Tasa de caña, curvas de retención, ratio DAU/MAU (adhesivo), tasa de resurrección

      - Optimización: bucles de compromiso (notificaciones, correos electrónicos, activadores de aplicación), adopción
      de características, formación de hábitos, campañas de recuperación


      4. Revenue: ¿Cómo se monetiza?

      - Modelos de monetización: suscripción, transacción, publicidad, freemium, basado en el uso

      - métricas: ARPU (ingreso promedio por usuario), conversión a ingresos pagados, de expansión, LTV

      - Optimización: experimentos de precios, embalaje, upsell/cross-sell, reducción de fricción de pago


      5. Referencia: ¿Los usuarios dicen a otros?

      - Coeficiente Viral (k-factor) = (Invitados por usuario) × ( Tasa de conversión de invitaciones)

      - k > 1 = crecimiento viral (cada usuario trae más de un nuevo usuario)

      - métricas: coeficiente Viral, tasa de referencia, tasa de conversión de referencia, tiempo de ciclo

      - Optimización: Diseño de programas de referencia (incentivos, recompensas de doble cara), mecánica compartida,
      viralidad de producto (efectos de red, compartir contenidos)


      Optimización del embudo de marcación:


      *TOFU (Top of Funnel) - Conciencia:*

      - Objetivo: Generar conciencia y conducir tráfico calificado

      - Canales: Marketing de contenidos, SEO, social pagado, publicidad de visualización, PR, eventos, podcasts

      - Contenido: Blogs, infografías, videos, podcasts, libros electrónicos, informes de investigación,
      herramientas/calculadores

      - métricas: impresiones, alcance, tráfico, costo por visitante, tasa de rebote, tiempo en el sitio

      - Optimización: segmentación de audiencias, pruebas creativas, calidad de contenido, optimización SEO


      *MOFU (Middle of Funnel) - Examen:*

      - Objetivo: Nurture lidera y construye preferencia

      - Canales: Campañas de crianza de correo electrónico, retargeting, webinars, demos, contenido de comparación,
      estudios de casos

      - Contenido: Webinars, whitepapers, estudios de casos, guías de comparación de productos, contenido de FAQ, videos
      demo

      - métricas: compromiso de correo electrónico, descargas de contenido, asistencia web, volumen MQL, tiempo en etapa

      - Optimización: puntuación de plomo, personalización de correo electrónico, secuencias de retargeting, contenido
      de habilitación de ventas


      *BOFU (Bottom of Funnel) - Conversión:*

      - Objetivo: Convertir leads en clientes

      - Canales: Extensión de ventas, página de precios, checkout, prueba gratuita, demostraciones de ventas, proceso de
      propuesta/proceso de citas

      - Contenido: Información de precios, calculadoras de ROI, testimonios, docs de seguridad/cumplimiento, garantía de
      ventas

      - métricas: Tasa de conversión, tasa de ganancia, duración del ciclo de ventas, tamaño de acuerdo, velocidad de
      tubería

      - Optimización: alineación de ventas y comercialización, enrutamiento de plomo, plantillas de propuestas, manejo
      de objeciones, tácticas de urgencia


      Costo de adquisición de clientes (CAC) &quot; Unidos Economics:


      *CAC Cálculo:*

      - CAC = (Gastos de Ventas y Marketing) / (Nuevos Clientes Adquiridos)

      - CACBlancado: Gasto total de S lima / total de nuevos clientes (incluye orgánicos)

      - ¿Qué? Gasto de marketing pagado / clientes de canales pagados (más preciso para escalar)

      - CAC por Canal: Isolate CAC por canal de adquisición para optimizar la asignación presupuestaria

      - CAC totalmente cargado. Incluye sueldos, gastos generales, programas informáticos, organismos (costo real)


      *Customer Lifetime Value (LTV):*

      - Simple LTV: Ingreso promedio por cliente × Vida media del cliente

      - ¿Qué? Suma de ingresos de cohorte con el tiempo (más preciso)

      - LTV Fórmula: (ARPU × Margin bruto) / Churn Rate

      * Ejemplo: ($100/mes ARPU × 80% margen) / 5% mensual churn = $1,600 LTV


      *Unit Economics Rules of Thumb:*

      - LTV:CAC Ratio: Debe ser ≥ 3:1 (es decir, $3 de LTV por cada $1 de CAC)

      * 1:1 = Insostenible (perder dinero en cada cliente)

      * 1:1 a 3:1 = Marginal (puede ser aceptable para los mercados terrestres y económicos o estratégicos)

      * 3:1 = Saludable (bueno margen de ganancia, espacio para invertir en crecimiento)

      * 10:1 = Inversión en el crecimiento (debería gastar más en la adquisición)

      -  Período de devolución de CAC: Tiempo para recuperar CAC de los ingresos del cliente

      * Meta: 12 meses para la mayoría de las empresas

      * Fórmula: CAC / (ARPU × Margin bruto)

      * Ejemplo: 1.200 CAC / ($100 ARPU × 80% margen) = 15 meses de reembolso

      - Regla de 40 (SaaS): Tasa de crecimiento de ingresos + Margen de ganancia ≥ 40%

      * Balances crecimiento y rentabilidad

      * Ejemplo: crecimiento del 30% + margen de ganancia del 15% = 45% (excelentes Regla de 40)


      Modelos de Atribución Comercial:


      1. Atribución de primer toque: 100% crédito al primer punto de contacto (centro de conciencia)

      - Pros: Simple, bueno para el análisis de canal de alto nivel

      - Cons: Ignores nurturing and conversion touchpoints


      2. Atribución del último toque: Crédito del 100% al último punto de contacto antes de la conversión (centro de
      conversión)

      - Pros: Simple, se alinea con el marketing de respuesta directa

      - Cons: Ignora la conciencia y la consideración de los puntos de contacto, sobre-créditos de abajo-funnel


      3. Atribución a la luz: Crédito igual a todos los puntos de contacto

      - Pros: Reconoce todos los puntos de contacto, simple

      - Cons: No importa el peso de diferentes etapas


      4. Atribución a la hora de decidir: Más crédito a puntos de contacto más cercanos a la conversión

      - Pros: Reconoce que los puntos de contacto recientes tienen más influencia

      - Cons: May undervalue early awareness touchpoints


      5. U-Shaped (Position-Based) Atribución: 40% primero, 40% último, 20% puntos de contacto medio

      - Pros: Valores tanto la conciencia como la conversión

      - Cons: El peso arbitrario, puede no coincidir con la influencia real


      6.  Atribución rota de W: Crédito al primer toque, creación de plomo, creación de oportunidades, cierre
      (MQL-heavy)

      - Pros: Reconoce hitos clave en el embudo B2B

      - Cons: Complejo, requiere integración con CRM


      7.  Atribución Algorítmica (Data-Driven): El aprendizaje automático determina el crédito basado en datos reales

      - Pros: Lo más preciso, se adapta a su viaje de cliente específico

      - Cons: Requiere gran volumen de datos, caja negra, complejo para implementar


      *Elige el modelo de atribución:*

      -  Ciclo de ventas corto + foco de respuesta directa: Último toque

      -  Ciclo de ventas largas + puntos de contacto múltiples: Multi-touch (en forma de U, en forma de W o algoritmo)

      -  Enfoque de sensibilización de la marca: Primer toque o lineal

      - Mixed objectives: Algoritmic (si hay datos suficientes) o en forma de U/W

      Mejor práctica. Utilice múltiples modelos para triangular la verdad, realizar pruebas de incrementalidad para
      validar


      Modificación de mezcla de marcación (MMM):

      - Modelo econométrico de eficacia de marketing

      - Utiliza datos históricos para cuantificar el impacto de cada canal de marketing en ventas/regresos

      - Cuentas para estacionalidad, factores macroeconómicos, actividad competitiva

      - Producto: ROI por canal, asignación presupuestaria óptima, reducción de curvas de rendimiento

      - Pros: Vista Holística, cuenta con canales sin conexión, bueno para el marketing de marca

      - Cons: Requiere 2-3 años de datos, retrospectivamente, no captura viajes a nivel de usuario

      - Complemento con atribución para imagen completa


      Estrategia de comercialización del contenido


      * Marco de Estrategia de Contenido*

      1. Audience Research: Personas, puntos de dolor, preguntas, hábitos de consumo de contenido

      2.  Auditoría de la competencia Inventario del contenido existente, identificar lagunas, retirar contenido
      obsoleto

      3. Keyword Research: Volumen de búsqueda, dificultad de palabra clave, intención de búsqueda (informacional,
      navegacional, transaccional)

      4. Content Pillars: 3-5 temas básicos que apoyan los objetivos empresariales y las necesidades del público

      5.  Tipos de contenido: Blogs, ebooks, whitepapers, estudios de casos, infografías, videos, podcasts, webinars,
      herramientas/calculadores

      6.  Calendario editorial: Temas de contenido, calendario de publicación, propiedad, plan de distribución

      7.  Distribución del contenido Canales propios (blog, email, social), canales ganados (PR, postes de invitados),
      amplificación pagada

      8.  Medidas: Tráfico, compromiso (tiempo en página, profundidad de desplazamiento), conversiones, backlinks,
      rankings


      *SEO Content Strategy:*

      - Keyword Targeting: Una palabra clave primaria por página/post, palabras clave secundarias, variaciones de cola
      larga

      - Búsqueda Intent Matching: Informational (how-to guides), navigational (marcas de búsqueda), transaccional
      (páginas de productos), investigación comercial (comparaciones, revisiones)

      - Content Depth: El contenido completo (más de 2.000 palabras para palabras clave competitivas) supera el
      contenido delgado

      - Clusters temáticos: Página de Pilar (tópico de la encrucijada) + contenido de racimo (subtópicos) con conexión
      interna

      - Content Refresh Actualizar el contenido de alto rendimiento existente para mantener las clasificaciones

      - Edificio Link: Crear activos vinculables (investigación, herramientas, infografías), extensión para backlinks


      *Etiqueta de embudo constante:*

      - TOFU Content: Temas amplios, contenido en escenario de conciencia, entradas de blog impulsadas por SEO

      - MOFU Contenido: Puntos de dolor específicos, educación de solución, contenido cerrado (ebooks, webinars)

      -  Contenido de BOFU: Contenido específico de productos, estudios de casos, páginas de comparación, precios,
      demostraciones


      Digital Advertising Best Practices:


      *Búsqueda de pago (           Ads, Bing Ads):*

      -  Estructura de la cámara: Organize by product/service, match types (exact, expression, broad), separate brand
      vs. non-brand

      - Estrategia de la palabra clave: Palabras clave de alto contenido (fundo inferior), palabras clave de cola larga
      (PC inferior, conversión superior), palabras clave negativas (excluir búsquedas irrelevantes)

      - Ad Copy: Incluye la palabra clave en titular, proposición de valor claro, CTA fuerte, uso de extensiones de
      anuncios (links de sitio, callouts, snippets estructurados)

      - Cuality Score: Relevancia (ad copy coincide con palabras clave), landing page experience, expected CTR → higher
      QS = lower CPC

      Estrategia de licitación: Manual CPC (control), CPC mejorado (auto-bidding with manual baseline), Target CPA,
      Target ROAS (automated bidding)

      -  Optimización de página de envío: Coteje del mensaje (ad copy se alinea con landing page), CTA claro, fricción
      mínima, tiempo de carga rápido, optimizado para móviles


      *Pagado Social (Facebook, Instagram, LinkedIn, Twitter):*

      - Audience Targeting: Demografías, intereses, comportamientos, audiencias similares (1%, 2-5%, 6-10%), retargeting
      (visitantes web, listas de correo electrónico, participantes)

      -  Prácticas óptimas creativas: Creativo de golpes de tumb (primer 3 segundos críticos), contenido generado por el
      usuario (testimonios, reseñas), video supera las versiones estáticas, prueba múltiples

      - Objetivos de campaña: Sensibilización (entrega, impresiones), consideración (tráfico, compromiso, vistas de
      vídeo, gen de plomo), conversión (compchas, firmas, instalación de aplicaciones)

      - Lo siento. Comience con una oferta de bajo costo para aprender, pasar a costra o gorro de puja para la
      eficiencia, optimización del presupuesto de la campaña de prueba (CBO)

      -  Fatiga Ad: Frecuencia de monitor (objetivo 3-5), refrescar creativo regularmente, rotar nuevos creativos

      -  Seguimiento de conversiones: Aplicación Pixel/  TERM 1   , seguimiento de eventos, conversión   TERM 4   
      (Seguimiento de servidor para iOS 14+ privacidad)


      *Display &amp; Programmatic:*

      Targeting: Contextual (basado en el contenido), conductual (actuaciones del usuario), retargeting (visitantes del
      sitio web), parecido, demográfico

      -  Formatos creativos: Anuncios de Banner (300×250, 728×90, 160×600), anuncios nativos, anuncios de vídeo, medios
      ricos

      -  Métodos de compra: Compras directas, RTB programático (predación en tiempo real), garantía programática,
      mercado privado (PMP)

      - Verabilidad: Objetivo para la visualización de √°70% (según se ha visto realmente), evite las colocaciones por
      debajo del doble

      - Seguridad de la marca: Use listas blancas/listas negras, evite redes de anuncios de baja calidad


      *Retargeting Strategy:*

      - Audience Segmentation: Visitantes de la página de productos (frío), visitantes de la página de productos
      (calor), carritos (calor), compradores anteriores (upsell/cross-sell)

      -  Personalización creativa: Mostrar productos vistos, abandonar el cart mensajería, ofertas especiales para
      visitantes comprometidos

      - Frequency Capping: Limite las impresiones por usuario (evitar la fatiga ad), típicas 3-5 impresiones por día

      - Retargeting del dispositivo:** Track users across devices (deterministic or probabilistic matching)

      - Exclusiones: Suppress convertidores recientes (1-7 días), exclusiones de seguridad de marca


      Email Marketing &amp; Marketing Automation:


      *Email Types & Use Cases:*

      1.  Emails profesionales: Productos lanzados, ventas, ofertas de tiempo limitado

      2. Newsletter: Contenido regular, liderazgo del pensamiento, actualizaciones de la empresa

      3.  Emails Transaccionales: Confirmaciones de pedidos, notificaciones de envío, reajustes de contraseña (tasas
      abiertas más altas, garantizar valor añadido)

      4. Los desencadenantes conductuales: Carrito abandonado, buscar abandono, seguimiento post-purchase, reingeniería

      5. Lifecycle/Nurture: Secuencias de a bordo, campañas educativas de goteo, alimentación de plomo

      6. Segmented Campaigns: Meta para personas específicas, comportamientos, Firmografías


      *Email Best Practices:*

      - Subject Lines: 40-50 caracteres, personalización (nombre, empresa), urgencia o curiosidad, evitar los
      disparadores de spam (FREE, !!!!)

      - Texto del director: Reforzar la línea de asunto, proporcionar contexto adicional (primer ~100 caracteres de
      correo electrónico)

      - Denombre: Nombre personal de la marca > (mejor tarifas abiertas), consistencia

      - Segmentación: Demografía, conductual (nivel de ingeniería, historia de la compra), etapa del ciclo de vida,
      persona

      - *Personalización* Más allá del primer nombre - contenido basado en comportamiento, preferencias, compras pasadas

      -  Optimización mínima: 50%+ se abre en el diseño móvil, sensible, botones CTA grandes, contenido escaneado

      - A/B Testing: Temas, desde nombres, tiempos de envío, CTAs, contenidos, ofertas

      - Deliverability: Limpiar la higiene de la lista (remove bounces, unengaged), evitar trampas de spam, calentar
      IPs, autenticar (SPF, DKIM, DMARC)


      *Métricos:*

      -  Tarifa abierta: % de los correos electrónicos entregados abiertos (marca de banco 15-25%)

      - Tasa de click-Through Rate (CTR): % de correos electrónicos entregados clicados (marca de banco 2-5%)

      -  Tasa de clic a abrir (CTOR): % de las aberturas que hicieron clic (medidas relevancia de contenido)

      -  Tasa de conversión: % de los correos electrónicos que llevaron a la acción deseada

      Tasa de descríbete:  Mantenerse informado   VER 5 %, monitorear tendencias

      -  Tarifa del cuerpo: Rebote duro (remove inmediatamente), rebote suave (temporario)

      - Denuncias de sueldos: Mantener el riesgo de liberación mayor


      *Marketing Automation Workflows:*

      - ¿Qué? secuencias de correo electrónico multi-touch basadas en el comportamiento y el compromiso

      - Cobertura de cuentas: Assign points for behaviours (email opens, page visits, content downloads, webinar
      attendance), demographic fit → prior for sales

      - MQL a SQL Handoff: Alerta automatizada a las ventas cuando el plomo alcanza la puntuación del umbral

      - Automatización a bordo: Serie de bienvenida, educación de productos, desencadenantes de adopción de
      características

      - Reiniciación Identificar usuarios inactivos, desencadenar campañas de recuperación, no retrocesos de puesta de
      sol

      - Sales Enablement: Alertas para comportamientos de alto contenido (visita de página de precios, solicitud de
      demostración, comparación de competidores)


      B2B vs. B2C Marketing Differences:


      *B2B Características:*

      - Decision-Making:** Comité-basado, múltiples partes interesadas (usuario, influencer, comprador económico,
      campeón)

      * Ciclo de ventas: * Más largo (3-18 meses para la empresa), multi-touch, basado en la relación

      - Contenido: Liderazgo de pensamiento, orientado hacia el ROI, estudios de casos, documentos blancos

      - ¿Qué? LinkedIn, búsqueda, correo electrónico, webinars, ferias comerciales, ventas directas, ABM

      - *Métricos* Pipeline generado, volumen MQL/SQL, valor de oportunidad, tasa de ganancia, longitud del ciclo de
      ventas

      - Mensajería: Proposición de valor, ROI, mitigación de riesgos, experiencia en la industria


      *B2C Características:*

      - Decision-Making:** Compras individuales o domésticas, impulsadas por emociones, impulsos

      Ciclo de ventas:** Más corto (minutos a días), transaccional

      - *Contenido* Incorporación, aspiración, generación de usuarios, revisiones, avalados de influencers

      - ¿Qué? Facebook, Instagram, TikTok,   TERM 2  Compras, correo electrónico, display, retail

      - *Métricos* Ingresos, ROAS, CAC, LTV, tasa de conversión, abandono del carrito

      - Mensajería: Beneficios emocionales, prueba social, estilo de vida adecuado, gratificación instantánea


      Emerging Marketing Trends &amp; Channels:


      * Crecimiento comunitario:*

      - Construir comunidades comprometidas (Slack, Discord, foros, grupos de usuarios)

      - Contenido generado por el usuario y soporte entre pares

      - Miembros de la comunidad como defensores de la marca

      - Ejemplos: Noción, Figma, comunidades pelotonas


      * Crecimiento alimentado por productos (PLG):*

      - El producto es el conductor primario de adquisición, activación, retención

      - Modelos de Freemium o de prueba gratuita

      - Loops Virales construidos en producto

      - Autoservicio a bordo, mínima fricción de ventas

      - Ejemplos: Slack, Zoom, Dropbox, Calendly, Loom


      * Marketing Conversacional:*

      - En tiempo real, conexiones de uno a uno a través de chatbots, chat en vivo, aplicaciones de mensajería

      - Califica los leads al instante, reuniones de libros, respuestas preguntas

      - Plataformas: Drift, Intercom, guías cualificados, WhatsApp Business


      *Short-Form Video:*

      - TikTok, Instagram Reels, YouTube Shorts

      - Auténtico, entretenido, contenido educativo

      - Asociaciones creadoras y contenido generado por el usuario

      - Sonido, primer plano móvil, formato vertical


      *Podcast Advertising:*

      - Anuncios de lectura anfitriona (confianza más alta, mejor rendimiento)

      - Respuesta directa (códigos promocionales) vs. conciencia de la marca

