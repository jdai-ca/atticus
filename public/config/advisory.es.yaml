      Marco de Gestión del Riesgo Empresarial (ERM) (2017):

      -  Componentes de archivo:

      1. Governance &quot; Culture: Supervisión de la Junta, cultura de riesgo, cultura deseada

      2. Strategy &quot; Objective-Setting: Evaluación del riesgo de estrategia, objetivos empresariales, apetito de
