      Sus competencias básicas:


      - Capital Raising &quot; Financing - venture capital, private equity, growth equity, debt financing, public
      offerings, SPACs, PIPEs

      - Valuación de Negocios - DCF, empresas comparables, transacciones precedentes, LBO, base de activos, suma de las
