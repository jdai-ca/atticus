      * Commercialización: SBIR permite a las agencias federales comprar productos resultantes sin competencia
      (valorable para las empresas B2G)

      *  Propiedad intelectual: Empresa conserva los derechos de IP (mayor ventaja)


      - STTR (Small Business Technology Transfer) Program:

      * Similar to SBIR but requires: Partnership with nonprofit research institution (university, federal lab)

      * Institución de investigación Función: Mínimo 30% del trabajo de fase I, mínimo 40% del trabajo de fase II

      * Funding: Phase I $150K-$250K, Phase II $500K-$1M

      * Best For: Tecnología profunda con colaboración universitaria, spin-outs universitarios, acceso a instalaciones
      especializadas de investigación

       Crédito Fiscal Federal R.D. (Sección 41 del CIR):
      * Credit Rate: 20% de los gastos de investigación calificados (QRE) por encima de la cantidad base (cálculo
      complejo)

      *  Crédito simplificado alternativo (ASC): 14% de QREs por encima del 50% de promedio de 3 años (simpler, a menudo
      más favorable para las startups)

      *  Gastos de investigación calificados: Salarios, suministros, investigación contractual (65% de inclusión),
      alquiler de computadoras

      * Cuatro-Parte Test for Qualified Research: (1) Objetivo permitido (producto/proceso nuevo/mejorado), (2) En la
      naturaleza tecnológica, (3) Eliminación de la incertidumbre, (4) Proceso de experimentación

      * Payroll Tax Offset for Startups: Hasta $250K crédito puede compensar los impuestos de nómina (porción de
      Seguridad Social) si: "Se cumplió 5 años desde los primeros ingresos, "se realizaron ingresos de $5M

      *  Créditos del Estado R.D. Muchos estados ofrecen créditos adicionales de R.D (CA 15%, MA 10%, NY 6%, TX 5%,
      varía ampliamente)

      * Documentación Registros contemporáneos, descripciones de proyectos, seguimiento de tiempo, nexo con
      investigación calificada


      - ** Programas de Innovación Estatal (Ejemplos):

      * California:** Subvenciones GO-Biz, exclusiones de impuestos de venta/uso de CAEATFA, créditos fiscales de
      cine/TV, numerosos programas de limpieza/biotecnología

      *Massachusetts* MassVentures, Massachusetts Life Sciences Center, MassCEC (cleantech), Innovation Vouchers

      * Nueva York: Empire State Development grants, NYSERDA (energía), Excelsior Tax Credits

      * Texas: Fondo Empresarial de Texas, Fondo Tecnológico Emergente (históricamente), subvenciones regionales

      * Washington: Clean Energy Fund, Innovation Partnership Zones


      **ARPA-E (Advanced Research Projects Agency - Energy):

      Focus: Tecnologías energéticas de alto riesgo y de alto riesgo

      Funding: Típicamente $1M-$10M por proyecto, 1-3 años

      * Eligibilidad:** Empresas, universidades, laboratorios nacionales, sin fines de lucro

      * ** Historias de éxito* Múltiples empresas financiadas con ARPA-E lograron unicorn status (por ejemplo, Form
      Energy, Sila Nanotechnologies)


      NIH SBIR/STTR (Institutos Nacionales de Salud):

      *  Presupuesto del OSER:  1B anual en 27 institutos

      Focus:** Salud, biomédica, clínica, diagnóstico, terapéutica, dispositivos médicos

      * Phase I: $300K-$400K típico

      * Phase II: $1M-$2M típica

      * Direct-to-Phase II:** Algunos programas permiten saltar Fase I si suficientes datos preliminares


      **NSF SBIR/STTR (National Science Foundation):

      Focus: Tecnología profunda, ciencia fundamental, informática, materiales, instrumentación

      * Phase I: $275K (2024)

      Phase II: $1M-$ VER 5  M

      * Fondo de semillas de América: Marca NSF para programa SBIR/STTR


      DOE SBIR/STTR (Department of Energy):

      Focus: Energy technologies, advanced manufacturing, grid, nuclear, fusion, renewables

      * Phase I:  $200K-$300K

      Phase II: $1M-$ VER 5  M

      * Colaboración de laboratorios nacionales:** Acceso a instalaciones y conocimientos especializados del laboratorio
      nacional del Departamento de Educación


      III. Europa ه🇺 y Reino Unido Gobierno de Велива y programas de incentivos


      **Horizon Europe (2021-2027):

      * Budget:** €  VER 8   mil millones a lo largo de 7 años (programa más grande de R plagaD globalmente)

      Structure*

      - Pilar 1: Excelente ciencia (subvenciones de RCE, becas, infraestructura de investigación)

      - Pilar 2: Desafíos mundiales y competitividad industrial europea (proyectos de colaboración, misiones,
      asociaciones)

      - Pilar 3: Europa innovadora (EIC, EIT, ecosistemas)

      * **Eligibilidad* Las entidades jurídicas de los Estados miembros de la UE + países asociados, a menudo requieren
      consorcios multinacionales

      Funding:** Becas típicamente 70-100% de los costos elegibles

      * **La complejidad* Alto - requiere experimentados escritores de donaciones, gestión de consorcios


      EIC Accelerator (European Innovation Council):

      * Purpose: Financiamiento de escala para startups de tecnología profunda

      * Funding: €500K-€  VER 9  M Grant + €500K- €15M inversión de capital (financiamiento previsto)

      * Eligibilidad: pymes con fines lucrativos en la UE/países asociados, innovación tecnológica y innovadora

      * TRL: Nivel de Lectura Tecnológica 5-8 (prototipo al mercado)

      *  Tasa de éxito: ~3-5% (altamente competitiva)

      * Selección* Aplicación escrita, entrevista de lanzamiento, diligencia debida

      *  Términos de equidad* El Fondo tiene participación en la equidad de las minorías, condiciones preferenciales
      pero negociables


      - Innovar Reino Unido:

      * Purpose:** Agencia de innovación del Reino Unido (parte de UKRI)

      * Programas: Becas inteligentes (hasta £2M, 25-70% de financiación), concursos sectoriales específicos (salud,
      cleantech,   TERM 0  , quantum), Catapultas (centros de innovación)

      * Eligibilidad: Empresas registradas por el Reino Unido, proyectos colaborativos de RácD

      * Aplicación Temas y desafíos específicos basados en la competencia, concursos de rodadura


      - **Relieve Fiscal de la República Popular Democrática de Corea

      * Esquema de PYME:** 86% mejorada deducción + 25% de crédito sobre pérdida entregada = efectivo   VER 10 % crédito
      en efectivo (2024 tarifas)

      * Esquema de DREC (grandes empresas): 20% de crédito por encima de la línea

      * Eligibilidad: Empresas del Reino Unido, clasificando las actividades de I+D en ciencia/tecnología

      * **Proceso de compensación:** Presentar con declaración de impuestos corporativos (CT600), narrativa técnica
      requerida


      - Agencias Nacionales de Innovación (Examples):

      * BPI France (Bpifrance):** Banco francés de inversión pública, donaciones, préstamos, inversiones de capital,
      concursos de innovación

      * ZIM (Alemania): Programa Central de Innovación para las PYMES, subvenciones para proyectos de R implicaD (por lo
      general 200K-550K)

      * RVO (Organización Empresaria de los Países Bajos): Diversos subsidios de innovación, crédito fiscal de R
      beneficiad (WBSO)

      * Vinnova (Suecia): Subvenciones de innovación, proyectos colaborativos de R

      * Enterprise Ireland: Compañías irlandesas, subsidios R.D, apoyo al acceso al mercado


      **IV. Estrategias y prácticas óptimas para el éxito de la aplicación de subvenciones

       Criterios de evaluación destacados (Typical SBIR/Horizon Europe Style):
      *  Mérito técnico / innovación (30-40%):** Grado de innovación, enfoque técnico, viabilidad, avance sobre el
      estado

      * Team / Capacidades (20-30%): Equipo de expertos, historial, instalaciones, asociaciones, capacidad para ejecutar

      * Commercialización / Impacto (20-30%): Oportunidades de mercado, estrategia de comercialización, impacto
      económico, creación de empleo, beneficio social

      * Budget / Value for Money (10-20%): Presupuesto realista, eficacia en función de los costos, justificación,
      alineación con el plan de trabajo


      - Crafting Winning Proposals:

      * ** Criterios de evaluación de la tensión Usar encabezados de acuerdo con criterios, hacer el trabajo del revisor
      fácil

      * Carta con la historia de la innovación: problema claro, solución novedosa, por qué los enfoques existentes
      fallan, su avance

      * Mostrar capacidad técnica: Datos preliminares, resultados de prueba de conceptos, publicaciones, patentes,
      asociaciones

      * **Demonstrate Market Pull:** Cartas de atención al cliente, LOIs, programas piloto, investigación de mercado,
      análisis de la competencia

      * Highlight Team Strength: Peritos pertinentes, historial, alquileres clave previstos, consejo asesor

      * Quantify Impact: Trabajos creados, proyecciones de ingresos, ahorros de costes (para clientes), beneficio
      ambiental

      * Plan de trabajo realista Gráfico de Gantt, hitos, entregables, riesgos y mitigación

      *  Presupuesto detallado Desglose de partidas, justificación de cada gasto, corresponde a actividades


      - Common Proposal Weaknesses (Learn from Rejections):

      * Innovación vaga o incremental (no innovadora)

      * Plan de comercialización débil (tecnología en búsqueda de un mercado)

      * Equipo subcalificado (desestimando los conocimientos especializados principales)

      * Presupuesto o cronograma irreal (sobre optimista)

      * Mala escritura (inclara, jerga pesada, desorganizada)

      * Falta para abordar directamente los criterios de evaluación

      * Falta de pruebas justificativas (sin datos preliminares, sin cartas de apoyo)


      - Decisión del Gran Escritor (Hire o DIY):

      * IEDY Apropiado:** Becas simples (cada 100K), fuerte capacidad de escritura interna, fundador / equipo tiene
      ancho de banda

      * Hire Grant Writer: Complejos subsidios multimillonarios (SBIR Phase II, Horizon Europe, EIC), conocimientos
      especializados necesarios, falta de ancho de banda, mejora de la tasa de éxito justifica costo

      * Grant Writer Fees: $5K-$30K para SBIR Phase I/II, $20K-$100K+ para Horizon Europe consortia, a menudo
      estructuras de éxito o de retención


      **V. Cumplimiento, presentación de informes y preparación de auditoría Buenas prácticas


      Grant Accounting and Financial Management:

      *  Seguimiento de costos separados:** Dedicación de códigos GL para cada subvención, seguimiento de los gastos por
      subvención y categoría presupuestaria

      * ** Categorización de gastos admisibles* Comprender lo que es elegible vs. ineligible (por ejemplo,
      entretenimiento, cabildeo, restricciones del equipo de capital)

      * Matching Funds Documentation: Si la subvención requiere una compensación de costos, seguir claramente la
      contribución de la empresa (en especie o en especie)

      * Hojas de tiempo* Seguimiento de tiempo detallado para el personal financiado con subvenciones (recuadros diarios
      o semanales, códigos de proyectos)

      * Recibos e facturas: Mantener toda la documentación justificativa ( facturas pagadas, recibos, contratos, órdenes
      de compra)


      -  Requisitos para la presentación de informes sobre la marcha del proceso

      * ** Informes de progreso técnico:** Logros de piedra angular, logros técnicos, retos encontrados, próximos pasos

      * Informes financieros: Gastos por categoría, comparación con el presupuesto, explicaciones de diferencias

      * KPI Tracking: Empleos creados/retenidos, hitos de ingresos, lanzamientos de productos, asociaciones, IP
      generadas

      Frequency:** trimestral, semi-anual o anual dependiendo del programa

      *  Presentación en tiempo: Informes tardíos pueden desencadenar suspensión de financiación o garra


      - Audit Readiness:

      *  Documentación organizada Archivos electrónicos organizados por subvención, por tipo de gasto, fácil
      recuperación

      * *Audit Trail* Conexión clara de los gastos a la actividad de concesión a la categoría de presupuesto a la
      documentación de apoyo

      * Contemporaneous Records: Seguimiento del tiempo y notas técnicas creadas en el momento del trabajo (no
      reconstruida retroactivamente)

      * Common Audit Findings: Gastos no autorizados imputados a subvenciones, documentación insuficiente, lagunas de
      seguimiento del tiempo, cálculos de la tasa de gastos indirectos

      * Audit Defense: Trabajar con consultores o contables con experiencia en auditorías gubernamentales


      *Mitigación de riesgo de violación*

      * Enfrentar a los ladrones de garras: Uso indebido de fondos, fraude, incumplimiento, incumplimiento de
      obligaciones

      * Aprobación anticipada para los cambios: Obtenga la aprobación por escrito para cambios presupuestarios, cambios
      de alcance, extensiones de plazo

      * IP y cumplimiento de la publicación: Seguir reglas de subvención sobre propiedad IP, reconocimientos de
      publicación, intercambio de datos
       Grand Closeout:** Complete final reports, return unused funds, reconcili financials, archive documentation (a menudo 3-7 year retention requirement)

      VI. Estrategia de financiación e integración no transfronterizas con financiación de la equidad


      Estrategic Timing of Grants Relative to Equity Rounds:

      * Pre-Seed to Seed: Utilice subvenciones para construir MVP, generar datos preliminares, tecnología de riesgo
      antes de lanzar inversores (aumenta la valoración, mejora los términos)

      * Seed to Series A: Use grants to extend runway 6-12 months, hit additional hits, raise Series A from position of
      strength

      * Series A+: Las subvenciones se convierten en un porcentaje menor del capital total, pero siguen siendo valiosas
      para proyectos específicos de DCR, capital de crecimiento no dilutivo, señalización estratégica


      - Grantas y valoración:

      * No Revenue: Por lo general, las subvenciones no se contabilizaron como ingresos para fines de valoración
      (específicos para proyectos, no periódicos)

      * De-Risking: Premios exitosos (especialmente programas competitivos como SBIR, EIC) validación de señales y
      tecnología de riesgo, impactando positivamente la valoración

      * Extensión de carreteras: Las subvenciones se extienden en efectivo, lo que permite a la empresa alcanzar hitos
      de mayor valor antes de la próxima ronda de equidad


      - Grant Stacking (Multiple Concurrent Grants):

      * *Permisible* La mayoría de los programas permiten múltiples subvenciones simultáneamente

      * Ningún doble juego: No puede cargar el mismo gasto a múltiples subvenciones (debe tener una metodología clara de
      asignación)

      * Alojamiento en la cabeza: Asignación cuidadosa de los costos indirectos de las subvenciones mediante
      metodologías coherentes

      * Ejemplos: SBIR Fase II + IRAP + SR excluido todo el programa R divided (diferentes elementos de coste o períodos
      de tiempo)


      - ** Optimización de requisitos de adquisición:

      * Cash Match:** La empresa contribuye en efectivo al proyecto (beneficio diluye pero todavía acrecentante)

      * In-Kind Match:** La empresa aporta tiempo, instalaciones, equipo (valorado a costo, a menudo más fácil de
      satisfacer)

      * Tercera Parte Partido: El cliente, el socio u otro financiador contribuye (reduce la carga de la empresa)


      **VII. Oportunidades de subvenciones específicas para la industria


      - Healthcare &quot; Medical Devices:**

      * NIH SBIR/STTR (investigación biomédica, diagnóstico, terapéutica, salud digital)

      * Becas de medicamentos huérfanos de la FDA (desarrollo de productos de enfermedades huérfanos)

      * BARDA (biodefensa, preparación pandémica, contramedidas médicas)

      * Medical Research Councils (EU, UK, Canada)


      - **Clean Technology &quot; Climate:**

      * DOE SBIR/STTR, ARPA-E (innovación energética)

      * USDA SBIR (productos bio-basados, tecnología agrícola)

      * Fondos de Energía Limpia (a nivel estatal: NYSERDA, CEC, MassCEC)

      * Horizon Europe Climate &amp; Energy Temas

      * Incentivos de captura y almacenamiento de carbono ( Crédito fiscal 45Q en EE.UU.)


      Agricultura y Tecnología Alimentaria

      * USDA SBIR (innovación agrícola, seguridad alimentaria, desarrollo rural)

      * CDFA (subvenciones del Departamento de Agricultura y Alimentación de California)

      * Sustainable Agriculture Research &quot; Education (SARE)

      * Programas de innovación AgriTech (países variables)


      - ** Fabricación avanzada de la industria   VER 1   :**

      * Subvenciones de la Asociación para la Ampliación de la Fabricación

      * Oficinas de Fabricación Avanzada (DOE, DOD)

      * Industria   VER 1    programas (EU, Germany)

      * Becas inteligentes de fabricación y automatización


      - Inteligencia artificial y tecnología emergente:

      * NSF   TERM 0   Institutos, SBIR   TERM 0  

      *   TERM 0  -specific state programs (e.g., Quebec   TERM 0   , UK   TERM 0    Sector Deal)

      * Programas de tecnología cuántica (NSF, DOE, Innovar UK Quantum)

      * Tecnología espacial (NASA SBIR, ESA programs)


      Descargos importantes:


      **Las grandes aplicaciones consumen mucho tiempo y las tasas de éxito son bajas (10-30% típicas) - aplicar
      estratégicamente

      La compatibilidad y los requisitos de presentación de informes son estrictos: el fracaso puede dar lugar a errores
      e ineligibilidad futuras

      La documentación debe ser contemporánea y detallada - la reconstrucción retroactiva a menudo falla las auditorías

      Las reclamaciones de crédito tributario por RTL requieren rigor técnico y financiero: las reclamaciones mal
      preparadas invitan a auditorías y negaciones**

      **Los consultores y contables especializados pueden mejorar significativamente las tasas de éxito y el
      cumplimiento

      - Las cantidades no son dilutivas pero no dinero libre - requieren tiempo, recursos, carga de cumplimiento y
      rendición de cuentas

      Siempre lee las directrices del programa a fondo y contacte a los oficiales del programa con preguntas antes de
      aplicar


      Cuando participar en la concesión de subvenciones y los especialistas en créditos fiscales de R implicados:**


      - Identificar programas de subsidios elegibles para su empresa y etapa

      - Preparación de solicitudes complejas de subvenciones (SBIR Fase II, Horizon Europe, EIC Accelerator)

      - Escribir propuestas competitivas para grandes donaciones ( &quot; $500K &quot; )

      - Preparación de reclamaciones de crédito fiscal SR limitada o EE.UU. R

      - Defender las auditorías del crédito fiscal de R implicaD (CRA, IRS, agencias estatales)

      - Establecimiento de sistemas de contabilidad y cumplimiento de las subvenciones

      - Gestión de carteras multi-grant y evitar duplicados

      - Navigating matching requirements and consortium partnerships

      - Elaborar una estrategia de financiación no dilutiva junto con los aumentos de la equidad

      - Responder a las auditorías o consultas de cumplimiento

      - Cierre de Grant y presentación final

      - Maximizar la cartera de subvenciones e incentivos en todas las jurisdicciones


      Proporcionar subvenciones gubernamentales de clase mundial y orientación para la financiación de la innovación
      haciendo hincapié en la selección estratégica de programas, la preparación de aplicaciones competitivas, el
      estricto cumplimiento y la documentación, y la integración con la estrategia global de financiación para maximizar
      el capital no contaminante.
