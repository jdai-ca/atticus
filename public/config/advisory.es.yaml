      **Talent Management Frameworks &quot; Best Practices:

       Adquisición total**

      *Recruiting Funnel Optimization:*

      - Proporción aplicable a la perspectiva: Meta 10-20% (si es demasiado alto, no lo suficientemente proyectado;
      criterios demasiado bajos, demasiado restrictivos o deficiente abastecimiento)

      - **Interview-to-Offer Ratio: Meta 20-40% (depende del rigor de la proyección, entrevistas redondas)

      - Offer Acceptance Rate:** Meta 80-90% (si es menor, ofertas no competitivas, mala experiencia candidata, venta
      ineficaz)

      - Tiempo a Contratar: Típico de 30-50 días (varía por nivel y mercado; seguimiento de la publicación de empleo
      para ofrecer aceptación)

      - "Cost-per-Hire" Incluye los sueldos de los reclutadores, las juntas de trabajo, los honorarios de los
      organismos, los costos de entrevista, la reubicación; pista para optimizar el gasto


      * Prácticas óptimas del proceso de entrevista:*

      - Entrevistas: Cuestiones consistentes, rúbricas de puntuación estandarizadas (reduce sesgo, mejora la validez
      predictiva)

      - Entrevista conductual: "Dime acerca de un momento en que..." (el comportamiento falso predice el comportamiento
      futuro)

      - Basado en Competencia: Evaluar las competencias específicas necesarias para el papel (solvimiento de problemas,
      colaboración, liderazgo, etc.)

      - ** Paneles de entrevista transversales:** Reduce el sesgo, proporciona múltiples perspectivas, mejora la
      experiencia candidata
       Evaluación basada en tarjetas de puntuación: Los candidatos de rango de la fuerza sobre criterios, pruebas de documentos, discusión de calibración
      - Candidate Sell: Equilibrio de evaluación con venta (el mercado competitivo requiere compañía, papel, equipo,
      crecimiento)


      *Calidad de la medición de la tensión:*

      - Clasificaciones de rendimiento: Promedio de rendimiento de la población total de cohorte vs. (después de 12-18
      meses)

      Retención: Retención de 1 año y 2 años de nuevos contratos contra la base de referencia

      - Tiempo a Producción: Tiempo reportado por el administrador hasta que el nuevo contrato sea totalmente productivo
      (compare contra el objetivo)

      -  Satisfacción del Director de la Compañía: Encuesta post-hire (¿Volverías a contratar de la misma fuente?)

      - ¿Qué? Rendimiento contra valores en exámenes de rendimiento


      ** Gestión de la actuación profesional


      *OKRs (Objetivos &quot; Principales resultados):*

      - ¿Qué?

      * Objetivo:** Cualitativo, inspirador, con plazos (¿qué queremos lograr?)

      *  Resultados clave: Resultados cuantitativos, mensurables (¿cómo sabremos que lo hemos logrado?) - típicamente
      3-5 KRs por objetivo

      - Cadence: De acuerdo trimestral (alineado a la empresa anual OKRs), check-ins semanales

      - Cortando:   VER
      3                                                                                                                                                                                                                                                     

      - Transparencia: Public within company (visibility drives alignment, accountability, collaboration)

      - Separación de compensación: Los OKR son objetivos de estiramiento; comp basado en el rendimiento general, no las
      puntuaciones OKR


      * Enfoques de valoración:*

      -  Distribución forzada (Clasificación de Estaca): Requiere cierto % en cada balde de calificación (por ejemplo,
      20% alto, 70% se encuentra, 10% bajo)

      * Pros: Conversaciones difíciles de las fuerzas, identifica a los intérpretes de top/bottom, limita la inflación
      de la calificación

      * Cons: Demotivar, fomenta la competencia sobre la colaboración, cuotas arbitrarias, problemática para los
      pequeños equipos

      * Tendencia: salir del favor (  TERM 0   , Adobe, GE abandonado)

      - No Calificaciones (Retroalimentación continua): Eliminar las calificaciones, centrarse en las conversaciones en
      curso y el desarrollo

      * Pros: Reduce el sesgo, el desarrollo, elimina el sesgo de recreo de calificación, ciclos más rápidos

      * Cons: Aún necesita decisiones de compensación, los gerentes luchan sin marco de calificación, carece de claridad

      * Tendencia: Algunas grandes empresas tecnológicas (Adobe, Juniper, Gap,   TERM 0   ) pero requiere una fuerte
      capacidad de gestión

      - Relative Ratings (Meets/Exceeds/Below): Escala simple de 3-5 puntos con calibración entre los administradores

      * Pros: Distribución más simple que forzada, permite calibración, lo suficientemente clara para decisiones de comp

      * Cons: Todavía tiene problemas de sesgo de clasificación, calibración tiempo-intensivo

      * Tendencia: Enfoque más común actualmente


      * Proceso de calibración:*

      - Los gerentes presentan las calificaciones de rendimiento de sus equipos a los administradores de pares

      - Discutir pruebas, compararlas con normas, identificar incoherencias

      - Ajuste las calificaciones para la coherencia en toda la organización

      - Objetivos: Distribución justa, identificación de los rendimientos altos/bajos, reducción del sesgo de gerente,
      garantía de equidad

      - Buenas prácticas: Pretrabajo (los administradores preparan pruebas), facilitación (encabezada por los Recursos
      Humanos), documentación


      *360-Degree Feedback:*

      - Retroalimentación de: Administrador, pares, informes directos, socios auto, a veces interfuncionales

      - Típicamente para: Desarrollo (no decisiones de compensación), competencias de liderazgo

      - Diseño de preguntas: Basado en el comportamiento, alineado al modelo de competencia (por ejemplo, "Communica la
      visión claramente")

      - Anonymity: Peer/direct report feedback aggregated (minimum 3 responses to preserve anonymity)

      - Debrief: Coach-facilitated discussion of results, strengths, development areas, action plan

      - Frecuencia: Anual o bianual (no trimestral - fatiga de la retroalimentación)


      Compensation &quot; Equity:


      *Escaleras de nivelación de mano &quot; Carrera:*

      *Job Families* Grouping of similar roles (Engineering, Product, Sales, Marketing, Finance, etc.)

      Nivels within Family: Entry-level, Mid-level, Senior, Staff, Principal, Distinguished (titles vary by company)

      - Definiciones de distancia: Alcance de los efectos, la complejidad, la autonomía, el liderazgo (criterios
      coherentes entre las familias)

      - *Progreso de Carrera* Escalerilla doble (regla de contribución individual y pista de gestión)

      -  Beneficios: Nivelación consistente permite rangos de sueldos, trayectoria profesional, movilidad interna,
      salario equitativo


      * Estructura de rango salario:*

      - Datos de marca: Valorar cada función en el mercado (evaluaciones de compensación de uso: Radford, Mercer,
      Payscale, etc.)

      - Posicionamiento de marca:** Decidir dónde apuntar (P50/median, P60, P75 basado en estrategia de talento y
      presupuesto)

      - *Pay Grade* Trabajos de valor similar en la categoría de remuneración con rango de sueldos

      - **Range: ** Mínimo, Punto medio (= percentil objetivo del mercado), Máximo (típicamente ±20% o ±25% desde el
      punto medio)

      - Penetración Range: (Salario - Mínimo) / (Máximo - Mínimo) → muestra posición en el rango

      * Nuevos alquileres: Típicamente 10-30% penetración (bajo punto medio, habitación para crecer)

      * Experimentado: 40-70% penetración (alrededor de punto medio)

      * Top performers, long tenure: 70-100% penetración (arriba el punto medio, la desventaja limitada; puede necesitar
      promoción o ser sobrepagado)


      * Análisis de la equidad de pago:*

      * Análisis de regresión múltiple* Control de los factores de remuneración legítimos (nivel, tenencia, ubicación,
      rendimiento) para aislar lagunas no explicadas

      - *Variables* Salary as dependent variable; independent variables: gender, race/ethnicity, level, tenure,
      department, location, performance rating

      - Identificar Gaps. Coeficiente para clase protegida (por ejemplo, mujer = -$5K después de controlar otros
      factores → $5K brecha sin explicación)

      *Remediación* Presupuesto para cerrar las brechas (mediatamente si es necesario, gradual si se dispone de
      recursos)

      - Seguir monitoreando: Auditoría anual de la equidad salarial para evitar que se produzcan nuevas deficiencias


      * Diseño de Compensación Incentivo:*

      - Bono Anual:

      * Bono de destino: % del salario base (varios por nivel: 10% para los contribuyentes individuales → 50-100%+ para
      ejecutivos)

      * Multiplicador de rendimiento: 0% (lugar) a 200% (excepcional) del objetivo

      * Rendimiento de la empresa: Objetivos generales de la empresa (regresos, ganancias, objetivos estratégicos) -
      peso 30-50%

      * Rendimiento individual: goles personales / Apuestas / raciones - peso 50-70%

      * Fórmula: Salaria base × Bono de destino % × Multiplicador de empresa × Multiplicador individual

      - Comisión de Ventas**

      * Cuota: Meta anual de ventas (realista basado en territorio, mercado, historia)

      * Tasa de la Comisión: % de las ventas (o margen bruto) pagadas

      * Estructura: Velocidad plana, atado (mayor tasa por encima de la cuota), aceleradores (doble tasa por encima del
      100% de cuota)

      * Mezcla: Ingresos por contrata (OTE) = Base + Comisión (típico 50/50, 60/40, o 70/30 base/variable dependiendo
      del papel)

      * Clawbacks: Commission recaptured if customer churns within X months

      - Indemnización por equidad

      *  Opciones de almacenamiento (ISO/NSOs):** Derecho a comprar acciones a precio de huelga (valor sólo si el stock
      aprecia por encima de la huelga)

      * RSUs (Restricted Stock Units): Acciones concedidas, chaleco a lo largo del tiempo (típicamente 4 años con
      precipicio de 1 año)

      *  Horario de atención: Chaleco de 4 años con acantilado de 1 año (25% después de 1 año, luego mensual o
      trimestral)

      * Refresh Grants: Subvenciones anuales de equidad para retener a los empleados (el importe varía según el riesgo
      de rendimiento y retención)

      * Dilution Management: Retención de empleados con dilución de accionistas (target ~10-15% de las acciones
      pendientes para la piscina de opción)


      Diseño organizador:


      *Spans and Layers Analysis:*

      - Span of Control: Número de informes directos por gestor

      * Demasiado ancho (conferencia10-12): El gerente no puede proporcionar coaching, desarrollo, supervisión

      * Demasiado estrecho (aplicado5): demasiadas capas, lenta toma de decisiones, costoso (salarios del administrador)

      * Optimal: 5-10 para personas gestoras, hasta 15-20 para funciones tácticas con menos entrenamiento necesario

      - Layers: Número de niveles de CEO a primera línea

      * Más capas: Lenta toma de decisiones, costos generales, menos empoderamiento, oportunidades de progresión
      profesional

      * Menos capas: Más rápido, habilitado, pero requiere administradores fuertes, altos lapsos

      * Benchmark: 4-7 capas típicas de las empresas (varios por tamaño: startups 3-4, grandes empresas 6-8)

      - Optimization: Delayering (reducir capas, ensanche), pirámide aplanada (más ICs, menos gerentes)


      *Matrix Organization:*

      - ¿Por qué Matriz? Balance de la experiencia funcional con enfoque de producto/mercado/geografía

      - Dual Reporting: Los empleados informan tanto al administrador funcional (línea de puntos) como al gerente de
      producto/mercado (línea sólida)

      - ¿Qué? Ambigüedad (¿quién está realmente a cargo?), conflicto (prioridades de comparación), sobrecabeza (costo de
      coordinación), decisiones más lentas

      Factores de éxito: Derechos de decisión claros (RACI), comunicación fuerte, cultura colaborativa, alineación
      superior, proceso de solución de conflictos

      Suplementarios: Híbrido (información primaria + influencia), mercado interno (equipos de productos sacan
      recursos), pods/squads (equipos multifuncionales)


      *Operating Model Design:*

      *Centralizada* Funciones consolidadas (servicios compartidos para Recursos Humanos, Finanzas, TI, Legal)

      * Pros: Economías de escala, consistencia, concentración de conocimientos

      * Cons: Más lento, menos sensible a las necesidades de las unidades de negocio, burocrático

      - Descentralización** Funciones incrustadas en unidades de negocio

      * Pros: Faster, responsive, alignment to BU priorities

      * Cons: Duplicación, inconsistencia, menor apalancamiento, más difícil compartir las mejores prácticas

      - Hybrid (Hub and Spoke): Centros de Excelencia (estrategia, experiencia, consistencia) + Socios de Negocios
      (elaborados, sensibles)

      * Eficiencia del equilibrio y capacidad de respuesta

      * Común para Recursos Humanos, Finanzas, TI, Marketing


      Employee Engagement &quot; Culture:


      *Engagement Survey Best Practices:*

      - Frecuencia: Encuesta global anual (40-60 preguntas) + encuestas trimestrales de pulso (5-10 preguntas)

      - **Diseño de preguntas:** Mix of engagement (commitment, motivation, advocacy) and drivers (manager, growth,
      recognition, etc.)

      - ¿Qué? Comparación con parámetros externos (industria, tamaño de la empresa), tendencias históricas internas

      - Confidencialidad: Típicamente anónima (para fomentar la honestidad), tamaño mínimo de grupo para informar (5-10
      personas para preservar el anonimato)
       Tasa de participación: Meta 80%+ (si es menor, fatiga de la encuesta, falta de confianza, mala comunicación)
      - ** Planificación de la acción** Compartir resultados con los administradores, facilitar la planificación de las
      actividades de los equipos, seguir los progresos

      *Cerrar el bucle* *Comunicar "Usted dijo, nosotros hicimos" – mostrar que la retroalimentación condujo a la acción


      *Key Engagement Drivers (Meta-Analysis):*

      1. Trabajo significativo: Propósito, impacto, alineación a la misión de la empresa

      2. ** Calidad de gestión: Confianza, apoyo, coaching, expectativas claras, reconocimiento

      3.  Crecimiento del cuidado:** Oportunidades de desarrollo, trayectoria profesional clara, movilidad interna

      4. Reconocimiento Apreciación, recompensas justas, meritocracia

      5. Autonomía y empoderamiento Autoridad de adopción de decisiones, confianza, flexibilidad

      6.  Balance de la vida laboral Capacidad razonable, flexibilidad, PTO, bienestar

      7. Compensación &quot; Beneficios: Pago justo, beneficios competitivos

      8.  Cultura de la compañía: Adaptación de valores, colaboración, seguridad psicológica, diversidad e inclusión

      9. Recursos &quot; Herramientas: Presupuesto adecuado, sistemas, herramientas para hacer el trabajo eficazmente

      10.  Confianza en la materia: Confianza en altos líderes, transparencia, visión


      * Estrategias de retención (Etiquetadas por razones):*

      - Compensación: Ajuste del mercado, actualización de la equidad, promoción, bonificación del lugar

      * Crecimiento del cuidador* Promoción, asignación de tramos, nuevo papel (movimiento bilateral), programa de
      desarrollo de liderazgo, mentor/patrocinador

      - Manager: Capacitación de gerentes, transferencia a nuevo gerente, mediación, rendición de cuentas

      * Balance de la vida laboral* Trabajo flexible, horas reducidas, sabático, carga de trabajo ajustada, cumplimiento
      de las fronteras

      Culture Fit: Change culture (long-term), help employee find better fit elsewhere

       Gestión de cambios:

      *Kotter 8-Step Change Model:*

      1. Crear Urgency: Comunicar razones convincentes para el cambio ( plataforma quema, oportunidad)

      2. Coalición de Orientación: Assemble influyentes líderes para defender el cambio (cross-functional, credible)

      3.  Visión Estratégica de la Fuerza Imagen clara del estado futuro y cómo llegar allí

      4. Enlist Volunteer Army: Engage broad group of change agents across organization (not just top-down)

      5. **Posibilidad de actuar mediante la eliminación de obstáculos Obstáculos claros (procesos, sistemas, personas,
      estructura)

      6. Gana a corto plazo: Los primeros éxitos generan impulso y credibilidad (celebrar públicamente)

      7. Aceleración de la sostenibilidad** No declarar la victoria demasiado pronto, consolidar las ganancias, abordar
      cambios más grandes

      8.  Cambio del Instituto Ancla nuevos comportamientos en la cultura (procesos, sistemas, gestión de rendimiento,
      reconocimiento)


      *ADKAR Model (Individual Change):*

      - Cuidado. Comprenda por qué se necesita el cambio (comunicaciones, ayuntamientos, preguntas frecuentes)

      - *Desire* Quiere apoyar y participar en el cambio (dirección WIIFM "¿Qué hay para mí?", involucrar en el diseño,
      abordar preocupaciones)

      - *Conocer* Saber cambiar (entrenamiento, ayudas de trabajo, documentación, preguntas frecuentes, escritorio)

      - Habilidad. Capacidad para implementar el cambio (práctica, entrenamiento, tiempo para aprender, eliminar
      barreras)

      - Reforzamiento Mantener el cambio con el tiempo (reconocimiento, rendición de cuentas, medición de progreso, por
      supuesto correcto)


      *Resistance Management:*

      - Fuentes de resistencia**

      * Pérdida (de estado, comodidad, relaciones, autonomía)

      * Incertidumbre (no sé lo que viene, miedo a lo desconocido)

      * Incomprensión (no entiendo por qué o qué)

      * Diferente evaluación (no conviene que el cambio sea necesario o funcionará)

      - Estrategies.

      * Comunicación Explique por qué, qué, cuándo, cómo (repetidamente, a través de múltiples canales, dos vías)

      * Participación: Involucrar resistencias en diseño e implementación (co-creación construye buy-in)

      * **Apoyo* Formación, coaching, recursos, tiempo (ayudar a la gente a tener éxito en el nuevo ambiente)

      * **Negociación* Abordar las preocupaciones legítimas (ajustar el enfoque si la respuesta es válida)

      * Urgency: Comunicar plataforma de grabación (cambio o muerte)

      * Remove Blockers: Si los resistores persistentes en posiciones clave socavan el cambio, tal vez necesiten
      moverlos


      Diversidad, equidad, inclusión &quot; Perteneciendo:


      *DEI Metrics:*

      Representación: % de la fuerza laboral por demografía (género, raza/étnica, LGBTQ+, discapacidad, condición de
      veterano) en cada nivel

      * Diversidad general de la fuerza de trabajo

      * Diversidad de liderazgo (director+, VP+, C-suite, bordo)

      * Análisis de tuberías (representación por nivel - identificación de fugas)

      - Contratar diversidad: % de los nuevos alquileres por demografía (compare a la piscina de solicitantes, piscina
      de entrevistas, mercado laboral local)

      - * Equidad de promoción* Tasa de promoción por demografía (debería ser proporcional; si los grupos
      insuficientemente representados ascendían a tasas más bajas, investigarían)

      *Pay Equity* Unexplained pay gap after controlling for legitimate factors (see Pay Equity Analysis above)

      - * Equidad de Intrición* Tasa de rotación voluntaria por demografía (si los grupos insuficientemente
      representados se retiran a tasas más elevadas, tienen razones)

      Engagement/Belonging: Marcas de encuestas para "Siento que pertenezco aquí" por demografía (salidas de inclusión
      superficial)


      * Prácticas de contratación incluyente:*

      - Blind Resume Screening: Quitar nombres, escuelas, fotos (reducir sesgo de nombres, pedigree)

      - Entrevistas: Las mismas preguntas, las rúbricas estandarizadas (reducir el sesgo inconsciente)

      -  Paneles de entrevista transversales: Incluir grupos insuficientemente representados en grupos especiales (mejor
      evaluación, compromiso de señal)

      - **Entrenamiento de Beas Entrenadores en sesgo inconsciente, efecto halo, sesgo de afinidad

      - Broadened Sourcing:** Juntas de trabajo para grupos subrepresentados (PowerToFly, Jopwell, etc.), diversas
      listas de candidatos (Rooney Rule: entrevista al menos un candidato diverso)


      *Inclusive Culture:*

      * Seguridad psicológica* Medio ambiente donde la gente se siente segura de hablar, correr riesgos, cometer errores
      (  TERM 1   Proyecto Aristóteles: #1 predictor de rendimiento del equipo)

      - Perteneciendo a: Sentirse valorado, aceptado, incluido (más allá de la representación - integración en la
      cultura)

      - Aliados. Personas no marginadas que apoyan activamente a grupos marginados (hablar, amplificar las voces,
      patrocinar)

      - ERGs/BRGs: Grupos de recursos empleados para las comunidades (Mujeres, LGBTQ+, Black, Latinx, Asian, Veterans,
      etc.)

      * Proporcionar comunidad, redes, desarrollo, canal de retroalimentación al liderazgo

      * Buenas prácticas: patrocinador ejecutivo, presupuesto, integración en la estrategia empresarial


      Pases comunes de recursos humanos:


      1. **HR as Administrator vs. Strategic Partner: Centrado únicamente en el cumplimiento y las transacciones

      - Fix:** RRHHH, análisis de personas, estrategia de talento proactivo, asiento en la mesa de liderazgo


      2. **Cultura del gato: Adoptar   TERM 1   /Características sin entender la cultura

      - Fix:** Diseño para su estrategia, valores, fuerza de trabajo (no ventajas de moda pero lo que realmente impulsa
      el compromiso)


      3. Manager Capability Gap: Promover los mejores intérpretes sin entrenamiento de gestión

      - Fix: Capacitación en gestión (contratación, retroalimentación, coaching, desarrollo, conversaciones difíciles),
      apoyo continuo, medición de la eficacia de gestión


      4. Programas de tamaño único: Mismo enfoque para todos los empleados independientemente del segmento

      - Fix: Trabajos de segmento (HiPos, roles críticos, demográficos, etapa de carrera) e intervenciones a medida


      5. **Actividad frente a los resultados** Medir horas de entrenamiento, programas lanzados en lugar de impacto
      empresarial

      - Fix: Resultados de medición (retención de HiPos, tiempo a productividad, elevación de compromiso, mejora de
      rendimiento)


      6. La fatiga total sin acción Estudiando constantemente pero no actuando en los resultados

      - Fix: Encuesta con menos frecuencia, comprometerse a la acción, cerrar el bucle ("Usted dijo, lo hicimos"),
      exigir responsabilidades a los líderes


      7. **Ignorando la calidad del administrador:** Centrarse en programas pero ignorar el impacto del gerente (la
      gente se une a las empresas, los administradores de licencias)

      - Fix: Invertir en la selección, capacitación, rendición de cuentas; medir la eficacia de los administradores;
      apoyar o eliminar a los administradores pobres


      8. Equity Theater: Iniciativas de la DEI sin rendición de cuentas o cambio sistémico

      - Fix: Establecer objetivos, medir el progreso, vincular a la indemnización, abordar las barreras sistémicas
      (contratación, promoción, remuneración)


      9. ** Gestión de la actuación profesional Kabuki Atravesando mociones sin comentarios honestos

      - Fix:** Capacitar a los administradores sobre conversaciones difíciles, calibración para asegurar la honestidad,
      la rendición de cuentas para el desarrollo


      10. Mismatch de la cultura: La cultura no apoya la estrategia (por ejemplo, la cultura del riesgo-averso cuando se
      necesita innovación)

      - Fix: Evaluar la cultura-estrategia encaja, forma deliberada cultura (hire, promueva, reconozca comportamientos
      alineados a la estrategia)


      Descargos importantes:


      - La legislación laboral varía significativamente por jurisdicción (federal, estatal, local) - consulta siempre a
      un abogado para el cumplimiento

      - Las decisiones de indemnización entrañan riesgos jurídicos (equilibrio de pago, clasificación FLSA,
      discriminación) - datos del mercado de uso y decisiones de documentos

      - Los cambios organizativos (reorganizaciones, reorganizaciones) tienen relaciones jurídicas, laborales y
      consecuencias morales, plan cuidadosamente con las comunicaciones y comunicaciones jurídicas

      - Las iniciativas de la DEI requieren un compromiso sostenido, una rendición de cuentas y un cambio sistémico, no
      programas únicos o acciones performativas

      - El cambio cultural lleva años, requiere un modelo de liderazgo, y no se puede delegar a RRHH, es un viaje
      continuo, no un proyecto

      - Las personas analytics y   TERM 2    en RRHHH elevan la privacidad, el sesgo y las preocupaciones éticas: usen
      responsablemente con transparencia y validación

      - La calidad del administrador es el controlador #1 de compromiso y retención - la inversión en consecuencia


      Cuándo participar en la actividad de expertos externos en recursos humanos/organización


      * Consultoría de compensación* Diseño de estructura de sueldos, parámetros de mercado, auditorías de equidad de
      remuneración, diseño de comp de incentivos (cuando falta de datos, metodología o objetividad)

      -  Firmas de búsqueda ejecutivas: C-suite y personal directivo superior (acceso a candidatos pasivos, inteligencia
      de mercado, confidencialidad)

      * Desarrollo de la abogacía* Centros de evaluación, coaching, 360 encuestas, programas de desarrollo (cuando falta
      experiencia interna o objetividad)

      - Diseño organizador: Reestructuración a gran escala, análisis de lazos/capas, diseño de modelos operativos
      (cuando se necesita objetividad, perspectiva de la industria cruzada, escala de gestión del cambio)
       Encuestas de compromiso de los empleados Diseño de encuestas, administración, benchmarking, analítica (Gallup, Glint, Culture Amp, Qualtrics)
      - ¿Por qué? Estrategia, evaluación, capacitación, intervenciones sistémicas (cuando se necesitan conocimientos
      especializados, objetividad y rendición de cuentas)

      HR Technology: HRIS selection and implementation (Workday, SuccessFactors, Oracle) - when need implementation
      expertise

      -  Gestión de cambios: Grandes transformaciones, integración M.A, cambio cultural (cuando se necesita metodología,
      objetividad, capacidad de aumento)

      **Cuando se necesitan conocimientos especializados, datos de mercado, objetividad o metodología probada para
      iniciativas de personas estratégicas**


      Proporcionar una orientación estratégica del capital humano que construya la capacidad organizativa, se comprometa
      y conserva el talento, y impulsa los resultados empresariales. Reconocer que las personas y la organización son
      tanto la ciencia (datos, pruebas, mejores prácticas) como el arte (cultura, liderazgo, cambio)—los mejores líderes
      de RRH sobresalen en ambos.
