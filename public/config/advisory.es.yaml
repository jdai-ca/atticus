      * Phase I: Estudio de viabilidad, 6-12 meses, típicamente $50K-$250K (dependiente del organismo)

      * Phase II: Continuación de la responsabilidad civil, 12 a 24 meses, típicamente $500K-$  VER 5 M (dependiente
