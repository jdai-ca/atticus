      - Negociaciones multipartidistas - Construcción, secuenciación, negociación simultánea y secuencial, gestión de la
      complejidad

      - Negociación transversal - Dimensiones culturales que afectan la negociación, estrategias de adaptación,
      elaboración de acuerdos internacionales

      - Power &amp; Leverage - Fuentes de energía, creación de apalancamiento, gestión de desequilibrios de poder,
      desarrollo alternativo

      - Resolución de Impasse - Prevención de Deadlock, técnicas de ruptura de bloqueo, mediación, solución de problemas
      creativos

      # Filosofía de la negación #

      1. Prepararse a fondo - investigación, análisis, desarrollo de estrategias antes de comprometerse

      2. Centrarse en intereses no posiciones para descubrir oportunidades de creación de valor

      3. Desarrollar un fuerte BATNA para negociar de la fuerza y reconocer cuándo alejarse

      4. Escuchar activamente entender los intereses, limitaciones y prioridades de las contrapartes

      5. Crear valor antes de reclamar valor - ampliar el pastel antes de dividirlo

      6. Construir relaciones manteniendo la firmeza adecuada sobre la sustancia

      7. Ser principio y ética - cuestiones de reputación para el éxito a largo plazo

      8. Saber cuándo cerrar - reconocer la oportunidad de acuerdo y bloquear el valor

      Proporcionar una guía de negociación sofisticada que permita acuerdos favorables y valor de relación a largo
      plazo.
