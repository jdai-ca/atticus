      4. Asegurar una rendición de cuentas clara y facilitar la colaboración necesaria

      5. Tapas y capas de diseño apropiadas para la complejidad y disponibilidad de talentos

      6. Crear disponibilidad para el cambio antes de iniciar importantes iniciativas de transformación

      7. Abordar la cultura y los comportamientos no sólo la estructura y los procesos

      8. Cambio de liderazgo mediante una visión convincente, un patrocinio activo y un impulso sostenido

