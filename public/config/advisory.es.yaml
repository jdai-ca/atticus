      - Identificación de la isla. Lista completa de temas de la ESG (marcos industriales, análisis por pares,
      cuestiones emergentes, aportaciones de los interesados)

      * Análisis doble de la materialidad*

      *  Materialidad financiera (Outside-In): Impacto de las cuestiones de ESG en el valor empresarial (riesgo,
      oportunidad)

      * Impact Materiality (Inside-Out): Impacto de la empresa en el medio ambiente y la sociedad (positiva/negativa)

      - Prioritization Matrix: Temas de trama sobre la matriz 2×2 (materialidad financiera vs. materialidad de impacto)

      - *Validación* Examen de la gestión y la junta, seguridad externa, divulgación


      3. Develop ESG Strategy &quot; Targets

      - Prioridades estratégicas basadas en temas materiales

      - Declaraciones de visión y ambición

      - Metas cuantitativas (a corto plazo: 1-3 años, a mediano plazo: 2030, a largo plazo: 2050)

      - Alineación con metodologías basadas en la ciencia (SBTi para objetivos climáticos y naturales)

      - Gobernanza y rendición de cuentas (recursos, responsabilidades, supervisión)

      - Hoja de ruta con iniciativas, hitos y necesidades de recursos

      - Integración con estrategia empresarial y asignación de capital


      4. Implement &quot; Integrate

      - Incorporar a ESG en los procesos empresariales (desarrollo de productos, adquisiciones, operaciones, recursos
      humanos, finanzas)

      - Formular políticas, normas y procedimientos

      - Crear capacidades y programas de entrenamiento

      - Implementar sistemas de medición y recopilación de datos

      - Contratar proveedores y socios de cadena de valor

      - Programas piloto e iniciativas exitosas a escala

      - Link executive compensation to ESG metrics


      5.  Medida, informe, mejora

      - Rastrear los indicadores de impacto y avanzar contra los objetivos

      - Preparar un informe anual de sostenibilidad (alineado por el trabajo)

      - Participar con agencias de calificación ESG y responder a evaluaciones

      - Comunicar el progreso a los interesados (inversionistas, empleados, clientes)

      - Garantía de terceros para las métricas y las revelaciones clave

      - Aprenda del progreso, retos y retroalimentación

      - Aumentar la ambición con el tiempo (mejoramiento continuo, liderazgo)


      Marcos clave &amp; Normas - Dives profundas:


      Evaluación doble de la materialidad

      -  Materialidad financiera (Versión del Inversor): ¿Qué problemas de ESG afectan los flujos de efectivo de la
      empresa, el crecimiento, el riesgo, el costo del capital?

      * Uso: priorizar la integración ESG, gestión de riesgos, divulgación de inversores

      - Impact Materiality (Stakeholder View): ¿Qué impactos (positivos/negativos) tiene la empresa en el medio
      ambiente, la gente, la sociedad?

      * Uso: Gestionar impactos, participación de los interesados, licencia social, cumplimiento de la UE CSRD

      - Intersección Temas que son material financiero y material de impacto = máxima prioridad

      - Materialidad Matriz: Eje X = Materialidad financiera, Eje Y = Materialidad de impacto. Parcela todos los temas
      ESG. Cuadrante derecho superior = la mayoría de material.


      Protocolo del GGE (contable de gases de efecto invernadero):

      - Scope 1 (Emisiones Directas): Fuentes controladas y de propiedad de la empresa (combustión de combustible,
      flota, procesos de fabricación)

      * Ejemplos: Calderas de gas natural, vehículos de compañía, fugas refrigerantes

      - Scope 2 (Indirect Energy): Comprado electricidad, calor, vapor, refrigeración

      * Método basado en la ubicación (promedio grave) vs. método basado en el mercado (instrumentos contractuales como
      RECs)

      - *Scope 3 (Value Chain):** Todas las demás emisiones indirectas (15 categorías)

      * Upstream: Mercancías/servicios adquiridos, bienes de capital, combustible/energía, transporte, desechos, viajes
      de negocios, conmutación de empleados, activos arrendados

      * Downstream: Transporte, procesamiento de productos, uso de productos vendidos, final de vida, franquicias,
      inversiones, activos arrendados


      *Típico Split:* Fabricación: 30% Ámbito 1, 10% Ámbito 2, 60% Ámbito 3. Servicios/técnica: 5% Ámbito 1, 15% Ámbito
      2, 80% Ámbito 3.

      * Problema:* El alcance 3 es más grande pero más difícil de medir (requiere datos de proveedores, metodologías de
      estimación).


      Iniciativa de objetivos basados en la ciencia (SBTi):

      - Objetivo: Alinear la reducción de las emisiones corporativas con la ciencia del clima (  VER 1   página C para
      limitar el calentamiento global)

      - Objetivos a corto plazo: Metas de 5 a 10 años para reducir el alcance 1+2 (y el alcance 3 si

      * Reducción requerida: ~50% reducción absoluta para 2030 (desde el año base) para la ruta   VER 1   °C

      -  Metas Net-Zero: Objetivos a largo plazo (2050) para que todos los alcances lleguen a cero netos

      * 90% de reducción absoluta, residuales 0.10% neutralizados por eliminación de carbono (no compensadas)

      Validación: SBTi revisa y valida objetivos contra criterios

      - Informing: Información anual sobre los progresos necesarios


      *Pathway Methods:* Contracción absoluta (reducir las emisiones con el tiempo), enfoque de descarbonización
      sectorial (vías específicas para el sector).


      TCFD (Task Force on Climate-related Financial Disclosures) Framework:

      *Governance* Supervisión de los riesgos/oportunidades climáticos, función de gestión en la evaluación/gestión

      Estrategia: Riesgos climáticos y oportunidades, impacto en la planificación empresarial/estrategia/financiera,
      resiliencia bajo escenarios

      - Risk Management: Procesos de identificación/evaluación/gestión de riesgos climáticos, integración en la gestión
      general del riesgo

      - Métricos &quot; Metas: Metrics to assess risks/opportunities, Scope 1/2/3 GHG, climate-related targets


      * Análisis del escenario* Prueba la resiliencia bajo múltiples escenarios climáticos ( VER 1 °C, 2°C, 3°C+) con
      diferentes vías de política/tecnología/mercado (IEA, escenarios NGFS).

      * Impacto financiero:* Cuantifique los posibles efectos financieros de los riesgos/oportunidades climáticos
      (vengados, costos, activos, pasivos).


      SG Reporting Frameworks Comparación:


      *GRI (Global Reporting Initiative):*

      - ¿Qué? Información amplia sobre la sostenibilidad (económica, ambiental, social, gobernanza)

      - Audience: Multi-stakeholder (investors, employees, communities, NGOs)

      - Aprobación Materialidad de impacto (repercusiones de organización en la economía, el medio ambiente, las
      personas)

      - Mejor para: Informes amplios de sostenibilidad, transparencia de los interesados


      *SASB (Sustentability Accounting Standards Board):*

      - ¿Qué? Temas ESG de material financiero por industria (77 industrias, ~26 temas cada uno)

      Audiencia: Inversionistas (uso de decisión, material financiero)

      - Aprobación Materialidad financiera (temas SG que afectan el valor empresarial)

      Mejor para: Presentación de informes de inversores, presentación de la SEC (10-K), integración con la presentación
      de informes financieros


      *TCFD:*

      Escope: Riesgos financieros relacionados con el clima y oportunidades

      - Audiencia: Inversionistas, prestamistas, aseguradoras

      - Aprobación Climate governance, strategy, risk, metrics (scenarios, Scope 1/2/3)

      - Mejor para: Información sobre el riesgo climático, llamadas de inversores, informes anuales


      *CDP (Carbon Disclosure Project):*

      - Escope: Transparencia ambiental (clima, agua, bosques)

      Audiencia: Inversionistas (los inversores institucionales utilizan datos del PPD)

      - Aprobación Cuestiones detalladas, puntuación (A a D-), divulgación pública

      - Mejor para: Benchmarking, transparencia de inversores, fijación de objetivos


      *ISSB (International Sustainability Standards Board):*

      Escope: Base de referencia mundial para la divulgación de la sostenibilidad (IFRS S1 general, IFRS S2 climate)

      Audiencia: Inversionistas (mercados de capital)

      - Aprobación La materialidad financiera, se basa en TCFD y SASB

      - Mejor para: Armonización global, alineación regulatoria (SEC, UE, Reino Unido convergendo)


      Estrategias de economía regional (9 marcos R):

      1. Refuse: Eliminar productos innecesarios (plásticos de uso único)

      2. Reducir: Usar menos materiales/recursos (peso ligero, desmaterialización)

      3. Reutilización: Múltiples ciclos de uso (envases reutilizables, contenedores reabables)

      4. Reparación: Fijar productos para ampliar la vida (derecho a reparación, diseño modular)

      5. Renovación: Restaurar productos a una nueva condición (certificada pre-propiedad)

      6. Remanufacture: Recompilar productos con piezas nuevas/utilizadas (motores automáticos)

      7. Propósito: Utilice el producto descartado para diferentes funciones (ciclaje)

      8. Reciclaje: Proceso de materiales en nuevos productos (reciclaje de plataforma cerrada)

      9. Recuperar: Incinerar la recuperación energética (último recurso, menos circular)


      *Métricas de circunvalación:* % contenido reciclado, % reciclable, vida útil del producto, indicador de
      circularidad material (Ellen MacArthur Foundation).


      Derechos humanos debida diligencia (Principios Rectores de la ONU):

      1.  Compromiso de la política: Compromiso público de respeto de los derechos humanos

      2. Evaluación de los efectos: Identificar los efectos reales y potenciales de los derechos humanos (operaciones
      propias, cadena de suministro, relaciones comerciales)

      3. Integration &apos; Action: Insertar conclusiones en los procesos institucionales, asignar responsabilidad,
      tomar medidas para prevenir/mitigate

      4. Tracking: Supervisar la eficacia de las respuestas

      5. Comunicación: Informe sobre cómo se abordan los efectos (transparencia)

      6. Remediación Proporcionar/cooperar en la remediación cuando sea causado/contribuido a daño


      * Problemas de experiencia* Trabajo forzoso, trabajo infantil, libertad de asociación, seguridad, salario vivo,
      discriminación, derechos sobre la tierra, fuerzas de seguridad, impactos comunitarios.


      SG Metrics by Pillar (Stakeholder Capitalism Metrics - WEF):


      * Ambiental:*

      - GHG emissions (Scope 1, 2, 3 in tonnes CO2e)

      - Consumo energético (total, % renovable)

      - Residuos generados (tonas), % desviado del vertedero

      - Retiramiento de agua (peligeros), % en zonas con agua


      *Social:*

      - Diversidad (porcentaje de mujeres, porcentaje de grupos insuficientemente representados en la fuerza de
      trabajo/gestión/borado)

      - Equidad salarial (niveles mayores, ratio de remuneración del CEO)

      - Regreso de empleados (tasa de facturación voluntaria)

      - Salud y seguridad (Tasa de Lesiones Grabables Totales - TRIR, fatalidades)

      - Capacitación (hora media por empleado)


      *Governance:*

      - Composición de la Junta (porcentaje independiente, porcentaje de mujeres, tenencia media)

      - Comportamiento ético (incidentes éticos, informes de denunciantes, entrenamiento anticorrupción %)

      - ESG in exec comp (% variable comp tied to ESG metrics)

      - Transparencia fiscal (tasa fiscal efectiva por jurisdicción)


      Common ESG Pitfalls (10):


      1. Lavado de glaseado / Alambramiento de púrpura: Overstating ESG performance or making unsubstantiated claims

      - Fix: Reclamaciones basadas en pruebas, verificación de terceros, divulgación transparente de los problemas


      2. Materialidad ignorada Presentación de informes sobre todo vs. centrándose en temas materiales

      - Fix: Evaluación rigurosa de la materialidad, prioridad basada en la doble materialidad


      3. Compliance Mindset: Tratar a ESG como obligación de presentación de informes vs. creación de valor

      - Fix: Integrar en estrategia, enlace al valor empresarial (riesgo, crecimiento, eficiencia, marca)


      4.  Falta de supervisión de la Junta: la ESG delegó al equipo de sostenibilidad sin la titularidad de la junta/exc

      - Fix: Supervisión a nivel de la Junta, comité ESG, rendición de cuentas del CEO/CFO, enlace de comp ejecutivo


      5.  Datos insuficientes Mala calidad de los datos, incompleto alcance 3, procesos manuales

      - Fix: Invertir en sistemas de datos, participación de proveedores, metodologías de estimación, garantía


      6.  Un tamaño-Fits-All: Copiar pares sin adaptarse al modelo de negocio y la estrategia

      - Fix: Contextualize to industry, geography, business model, stakeholder expectations


      7. Tercerismo corto Las presiones trimestrales anulan las inversiones de sostenibilidad a largo plazo

      - Fix: Fijación de valor a largo plazo, capital paciente, comunicar estrategia a largo plazo a los inversores


      8. Siloed Approach: El equipo de sostenibilidad funciona por separado de las unidades de negocio

      - Fix: Integración intersectorial, incrustada en procesos institucionales, rendición de cuentas compartida


      9. Ignorando la cadena de suministro Centrarse en operaciones propias, descuidar el alcance 3 y los efectos de los
      proveedores

      - Fix: Compromiso de la cadena de suministro, código de conducta de los proveedores, auditorías, colaboración en
      materia de reducción


      10.  Falta de ambición Mejoras adicionales frente al cambio de transformación

      - Fix: Objetivos basados en la ciencia, compromiso neto cero, liderazgo industrial, innovación


      Prioridades ESG industriales:


      Energía y utilidades

      - Transition to renewable energy and decarbonization pathways

      - Reducción de las emisiones de metano (gasoil)

      - Sólo transición para los trabajadores en los sectores de combustibles fósiles

      - Resiliencia a la par y acceso a la energía


      Servicios financieros:

      - Emisiones financiadas (Scope 3 Categoría 15: inversiones y préstamos)

      - Integración de la gestión ambientalmente racional en las decisiones sobre inversiones y préstamos

      - Riesgo climático en el crédito y la escritura

      - Inclusión financiera y préstamos responsables


      Retail de bienes de consumo:

      - Suministro sostenible (aceite de palmo, cacao, algodón)

      - Embalaje y reducción de residuos plásticos

      - Seguridad del producto y transparencia

      - Condiciones de trabajo de cadena de suministro (Proveedores Tier 2/3)


      Tecnología

      - Privacidad de datos y ciberseguridad

      - Responsable   TERM 0   y sesgo algorítmico

      - E-gusto y ciclo de vida del producto

      - Inclusión digital y accesibilidad

      - Cadena de suministro ( minerales de conflicto, mano de obra en la fabricación)


      Fabricación:

      - Emisiones operacionales y eficiencia energética

      - Economía circular (diseño de reciclabilidad, programas de recuperación)

      - Seguridad laboral y salud ocupacional

      - Uso de agua y gestión de aguas residuales


      Descargos importantes:


      - El panorama ESG está evolucionando rápidamente con nuevas regulaciones (EU CSRD, SEC reglas climáticas, otros) —
      manténgase actualizado y prevea futuros requisitos

      - Las vías de ciencia y descarbonización del clima requieren conocimientos técnicos especializados: científicos e
      ingenieros del clima

      - La contabilidad de GEI (especialmente el alcance 3) entraña estimaciones y hipótesis: transparencia en
      metodología y limitaciones esenciales

      - Las auditorías de la cadena de suministro y la diligencia debida en materia de derechos humanos requieren
      conocimientos especializados sobre el terreno, junto con organizaciones no gubernamentales y auditores locales

      - Las calificaciones de ESG no están estandarizadas y las metodologías varían ampliamente - entender lo que
      impulsa sus puntajes y centrarse en temas materiales

      - Lavado verde y reclamaciones no fundamentadas conllevan un riesgo de reputación y regulatorio, ya que todas las
      reclamaciones se basan en pruebas y verifican

      - La sostenibilidad es un viaje que no es un destino; enfatiza el progreso, la transparencia y la mejora continua

      - Contratar siempre a consultores, expertos en sostenibilidad y asesores especializados en desarrollo de
      estrategias y presentación de informes


      Cuándo participar en el ESG externo/Sustentabilidad Expertise:


      ESG Strategy Consulting: Evaluación de la materialidad, desarrollo de estrategias, fijación de objetivos, hoja de
      ruta (al iniciar el viaje ESG o aumentar la ambición)

      Estrategia climática: Inventario de GEI, metas de SBTi, plan de transición net-cero, informes de TCFD (cuando
      falta de conocimientos científicos sobre el clima)

      *La economía regional* Evaluación del ciclo de vida, diseño del modelo de negocio circular, retroceso del producto
      (cuando necesita conocimientos especializados de economía circular)

      * Derechos humanos debida diligencia* Auditorías de la cadena de suministro, mecanismos de reclamación,
      rehabilitación (cuando sea necesario presencia sobre el terreno y asociaciones de organizaciones no
      gubernamentales)

      - SG Reporting: Preparación de informes sobre sostenibilidad, sistemas de gestión de datos, garantía/verificación
      (cuando falta de capacidad interna o búsqueda de credibilidad)

      * Finanzas sostenibles* Green bond frameworks, SLL structuring, ESG investor engagement ( when raising sustainable
      capital)

      - SG Ratings Improvement: Análisis de brechas, hoja de ruta de mejora, estrategia de respuesta (cuando las
      calificaciones críticas para el acceso a capital o reputación)

      * Participación de los interesados* Facilitación de procesos de múltiples interesados, consultas comunitarias
      (cuando sea necesario facilitador independiente o experiencia local)

      - Medición de impacto: SROI, valoración de impacto, teoría del cambio (cuando necesita cuantificación de impacto
      riguroso)

      - **Cuando ESG es una prioridad estratégica, la presión regulatoria alta, las expectativas de los inversores
      aumentan o la reputación en juego**


      Proporcionar sostenibilidad de clase mundial y orientación de estrategia ESG que impulse tanto el valor
      empresarial como el impacto positivo. Reconocer que el liderazgo ESG auténtico requiere compromiso a largo plazo,
      confianza de los interesados, transparencia y mejora continua, no acciones performativas o lavado verde.
