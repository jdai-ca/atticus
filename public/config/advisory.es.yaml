      IX. M capaA Metrics and Benchmarks


      -  Múltiples de valoración (Median by Sector, 2023-2024):

      * Tecnología (Software): EV/Revenue 5-10x, EV/EBITDA 15-25x (alto crecimiento, SaaS repetiring revenue commands
      premium)

      * Salud: EV/EBITDA 12-18x (varia ampliamente por segmento: pharma, dispositivos, servicios)

      * Industrial/Manufacturing: EV/EBITDA 8-12x (cíclica, intensiva en capital)

      * Consumidor/Retail: EV/EBITDA 8-14x (fuerza de marca, capacidades de omnicanal impulsan prima)

      * Servicios financieros: P/E 10-15x, P/Book 1-2x (regulador, intensivo de capital)

      * Nota: Los múltiplos varían ampliamente sobre la base de la tasa de crecimiento, rentabilidad, posición de
      mercado, ingresos recurrentes


      - Control Premium (Adquisición de la Empresa Pública):

      * Precio medio de control: 20-40% sobre el precio de la cuota no afectado (pre-announcement)

      * Tomas de rehenes: A menudo primas superiores (30-50%+)

      * Negociaciones amistosas: primas inferiores posibles (15-25%)


      Synergy Sizing (as % of Target Revenue):

      * Rango típico: 5-25% de los ingresos de destino (sinergias anuales de la tasa de ejecución)

      * Sinergias de costos: Más cierto, típicamente el 70-85% de las sinergias totales

      * Sinergias de ingresos: Menos ciertas, típicamente el 15-30% de las sinergias totales

      * Mejores ofertas en clase: 20-30% sinergias, realizadas dentro de 3 años


      - Duración de la invasión:

      * Integración funcional: 12-24 meses (sistemas, procesos, estructura)

      * Integración cultural: 2-3 años (normas, identidad, asimilación completa)

      * Integración de sistemas informáticos: 6-18 meses (sistemas básicos), 18-36 meses (paisaje completo)


      - Metrices de éxito de la integración:

      * Retención de empleados ( ejecutivos de los objetivos): 80-90% de retención a través del año 1 es fuerte

      * Retención al cliente: 90-95%+ retención de los clientes principales

      * Realización sinérgica: 90-100% de sinergias comprometidas alcanzadas por el Año 3

      * Crecimiento de los ingresos: Mantener o superar un plan independiente

      * Integración cultural: Las puntuaciones de compromiso de los empleados regresan a niveles predeciales por año 2


      -  Tasas de éxito real (Creación de valores):

      * Estudios académicos: el 50-70% de las ofertas no generan valor para los accionistas adquirentes

      * Razones comunes para el fracaso: Sobrepago, mala integración, choque cultural, desajuste estratégico

      * Mejores intérpretes: Racionalidad estratégica clara, valoración disciplinada, excelente ejecución de integración


      X. Estrategias de inicio-específico M implicaA y salida


      - Transacciones de Acqui-Hire:

      * Rationale: El comprador quiere talento (equipo de ingeniería, equipo de productos), no producto/clientes

      * Típico Precio: $1-5M total ($500K-$1M por ingeniero), a veces más para equipos excepcionales

      *  Estructura: Adquisición de activos (IP + empleados), la empresa termina después de la transacción

      *  Tratamiento del Empleado: Bonos de retención (12-24 meses), subsidios de equidad en el comprador, funciones de
      ingeniería (no liderazgo)

      * Founder Outcomes: A menudo se une al comprador como colaboradores individuales o administradores de nivel medio,
      no C-suite

      * Inversionista devuelve: A menudo por debajo de las preferencias (mediada salida de $5M rara vez devuelve la
      inversión de fondos VC)


      -  Optimización para salidas de inicio:

      * QSBS (US - IRC Section 1202):

      - Calificación: C-Corp, $50M activos brutos cuando el stock emitido, 5 años de duración, negocio activo (no
      inversión pasiva)

      - Prestaciones: 100% el capital federal gana la exclusión (hasta 10 millones de dólares o 10 veces más)

      - Planificación: Plan DEBE MUST en incorporación y emisión de existencias (no puede fijarse retroactivamente)

      - Tratamiento estatal: CA no honra la exención QSBS (totalmente imponible), la mayoría de los estados sí

      * LCGE (Canadá - Lifetime Capital Gains Exemption):

      - Prestaciones: ~$1M CAD capital gana exención para acciones de pequeñas empresas calificadas (QSBC)

      - Calificación: CCPC (Canadian-Controlled Private Corporation), 90%+ activos activos activos activos activos
      activos activos activos activos activos activos activos activos activos activos activos activos activos de
      negocios 50%+ durante 24 meses

      - Planificación: Purificar corporación (remover activos pasivos) antes de la venta, estructura como venta de
      acciones (no venta de activos)

      - Exención multiplique: Cada accionista (incluidos los miembros de la familia) puede utilizar LCGE, por lo que los
      fideicomisos de la familia o las acciones de espumoso pueden multiplicar la exención

      * Stock vs. Asset Sale: Los compradores suelen preferir las compras de activos (paso en base, activos de cereza,
      evitar pasivos), pero los vendedores prefieren las ventas de acciones (tratamiento QSBS/LCGE, impuesto de nivel
      único)


      - Earnout Structures for Startups:

      * Purpose: Saldo de valoración del puente, mecanismo de retención, incentivos al vendedor con rendimiento
      posterior a la ejecución

      * Typical Terms: 1-3 years, 20-40% de consideración total, vinculada a los ingresos, EBITDA, hitos de productos o
      retención

      * Riesgos para Vendedores: El comprador controla el negocio después de la ejecución (puede manipular la ganancia),
      riesgo de disputa, ambigüedad de medición, carga de retención

      *  Consejos de negociación: Definiciones claras (cómo medir, qué cuenta), derechos de auditoría, pactos de
      comprador (operar en curso ordinario, buena fe), aceleración en el cambio de control o terminación sin causa

      * Tax Treatment: Ingresos ordinarios si el empleo está condicionado, la ganancia de capital si está vinculada
      exclusivamente al rendimiento empresarial (temas de estructura)


      OIPO vs. Acquisition Decision Framework:

      * OIPO Advantages: Mantener el control (fundador/gestión), valoración potencialmente superior (multiplicaciones
      del mercado público), liquidez continua (después del cierre), valor de marca/recuperación, moneda para
      adquisiciones

      * Desventajos de la OIPI: Cargas de la empresa pública (aplicación de la OSX, presión trimestral de los ingresos,
      necesidades de divulgación), costos (gastos de la IPO de 5 a 10 millones de dólares, cumplimiento anual de 2 a 5
      millones de dólares), período de cierre (6 meses), riesgo de vencimiento del mercado

      *  Ventajas de la adquisición: Cierre (precio de compra definitivo), liquidez inmediata (con ganancias cercanas o
      cortas), acceso a recursos (fuerza de ventas, infraestructura, marca), transferencia de riesgos (el comprador
      supone riesgo de negocios)

      *  Desventajos de adquisición: Pérdida de control, cambio cultural, riesgo de integración (intección del
      producto/téam en una empresa mayor), incertidumbre de ingresos, condiciones de empleo (a menudo 2-4 años de
      retención)

      * Proceso de seguimiento final: Proseguir IPO y adquirir simultáneamente para la opcionalidad y el apalancamiento
      (intensivo en recursos, requiere banqueros experimentados)


      Descargos importantes:


      - Las transacciones de M componenteA son complejas y requieren asesores profesionales experimentados

      **Los banqueros de inversión son esenciales para la valoración, estructuración de acuerdos, negociación y gestión
      de procesos**

      - **M plagaA legal counsel is required for due diligence, purchase agreement negotiation, regulatory approvals,
      and closing**

      **Los asesores tax son críticos para la estructuración de impuestos, optimización QSBS/LCGE y minimizar la fuga de
      impuestos**

      **Los consultores de inversión pueden acelerar el PMI y mejorar la realización de la sinergia (Big 4, empresas de
      integración boutique)**

      - **Las tasas de éxito de M prójimoA son modestas (50-70% crean valor), lo que hace que el enfoque disciplinado
      sea crítico**

      - **Integración es donde el valor se gana o se pierde - plan temprano, ejecutar con disciplina, seguir sinergias
      rigurosamente**

      **La integración cultural es a menudo subestimada pero crítica para la retención y la creación de valor**

      **Las salidas de inicio tienen consideraciones únicas (QSBS, ganancias, compañeros) - obtener un abogado
      especializado**


      **Cuando se trata de involucrar a los asesores del M.


      - Desarrollar una estrategia de gestión múltiple o considerar adquisiciones

      - Evaluar los objetivos de adquisición o recibir intereses de adquisición

      - Realización de la diligencia debida en relación con los objetivos de adquisición

      - Negociar LOI o un acuerdo de compra definitivo

      - Realización de transacciones para la eficiencia fiscal (especialmente QSBS/LCGE optimización)

      - Gestión de las aprobaciones regulatorias (antitrust, CFIUS, industria específica)

      - Planificación de la integración post-merger (estrategia PMI, configuración de la OMI)

      - Ejecución de la integración (sistemas, organización, cultura, realización de sinergias)

      - Evaluación de la decisión de adquisición de IPO vs.

      - Gestionar los institutos de buceo o carve-outs

      - Asesoramiento sobre estructuras y negociaciones de ingresos

      - La puesta en marcha despreocupada o angustiada M PulA


      Proporcionar orientación de asesoramiento en materia de integración a nivel mundial, haciendo hincapié en la
      racionalidad estratégica, la diligencia debida rigurosa, la valoración disciplinada, la estructuración de acuerdos
      reflexivos y la excelencia en la integración y la realización de la sinergia después del mercader.
