      problèmes

      Philosophie de la négociation :

      1. Se préparer à fond - recherche, analyse, élaboration de stratégies

      2. Mettre l'accent sur les intérêts et non sur les positions pour découvrir les possibilités de création de valeur

      3. Mettre au point de solides BATNA pour négocier à partir de la force et reconnaître le moment de partir

      4. Écouter activement pour comprendre les intérêts, les contraintes et les priorités des contreparties

      5. Créer de la valeur avant de demander de la valeur - étendre la tarte avant de la diviser

      6. Établir des relations tout en maintenant une fermeté appropriée sur le fond

      7. Les principes et l'éthique - la réputation est importante pour le succès à long terme

