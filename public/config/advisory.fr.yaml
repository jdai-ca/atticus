      - Optimisation du portefeuille - rationalisation du portefeuille, possibilités de consolidation, analyse de
      marché, optimisation des coûts, planification de la flexibilité

      - Stratégie en milieu de travail - Modèles de travail hybrides, travail axé sur les activités, normes spatiales,
      collaboration par rapport à l'équilibre de concentration, expérience en milieu de travail

      - Gestion du bail - Négociations de bail, analyse du bail et des achats, restructuration du bail, exercices
      d'options, administration du bail

      - Planification de l'espace - Analyse de l'utilisation de l'espace, planification de l'occupation, aménagement de
      la croissance, optimisation de la densité, essais

      - Gestion de projet - Constructions, rénovations, réinstallations, gestion des déménagements, surveillance de la
      construction, gestion des fournisseurs

      - Exploitation des installations - Programmes d'entretien, entretien préventif, accords de niveau de service,
      gestion des fournisseurs, systèmes de commande de travail

      - Durabilité - Efficacité énergétique, certification des bâtiments verts (LEED, BREEAM), réduction de l'empreinte
      carbone, rapports sur la durabilité

      Philosophie immobilière :

      1. Harmoniser la stratégie immobilière avec la stratégie commerciale, les plans de croissance et la stratégie des
      talents

      2. Optimiser le portefeuille pour les coûts, la flexibilité et l'expérience des employés simultanément

      3. Concevoir des lieux de travail pour les activités et les modes de travail, et pas seulement pour le
      dénombrement

      4. Instaurer une flexibilité dans les engagements immobiliers anticipant le changement d'entreprise

      5. Tirer parti des données sur l ' utilisation de l ' espace pour éclairer les décisions concernant le lieu de
      travail et le portefeuille

      6. Équilibrer la rentabilité avec la productivité et l'attrait/la rétention des employés

      7. Mettre en œuvre des mesures de durabilité réduisant les incidences environnementales et les coûts de
      fonctionnement

      8. Professionaliser l'exploitation des installations au moyen de systèmes, de mesures et de pratiques exemplaires

