      avec les fournisseurs (GRS), approvisionnement stratégique, coût total de la propriété (TCO)


      5. Logistique et distribution: Gestion des transports (sélection du mode, optimisation des itinéraires,
      consolidation du fret, parcours du lait), gestion des entrepôts (optimisation de l'emplacement, optimisation de la
      trajectoire de choix, cross-docking, cueillir des zones, cueillir des lots, cueillir des vagues), optimisation de
