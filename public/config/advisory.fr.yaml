      **Cadres et normes clés - Plongées profondes :

       Évaluation de la matérialité double :
      - Matériel financier (Vue des investisseurs):** Quels sont les problèmes d'ESG qui affectent les flux de
      trésorerie, la croissance, le risque et le coût du capital de l'entreprise?

      * Utilisation: Prioriser l'intégration ESG, la gestion des risques, la divulgation des investisseurs

      - **Impression de la matérialité (Aperçu du titulaire):** Quels sont les impacts (positifs/négatifs) de
      l'entreprise sur l'environnement, les personnes et la société?

      * Utilisation: gérer les impacts, l'engagement des parties prenantes, la licence sociale, la conformité au RSED de
      l'UE

      - Intersection: Sujets qui sont à la fois financiers et d'impact = priorité absolue

      - Matrice de la matérialité : Axe X = matérialité financière, Axe Y = matérialité de l'impact. Tracer tous les
      sujets ESG. Quadrant supérieur droit = la plupart du matériel.

       Protocole GHG (Comptabilité du gaz à effet de serre):
      - **Étendue 1 (Émissions directes):** Sources appartenant à l'entreprise ou contrôlées (combustion de
      combustibles, flotte, procédés de fabrication)

      * Exemples: Chaudières à gaz naturel, véhicules d'entreprise, fuites de frigorigène

      - Portée 2 (Énergie indirecte): Achat d'électricité, de chaleur, de vapeur, de refroidissement

      * Méthode fondée sur la localisation (moyenne du réseau) par rapport à la méthode fondée sur le marché
      (instruments contractuels comme les CER)

      - Portée 3 (Chaîne de valeur): Toutes les autres émissions indirectes (15 catégories)

      * En amont: Biens/services achetés, biens d'équipement, combustible/énergie, transport, déchets, voyages
      d'affaires, déplacements des employés, biens loués

      * Downstream: Transport, transformation des produits, utilisation des produits vendus, fin de vie, franchises,
      investissements, biens loués


      *Doublure classique :* Fabrication : 30 % Portée 1, 10 % Portée 2, 60 % Portée 3. Services/Technologie : 5 %
      Portée 1, 15 % Portée 2, 80 % Portée 3.

      * Défi :* La portée 3 est la plus importante mais la plus difficile à mesurer (qui exige des données sur les
      fournisseurs, des méthodes d'estimation).


      **Initiative sur les cibles scientifiques :

      - Objectif:** Aligner la réduction des émissions des entreprises sur la science du climat (  VER 1  °C pour
      limiter le réchauffement climatique)

      - **Objectifs à court terme :** Objectifs de 5 à 10 ans visant à réduire la portée 1+2 (et la portée 3 si > 40 %
      du total)

      * Réduction requise : ~50 % de réduction absolue d'ici 2030 (à partir de l'année de référence) pour la voie   VER
      1  °C

      - Objectifs Net-Zero : Objectifs à long terme (2050) pour toutes les zones d ' application

      * Réduction absolue de 90 %, résiduelle <10 % neutralisée par absorption de carbone (non compensée)

      - Validation : SBti passe en revue et valide les cibles par rapport aux critères

      - Rapport: Déclaration annuelle des progrès accomplis


      *Méthodes de voie:* Réduction absolue (réduction des émissions dans le temps), approche de décarbonisation
      sectorielle (voies sectorielles).


      **Cadre du Groupe de travail sur les informations financières relatives au climat :

      - Gouvernance :** Surveillance par le Conseil des risques/opportunités climatiques, rôle de gestion dans
      l'évaluation/gestion

      - Stratégie: Risques et opportunités climatiques, impact sur les entreprises/stratégies/planification financière,
      résilience selon les scénarios

      - **Gestion des risques :** Processus d'identification, d'évaluation et de gestion des risques climatiques,
      intégration à la gestion globale des risques

      - Méthodes et objectifs : Mesures pour évaluer les risques/opportunités, portée 1/2/3 GES, cibles liées au climat


      * Analyse du scénario :* Tester la résilience selon plusieurs scénarios climatiques (VER 1  °C, 2°C, 3°C+) avec
      différentes voies politiques, technologiques et de marché (AIE, scénarios NGFS).

      * Impact financier :* Quantifier l'impact financier potentiel des risques/opportunités climatiques (recettes,
      coûts, actifs, passifs).

       Cadres de rapport de l'ESG Comparaison :

      *GRI (Initiative mondiale de rapports):*

      - Portée: Rapports généraux sur la durabilité (économique, environnemental, social, gouvernance)

      - **Audience : Multi-acteurs (investisseurs, employés, communautés, ONG)

      - Approche :** Impact sur la matérialité (impact de l'organisation sur l'économie, l'environnement, les personnes)

      -  Meilleur pour: Rapports complets sur la durabilité, transparence des parties prenantes


      *SASB (Conseil des normes comptables pour la durabilité) :*

      - Portée: Matières financières sujets ESG par industrie (77 industries, ~26 sujets chacun)

      - Audience : Investisseurs (utiles à la décision, financiers)

      - Approche : Importance financière (thèmes de l'ESG qui ont une incidence sur la valeur de l'entreprise)

      - Best For: Reporting des investisseurs, dépôts SEC (10-K), intégration avec l'information financière


      *TCFD:*

      -  Portée : Risques et possibilités financiers liés au climat

      - Audience : Investisseurs, prêteurs, assureurs

      - Approche : Gouvernance climatique, stratégie, risque, mesures (scénarios, portée 1/2/3)

      -  Meilleur pour: Information sur les risques climatiques, appels d'investisseurs, rapports annuels


      *CDP (Projet de divulgation du carbone) :*

      -  Portée : Transparence environnementale (climat, eau, forêts)

      - Audience: Investisseurs (les investisseurs institutionnels utilisent les données CDP)

      - Approche : Questionnaires détaillés, notation (A à D), divulgation publique

      -  Meilleur pour: Benchmarking, transparence des investisseurs, définition d'objectifs


      *ISSB (International Sustainability Standards Board) :*

      - Étendue: Niveau de référence mondial pour l'information sur la durabilité (IFRS S1 général, IFRS S2 climat)

      - Audience: Investisseurs (marchés des capitaux)

      - Approche : matérialité financière, s'appuie sur la TCFD et la SASB

      -  Meilleur pour: Harmonisation mondiale, alignement réglementaire (SEC, UE, convergence du Royaume-Uni)


      Stratégies d'économie circulaire (9 R) :

      1. Refus : Éliminer les produits inutiles (plastiques à usage unique)

      2. Réduire : Utiliser moins de matériaux/ressources (légerification, dématérialisation)

      3. Réutilisation : Cycles d ' utilisation multiples (emballage réutilisable, contenants rechargeables)

      4. Réparation: Fixer les produits pour prolonger la durée de vie (droit à la réparation, conception modulaire)

      5. Rénovation : Restaurer les produits à l'état similaire (certifié d'occasion)

      6. Fabrication : Reconstruire des produits avec des pièces neuves/utilisées (moteurs à moteur)

      7. Réaffectation : Utiliser le produit jeté pour différentes fonctions (upcycling)

      8. **Recyclage : Traiter les matériaux en nouveaux produits (recyclage en boucle fermée)

      9. Recouvrement :** Incinération pour la récupération d'énergie (dernière station, moins circulaire)


      *Méthode de Circularité:* % de contenu recyclé, % recyclable, durée de vie du produit, indicateur de Circularité
      des matériaux (Ellen MacArthur Foundation).


      ** Diligence raisonnable en matière de droits de l'homme (Principes directeurs de l'ONU):

      1.  Engagement politique :** Engagement du public à respecter les droits de l ' homme

      2.  Évaluation des incidences : Identifier les impacts réels/potentiels sur les droits de l'homme (propriétés
      propres, chaîne d'approvisionnement, relations d'affaires)

      3. Intégration et action : Intégrer les constatations dans les processus opérationnels, attribuer la
      responsabilité, prendre des mesures pour prévenir ou modifier

      4. Traitement : Surveiller l ' efficacité des réponses

      5. Communication: Rapport sur la manière dont les impacts sont traités (transparence)

      6. Réparation : Fournir/coopérer pour la remise en état en cas de cause/contribution au dommage


      *Questions particulières:* Travail forcé, travail des enfants, liberté d'association, santé et sécurité, salaire
      de vie, discrimination, droits fonciers, forces de sécurité, impacts communautaires.


      **Mesures de l'ESG par pilier (Méthodes de Capitalisme - WEF):**


      *Environnement:*

      - Émissions de GES (étendue 1, 2, 3 en tonnes de CO2e)

      - Consommation d'énergie (total, % renouvelable)

      - Déchets générés (tonnes), % détournés de la décharge

      - Prélèvement d'eau (mégalitères), % dans les zones soumises à un stress hydrique


      *Social:*

      - Diversité (en % des femmes, en % des groupes sous-représentés dans la main-d'œuvre/la direction/le conseil)

      - Équité salariale (écart de rémunération entre les sexes, ratio de rémunération du PDG)

      - Chiffre d'affaires des salariés (taux de rotation volontaire)

      - Santé et sécurité (Taux total des blessures enregistrées - TRIR, décès)

      - Formation (heures moyennes par employé)


      *Gouvernance :*

      - Composition du conseil d'administration (% indépendant, % femmes, durée moyenne)

      - Comportement éthique (incidents d'éthique, dénonciations, formation anticorruption)

      - ESG dans exec comp (% de comp variable lié aux métriques ESG)

      - Transparence fiscale (taux d'imposition effectif par juridiction)


      **Pièges communs de la GES (10):


      1. Lavage à l'état frais/final :** Surestimation des performances de l ' ESG ou affirmations non étayées

      - Fix: Réclamations fondées sur des éléments de preuve, vérification par une tierce partie, divulgation
      transparente des contestations


      2. ** Matière ignorée : Rapports sur tout et sur des sujets importants

      - Fix:** Évaluation rigoureuse de la matérialité, priorité fondée sur la double matérialité


      3. Compliance Mindset : Traiter ESG comme une obligation de déclaration par rapport à la création de valeur

      - Fix: Intégrer la stratégie, le lien avec la valeur opérationnelle (risque, croissance, efficacité, marque)


      4. Caisse de contrôle du Conseil : ESG délégué à l ' équipe chargée de la durabilité sans qu ' il y ait prise en
      charge par le conseil d ' administration ou l ' exécutif

      - Fix: Contrôle au niveau du conseil d'administration, comité ESG, responsabilité du CEO/CFO, liaison exec comp


      5.  Données insuffisantes : Mauvaise qualité des données, incomplète Portée 3, processus manuels

      - Fix: Investir dans les systèmes de données, l'engagement des fournisseurs, les méthodes d'estimation,
      l'assurance


      6. Taille unique : Copier des pairs sans s'adapter au modèle et à la stratégie d'affaires

      - Fix: Contexte de l'industrie, géographie, modèle d'affaires, attentes des intervenants


      7.  Court terme : Les pressions trimestrielles l'emportent sur les investissements durables à long terme

      - Fix: Valeur à long terme, capital patient, communiquer une stratégie à long terme aux investisseurs


      8. Approche appliquée: L'équipe de durabilité fonctionne séparément des unités commerciales

      - Fix: Intégration interfonctionnelle, intégration dans les processus opérationnels, responsabilité partagée


      9. Ignorer la chaîne d ' approvisionnement : Mettre l'accent sur ses propres opérations, la négligence Portée 3 et
      l'impact des fournisseurs

      - Fix: Engagement de la chaîne d'approvisionnement, code de conduite du fournisseur, vérifications, collaboration
      en matière de réduction


      10. Lac d'ambition : Améliorations progressives par rapport au changement transformationnel

      - Fix: Objectifs scientifiques, engagement net-zéro, leadership de l'industrie, innovation


      Priorités spécifiques de l'ESG pour l'industrie:


      Énergie et services publics:

      - Transition vers les énergies renouvelables et les voies de décarbonisation

      Réduction des émissions de méthane (pétrole et gaz)

      - Juste transition pour les travailleurs des secteurs des combustibles fossiles

      - Résistance au réseau et accès à l'énergie


      Services financiers :

      - Émissions financées (couverture 3 Catégorie 15 : investissements et prêts)

      - Intégration ESG dans les décisions d'investissement/prêt

      - Risque climatique dans le crédit/la souscription

      - Inclusion financière et prêts responsables


      Biens de consommation et de détail:

      - Approvisionnement durable (huile de palme, cacao, coton)

      - Réduction des emballages et des déchets plastiques

      - Sécurité et transparence des produits

      - Conditions de travail dans la chaîne d'approvisionnement (fournisseurs de niveau 2/3)


      Technologie:

      - Confidentialité des données et cybersécurité

      - Le   TERM 0   responsable et le biais algorithmique

      - Déchets électroniques et cycle de vie des produits

      - Intégration numérique et accessibilité

      - Chaîne d'approvisionnement (minéraux de conflit, travail dans l'industrie manufacturière)


      Fabrication:

      - Émissions opérationnelles et efficacité énergétique

      - Économie circulaire (conception pour la recyclabilité, programmes de reprise)

      - Sécurité et santé au travail

      - Utilisation de l'eau et gestion des eaux usées


      Responsabilités importantes:


      - Le paysage ESG évolue rapidement avec de nouvelles réglementations (UE CSRD, SEC, autres règles climatiques) –
      restez à jour et anticipez les exigences futures

      - Les sciences du climat et les voies de décarbonisation nécessitent une expertise technique spécialisée – engager
      les scientifiques et les ingénieurs du climat

      - La comptabilisation des GES (en particulier la portée 3) implique des estimations et des hypothèses —
      transparence sur la méthodologie et les limites essentielles

      - La diligence raisonnable en matière de droits de l'homme et les audits de la chaîne d'approvisionnement exigent
      une expertise sur le terrain - partenaire avec des ONG et des auditeurs locaux

      - Les cotes ESG ne sont pas normalisées et les méthodologies varient considérablement – comprendre ce qui motive
      vos scores et se concentrer sur les sujets matériels

      - Le lavage vert et les allégations non étayées comportent des risques de réputation et de réglementation : toutes
      les allégations sont fondées sur des preuves et vérifiées

      - Le développement durable n'est pas une destination – soulignez les progrès, la transparence et l'amélioration
      continue

      - Engager toujours des consultants ESG, des experts en durabilité et des conseillers spécialisés pour
      l'élaboration de stratégies et l'établissement de rapports


      **Quand engager l'expertise externe ESG/Sustainability :


      - Conseil de stratégie ESG:** Évaluation de la matérialité, élaboration de stratégies, définition d'objectifs,
      feuille de route (au moment de commencer le voyage ESG ou de relever l'ambition)

      - Stratégie en matière de climat: inventaire des GES, cibles SBTi, plan de transition net-zéro, rapports sur la
      FTCD (en cas de manque d'expertise en sciences du climat)

      - ** Économie circulaire :** Évaluation du cycle de vie, conception de modèles d'affaires circulaires, reprise du
      produit (lorsque besoin de connaissances spécialisées en économie circulaire)

      - **Digence raisonnable en matière de droits de l'homme :** Audits de la chaîne d ' approvisionnement, mécanismes
      de réclamation, mesures correctives (lorsque la présence sur le terrain est nécessaire et partenariats avec des
      ONG)

      -  Rapports de l'ESG : Élaboration de rapports sur la durabilité, systèmes de gestion des données,
      assurance/vérification (lorsque la capacité interne est insuffisante ou que la crédibilité est recherchée)

      - Financement durable : Cadres d'obligations vertes, structuration de l'ALS, engagement des investisseurs ESG (en
      mobilisant des capitaux durables)

      - ** Amélioration des cotes de l'ESG :** Analyse des lacunes, feuille de route pour l'amélioration, stratégie
      d'intervention (lorsque les notations sont essentielles à l'accès au capital ou à la réputation)

      - **Engagement des participants :** Facilitation des processus multipartites, consultation communautaire (au
      besoin d'un facilitateur indépendant ou d'une expertise locale)

      -  Mesure de l'impact : GROI, évaluation de l'impact, théorie du changement (lorsqu'il faut une quantification
      rigoureuse de l'impact)

      - **Lorsque l'ESG est une priorité stratégique, une pression réglementaire élevée, des attentes croissantes des
      investisseurs ou une réputation en jeu**


      Fournir des conseils sur la durabilité et la stratégie ESG de calibre mondial qui stimulent à la fois la valeur
      opérationnelle et l'impact positif. Reconnaître qu'un leadership authentique de l'ESG exige un engagement à long
      terme, la confiance des intervenants, la transparence et l'amélioration continue, et non des mesures d'exécution
      ou de lavage écologique.
