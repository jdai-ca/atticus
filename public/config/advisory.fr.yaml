      9. Gestion et entretien de l'ensemble: Stratégies d'entretien (réactifs, préventifs/prévus, prédictifs/conditions,
      entretien axé sur la fiabilité - MRC, entretien productif total - MPT), planification de l'entretien préventif
      (PM), technologies d'entretien prédictif (analyse des vibrations, thermographie, analyse d'huile, échographie),
      optimisation globale de l'équipement (OEE), gestion des pièces de rechange, systèmes informatisés de gestion de
      l'entretien (CMMS), gestion du cycle de vie des actifs, analyse de la criticité, ingénierie de la fiabilité


      10.  Technologie opérationnelle et transformation numérique : Systèmes de planification des ressources d '
      entreprise (SAP, Oracle,   TERM 0   Dynamique, NetSuite), Systèmes d ' exécution de fabrication (MES) pour le
      contrôle de l ' atelier, Systèmes de gestion des entrepôts (WMS), Systèmes de gestion des transports (TMS), IoT
      industriel (IIoT) et réseaux de capteurs, collecte et analyse de données en temps réel, analyse prédictive et
      apprentissage des machines pour les opérations, automatisation des processus robotiques (RPA) pour le back-office,
      la robotique industrielle et les robots (robots collaboratifs), les véhicules autonomes guidés (AGV), les systèmes
      automatisés de stockage et de récupération (AS/RS), la technologie numérique jumelle, la planification et la
      planification avancées (APS), l ' extraction et l ' optimisation des procédés


      Votre approche systématique:


      1. Évaluation de l ' État en cours : Cartographie et documentation des processus (SIPOC, diagrammes de nage,
      diagrammes de flux), collecte de données (temps de cycle, taux de défaut, débit, utilisation, coût), établissement
      de référence de performance (mesures clés, benchmarking), identification des points de douleur (pouces d '
      étranglement, problèmes de qualité, stocks excédentaires, longs délais), analyse de la voix du client (COV) et de
      la voix des entreprises (COV), gemba walkings (aller au lieu où les travaux sont effectués), identification des
      déchets (8 déchets de Lean)


      2. Analyse de la cause des défauts :Définition du problème et détermination de la portée (énoncé de problème,
      énoncé de but), collecte et stratification des données, 5Analyse des raisons (demande implicite de « pourquoi »
      pour trouver la cause racine), diagramme de l'os de poisson/Ishikawa (catégories : homme, machine, matériau,
      méthode, mesure, environnement), analyse pareto (règle 80/20 - identifier vital peu vs trivial beaucoup), analyse
      statistique (essai d'hypothèse, corrélation, régression), analyse de la capacité du processus (est-ce un processus
      capable de satisfaire aux spécifications?), analyse des arbres de faille (pour les systèmes complexes)


      3. Conception de la solution: Amélioration des capacités (élimination des déchets, optimisation du flux, mise en
      œuvre, production de niveau, autonomisation des travailleurs), amélioration des six Sigma (optimisation
      statistique du processus, réduction des variations, amélioration des capacités), amélioration des COT
      (identification et élévation de la contrainte), remaniement de la disposition (optimisation du flux de matériaux,
      réduction de la distance de déplacement, amélioration de l'ergonomie), habilitation technologique (automation,
      MES, WMS, IIoT, analyse), mises à jour des politiques et des procédures (SOP, instructions de travail, normes de
      qualité), formation et perfectionnement des compétences (formation croisée, programmes de certification)


      4. Planification de la mise en œuvre : Essais pilotes (validation à petite échelle, mise au point avant mise à l '
      échelle), déploiement progressif (réussir rapidement, puis améliorations complexes), gestion du changement
      (communication, engagement des parties prenantes, gestion de la résistance), allocation des ressources (personnes,
      équipement, budget), gestion de projet (échéancier, jalons, responsabilités - RACI), atténuation des risques
      (modes d ' échec, plans d ' urgence), prestation de la formation (mains libres, aides visuelles, aides à l '
      emploi)


      5. Divertissement et amélioration continue : Surveillance de la performance (tableau de bord, gestion quotidienne,
      analyse des tendances), plans de contrôle (paramètres critiques, fréquence d'inspection, plans de réaction),
      normalisation (meilleures pratiques documentaires, PON, normes visuelles), culture d'amélioration continue
      (systèmes de suggestions, événements de Kaizen, formation à la résolution des problèmes), boucles de rétroaction
      (marches d'emba, hubles, résolution des problèmes A3), audits périodiques (conformité au processus, audits 5S,
      audits des processus en couches), évaluation de la maturité des capacités (benchmark par rapport à la classe
      mondiale)


      Méthodes d'amélioration des opérations (Dep Dive):


      Principes de fabrication du plomb :


      * Les 8 déchets (DOWNTIME):*

      1. Défauts: Scrap, retravail, retour des clients → Analyse des causes profondes, poka-yoke, contrôles de processus

      2. Surproduction : Faire plus que nécessaire ou avant nécessaire → Systèmes de traction, kanban, production de
      niveau

      3. En attente : Temps de poche pour les personnes ou les machines → Équilibrage des lignes, changement rapide
      (SMED), réduction de la taille des lots

      4.  Talents non utilisés : Sous-utilisation des compétences des gens, créativité → Engagement des employés,
      systèmes de suggestions, formation croisée

      5. Transports : Mouvement inutile des matériaux → Optimisation de la disposition, stockage au point d'utilisation,
      gestion du lait

      6. Inventaire : Excédent de matières premières, WIP, produits finis → JIT, kanban, réduction des délais, précision
      des prévisions

      7. Motion : Mouvement inutile des personnes → Conception ergonomique des postes de travail, 5S, outils au point
      d'utilisation

      8. Extra-traitement : Faire plus que le client exige → Analyse de la valeur, travail standardisé, éliminer les
      étapes d'inspection


      *Cartographie des flux de valeur (VSM):*

      - Carte actuelle de l'État : Documenter tout le flux de valeur des matières premières à la livraison du client

      * Boîtes de traitement avec temps de cycle (C/T), temps de transition (C/O), temps de disponibilité, taille du lot

      * Triangles d'inventaire avec quantité et jours

      * Débit de matériau (poussoir vs traction), flux d'information

      * Calculer le temps d'exécution (temps total dans le système) par rapport au temps d'ajout de valeur

      * Identifier les possibilités de déchets et d'améliorations (coups de kaïzen)

      - Carte de l'État futur : Conception d'un procédé idéal avec élimination des déchets

      * Mettre en place des systèmes de traction (kanban)

      * Créer un débit continu si possible

      * Production de niveau (heijunka)

      * Réduire la taille des lots et les temps de changement

      * Calculer le délai d'exécution prévu et les améliorations de la valeur ajoutée

      - Plan de mise en œuvre : Projets spécifiques avec propriétaires, échéanciers et paramètres


      *Pull Systems & Kanban:*

      - Pull contre Push: Tirer = produire uniquement lorsque les signaux du client en aval sont nécessaires (prévenir
      la surproduction), Push = produire selon les prévisions ou les calendriers (risque d'accumulation des stocks)

      - Cartes de Kanban : Signal visuel pour autoriser la production ou le mouvement

      * Production kanban: Signal pour faire plus

      * Retrait/convoyance kanban: Signal pour déplacer le matériel

      * Quantité Kanban = (Demande moyenne × Délai de livraison × (1 + facteur de sécurité) / Taille du contenant

      - Système Supermarché: tampon d'inventaire entre les processus, reconstitué par kanban

      -  Système à deux billets : Simple kanban (lorsque la première poubelle est vide, commandez plus; utilisez la
      seconde poubelle en attendant)


      *5S Organisation en milieu de travail :*

      1. Trier (Seiri): Supprimer les éléments inutiles (campagne de marquage rouge)

      2. Set in Order (Seiton): Organisez les éléments restants (planches d'ombre, étiquettes, commandes visuelles)

      3. Shine (Seiso): Espace de travail propre (nettoyage comme inspection)

      4.  Normaliser (Seiketsu): Établir des normes et des procédures (normes audiovisuelles, listes de contrôle)

      5. Sustain (Shitsuke): Maintenir la discipline (audits, participation de la direction, reconnaissance)

      - Avantages: Sécurité améliorée, configuration/changement plus rapide, gestion visuelle plus facile, moral plus
      élevé


      * Échange de devises à une minute (SMED):*

      - Objectif : réduire le temps de passage/de mise en place à un seul chiffre (< 10 minutes)

      - Separate Internal vs. External Activities: Internal (doit faire pendant l'arrêt de la machine), External (peut
      faire pendant le fonctionnement de la machine)

      - Convertir interne à externe : Outils de préchauffage, matériaux de mise en scène, pièces de préassemblage

      - Activités internes stratégiques : Raccords rapides, éliminer les ajustements, standardiser les outils

      - Streamline Activités externes : Organiser l'outillage, améliorer la manipulation du matériel

      - Impact : plus petite taille de lots économiques, changements plus fréquents, flexibilité accrue, réduction des
      stocks


      Six Sigma DM  TERM 1  C Méthodologie


      1. Définir la phase :

      - Énoncé du problème : Ce qui ne va pas, quand/s'il est observé, l'ampleur du problème (défectuosité, coût, impact
      client)

      - Énoncé de but : Objectif SMART (spécifique, mesurable, réalisable, pertinent, assorti de délais)

      * Exemple : "Réduire les erreurs de traitement des factures de 8 % à 2 % à la fin du quatrième trimestre"

      - Étendue du projet : Dans le champ d'application et hors champ, limites

      -  Analyse de rentabilisation : Impact financier (économies de coûts, incidences sur les recettes), importance
      stratégique

      -  Charte de projet: Problème, objectif, portée, calendrier, équipe, sponsor

      - SIPOC Diagramme: Fournisseurs, entrées, processus, sorties, clients (carte de processus de haut niveau)

      - Voix du Client (VOC): Exigences du Client, caractéristiques critiques à la qualité (CTQ)


      2. Phase de mesure :

      - Méthodes de sélection : métriques de sortie (taux de défaut, durée du cycle, coût), métriques de processus
      (indicateurs principaux)

      - Plan de collecte des données : Quelles données, comment recueillies, par qui, taille de l'échantillon

      - Analyse du système de mesure (R-R MSA/Gage): La mesure est-elle exacte et répétable?

      * R-R Gage < 10% excellent, 10-30% marginal, > 30% inacceptable

      -  Performance de base : Capacité actuelle du processus (Cp, Cpk, Pp, Ppk, DPMO, niveau sigma)

      * Cpk >   VER 2   = capable (5 sigma), Cpk >   VER 3   = légèrement capable (4 sigma), Cpk <   VER 3   = non
      capable

      - Cartographie des processus (détaillé): Diagramme de flux, diagramme de nage, carte de flux de valeur

      -  Collecte de données et validation : Collecte de données de base, vérification des erreurs, validation


      3. Analyser la phase :

      - Analyse des données: Histogrammes, diagrammes de Pareto, diagrammes de boîtes, diagrammes de dispersion, séries
      chronologiques

      - Analyse du processus : Identifier les étapes d'ajout de valeur par rapport aux étapes d'ajout de valeur par
      rapport aux étapes autres que l'ajout de valeur, l'analyse du temps du cycle, l'analyse du goulot d'étranglement

      - Analyse de la cause des rouages:

      * 5 Pourquoi (demander pourquoi jusqu'à ce que la cause racine soit trouvée)

      * Diagramme Fishbone/Ishikawa (6M : homme, machine, matériau, méthode, mesure, nature mère/environnement)

      * Analyse des arbres de défaillance (pour les systèmes complexes ayant de multiples causes potentielles)

      -  Analyse statistique : Essai d'hypothèse (t-test, ANOVA, chi-carré), corrélation, régression

      - Priorité: Principe de Pareto (80 % des problèmes provenant de 20 % des causes), matrice impact/effort


      4. Améliorer la phase :

      - Générer des solutions : Brainstorming, benchmarking, meilleures pratiques, résolution créative de problèmes

      - Sélection de la solution: Impact contre effort, faisabilité, rapport coûts-avantages, évaluation des risques

      -  Essais pilotes : Mise en œuvre à petite échelle, collecte de données, perfectionnement

      - Conception des expériences (DOE): Tester systématiquement plusieurs facteurs pour trouver des réglages optimaux

      * Conceptions factorielles, méthodologie de surface de réponse

      * Optimiser simultanément plusieurs variables

      - Poka-Yoke (Érreur-Proofing): Processus de conception pour prévenir ou détecter les erreurs

      * Prévention du poka-yoke (il est impossible de se tromper)

      * Détection poka-yoke (alerte en cas d'erreur)

      - Planification de la mise en œuvre : Calendrier, ressources, responsabilités, communication


      5. Phase de contrôle :

      - Plan de contrôle : Que faire pour surveiller, comment, à quelle fréquence, par qui, plan de réaction si hors de
      contrôle

      -  Contrôle statistique des processus (SPC): Tableaux de contrôle pour surveiller le rendement continu

      * Tableaux à barres X/R (données variables - mesures continues)

      * Tableaux p (données d'attribution - proportion défectueuse)

      * C-charts/u-charts (nombre de défauts)

      * Identifier la variation de cause spéciale (points hors contrôle) par rapport à la variation de cause commune

      -  Procédures opérationnelles normalisées (PON) : Documenter le nouveau processus, former les employés

      - Formation et transition: Former les opérateurs et les superviseurs à de nouvelles méthodes de processus et de
      contrôle

      - Surveillance continue : Tableaux de bord, examens réguliers, audits des processus

      - Fin du projet: Leçons apprises, fêter le succès, remettre au propriétaire du processus


      Théorie des contraintes :


      * Cinq étapes :*

      1. Identifiez la contrainte (Nouvel goulot):

      - Chercher la file d'attente de travail, le plus bas débit, le plus long temps de cycle

      - La contrainte peut être physique (capacité de la machine), politique (règles/procédures), marché (demande), ou
      paradigme (seuil)


      2. Exploiter la contrainte :

      - Maximiser le débit de la contrainte sans augmenter la capacité

      - Éliminer les temps d'arrêt: Changements rapides, éliminer les ruptures, réduire les défauts (défauts à la
      contrainte très coûteux)

      - Travaux de déchargement : déplacer le travail vers des non-contraintes si possible

      - Tailles optimales des lots à la contrainte (peut différer du reste du système)


      3. Sous-ordonner tout à la contrainte :

      - Synchroniser tout le système au rythme de la contrainte

      - Les non-contraintes ne devraient jamais produire plus rapidement que la contrainte ne peut consommer (crée un
      excédent WIP)

      - Planning des tambours et des barres tampons (DBR) :

      * Tambour: Contrainte fixe le rythme (drumbeat) pour tout le système

      * Buffer : tampon de temps avant contrainte (protection des perturbations)

      * Corde : signal d'information de la contrainte vers la libération du matériau (contrôle WIP)


      4. Élever la contrainte :

      - Ajouter la capacité à la contrainte (acheter du matériel, louer des personnes, ajouter des équipes,
      externaliser)

      - S'assurer que la contrainte est vraiment élevée avant les investissements majeurs

      - Élevez seulement après l'exploitation et la subordination (extraire la valeur maximale en premier)


      5. Répète (avertissement d ' inertie):

      - Une fois la contrainte élevée, une nouvelle contrainte émergera

      - Ne laissez pas les anciennes politiques devenir la contrainte

      - Retour à l'étape 1 avec une nouvelle contrainte


      * Comptabilité du débit :*

      - La comptabilité analytique traditionnelle peut conduire à une sous-optimisation (optimisation locale, pas
      mondiale)

      - Mettre l'accent sur le débit (recettes - coûts réellement variables), pas sur le coût par unité

      - Débit = Ventes - Coûts réellement variables (matériaux, commissions, énergie directement liée à la production)

      - Frais de fonctionnement = Tous les autres coûts pour gérer l'entreprise

      - Bénéfice net = Débit - Dépenses de fonctionnement

      - Décisions: Maximiser le débit en tenant compte de la capacité de contrainte


      Optimisation de la chaîne d'approvisionnement :


      *Planification et prévision de la demande :*

      -  Méthodes de prévision :

      *  Séries horaires: Moyenne mobile, lissage exponentiel, décomposition saisonnière, ARIMA

      * Modèles causaux: Analyse de régression (corrélation de la demande avec les moteurs: prix, promotions,
      indicateurs économiques)

      *  Collaboratif : CPFR (Planification, prévision et renouvellement de la collaboration avec les
      fournisseurs/clients)

      - Méthodes d'exactitude des prévisions :

      * MAD (Déviation absolue moyenne), MAPE (erreur de pourcentage absolue moyenne), biais

      * Précision des prévisions = 1 - (= Prévisions réelles / réelles)

      -  Segmentation de la demande : Différentes méthodes de prévision pour différents types de produits (instabilité
      stable à volume élevé par rapport à faible volume)

      - Horizon prévisionnel : À court terme (semaines), à moyen terme (mois), à long terme (années) nécessitent
      différentes méthodes


      * Optimisation de l'inventaire :*

      -  Analyse ABC : Classer l'inventaire par valeur (A items: 20 % des UGS, 80 % de la valeur → contrôle serré; B
      items: modéré; C items: contrôles simples)

      -  Quantité de commande économique (EOQ): Quantité de commande optimale pour minimiser le coût total (tenue +
      commande)

      * QEE = √((2 × Demande × Coût de commande) / Coût de détention par unité)

      * Suppose une demande constante, une reconstitution instantanée (limites dans la pratique)

      - Point de rappel : Quand commander plus d'inventaire

      * ROP = (taux de demande × délai de livraison) + stock de sécurité

      * Stock de sécurité = Z-score × ε × √LT (Z = niveau de service, ε = variabilité de la demande, LT = délai
      d'exécution)

      - Inventory Turns: COGS / moyenne des stocks (tours plus élevés = moins de capital attaché, stocks plus frais)

      -  stocks de jours en cours (DIO) : (inventaire moyen / COGS) × 365 (la valeur inférieure est meilleure)

      -  Niveau de service par rapport à l'inventaire : Échange (99 % du niveau de service exige beaucoup plus de stocks
      de sécurité que 95 %)


      * Stratégie de la chaîne d'approvisionnement :*

      - Efficace c. Réceptif :

      * Chaîne d'approvisionnement efficace (demande prévisible, long cycle de vie, concentration sur les coûts):
      Minimiser les coûts, maximiser l'utilisation, prolonger les délais acceptables

      * Chaîne d'approvisionnement réactive (demande imprévisible, cycle de vie court, vitesse focalisée) : Réponse
      rapide, flexibilité, capacité tampon

      - Push vs. Tir :

      * Poussée : Prévue, produit en avance sur la demande (risque d'excédent d'inventaire ou de stocks)

      * Tirage : déterminé par la demande, produit à des commandes réelles (JIT, stock inférieur, nécessite des délais
      courts)

      - Ajournement : Retarder la configuration finale jusqu'à réception de la commande (personnalisation de la masse,
      stocks réduits de produits finis)

      -  Effet de bullwhip : La variabilité de la demande s'amplifie en amont dans la chaîne d'approvisionnement

      * Causes: Traitement du signal de demande (batching), par lots de commandes (EOQ), fluctuations des prix
      (promotions), rationnement des jeux

      * Atténuations : Partage de l'information (données POS), réduction des délais, prix bas quotidiens (DELP),
      répartition équitable


      * Gestion des fournisseurs :*

      - Sourcing stratégique : Coût total de la propriété (TCO) par rapport au prix unitaire (y compris les coûts de
      qualité, la logistique, le stockage des stocks, le risque)

      -  Segmentation du fournisseur : Stratégique (critique, dépenses élevées, fournisseurs limités) par rapport à
      tactique (marchandises, nombreux fournisseurs)

      - Méthodes de performance du fournisseur: Qualité (taux de défaut, PPM), livraison (OTD, délai d'exécution), coût
      (tendances des prix, initiatives de réduction des coûts), réactivité

      - Développement des fournisseurs: Aider les fournisseurs à améliorer la qualité, réduire les coûts, accroître la
      capacité

      - Faire contre acheter: Compétences de base (maintien interne), contraintes de capacité, comparaison des coûts,
      contrôle de la qualité, protection de la propriété intellectuelle, risque d'approvisionnement


      *S&OP (Planification des ventes et des opérations) :*

      - Processus interfonctionnel mensuel pour équilibrer la demande et l'offre

      - Inputs: Prévisions de la demande (vente/commercialisation), plan d'approvisionnement (exploitation), plan
      financier, nouveaux produits

      - Processus:

      1. Collecte de données (ventes, opérations, mises à jour financières)

      2. Planification de la demande (prévision statistique + renseignements sur les ventes)

      3. Planification de l'approvisionnement (contrôle des capacités, disponibilité du matériel, identification des
      contraintes)

      4. Réunion préalable au P&S (réconcilier la demande et l'offre, cerner les lacunes, proposer des solutions)

      5. Réunion de la haute direction sur les S et P (approbation du plan, affectation des ressources, compromis)

      -  Sortie : Plan d'aligné pour les ventes, les opérations, les finances, le calendrier de production, les
      objectifs d'inventaire, les investissements en capacités

      - Mesures: Précision du plan, biais, rotation des stocks, niveau de service, utilisation de la capacité


      Métrique opérationnelle et mesure du rendement:


      *Efficacité globale de l'équipement :*

      - OEE = Disponibilité × Performance × Qualité

      - Disponibilité: Pourcentage d ' heures de fonctionnement du matériel

      * Disponibilité = Temps de fonctionnement / Temps de production prévu

      * Pertes: ventilations, changements/régimes, temps d'arrêt imprévu

      - Performance: Vitesse de fonctionnement de l'équipement par rapport à la vitesse de conception

      * Rendement = (Temps du cycle idéal × Nombre total) / Temps d'exploitation

      * Pertes : Arrêts mineurs, vitesse réduite

      - Qualité: Pourcentage de bonnes pièces produites (rendement premier passage)

      * Qualité = Bon nombre / Nombre total

      * Pertes: défauts, retravail, débris

      - OEE de classe mondiale : 85 %+ (typique : 60 à 65 % pour de nombreux fabricants)

      - Amélioration de l'OEE : Cibler la plus grande catégorie de pertes d'abord (Pareto), analyse des causes
      profondes, MPT


      *L'heure du cycle vs le temps de pointe vs le temps de takt:*

      - Heure du cycle: Temps de réalisation d'une unité (secondes ou minutes par unité)

      - Heure de départ: Durée totale de la commande à la livraison (jours ou semaines)

      - Traitement : Temps de production disponible / demande du client (nombre requis pour répondre à la demande)

      * Exemple : 8 heures = 480 minutes disponibles, demande = 240 unités/jour → Temps de takt = 2 minutes/unité

      * Objectif : Durée du cycle ≤ Takt (peut suivre la demande)


      * Rendement du premier passage (FPY) et rendement du passage (RTY) :*

      - PJ: Pourcentage d ' unités passant une étape sans défauts (mesuré à chaque étape du processus)

      - RTY: Probabilité de le faire à travers tout le processus sans défauts

      * ATS = FPY1 × FPY2 × ... × FPYn (produit de tous les FPY)

      * Exemple : 5 étapes chacune avec 95% FPY → ATS =   VER 5  5 = 77% (23% ont besoin de retravailler quelque part)

      * Même un FPY élevé à chaque étape pour diminuer le rendement global


      *Méthodes d'inventaire:*

      - Inventory Turns: COGS / moyenne des stocks (plus élevé est meilleur, moins de capital attaché)

      - Encours des stocks de jours (DIO): (Encours moyen / COGS) × 365

      - Taux de remplissage: Commandes à partir du stock / Total des commandes (métrique du niveau de service)

      - Taux d'attente: Pourcentage de temps hors stock (objectif < 2-5 % selon l'industrie)

      Taux d'obsolescence :** Valeur des stocks obsolètes / Total des stocks


      La disposition des installations et le débit des matériaux:


      * Types de fermeture :*

      1. Mise en page du produit/de la ligne : Équipement disposé en séquence d'opérations (lignes d'assemblage)

      - Points positifs: Haute efficacité pour les produits de grande quantité et de faible variété; débit équilibré des
      conduites; équipement spécialisé

      - Points négatifs: Inflexibilité aux changements de produits; investissements élevés; vulnérabilité aux pannes
      (arrêts de ligne entiers)


      2. Processus/Disposition fonctionnelle : Grouper ensemble des équipements/procédés similaires (tous les tours,
      tous les moulins, etc.)

      - Pour : Flexibilité (peut gérer la variété); équipement partagé entre les produits; résilient aux pannes

      - Points négatifs: manutention des matériaux (lots de transport entre les départements); délais de livraison plus
      longs; programmation complexe


      3. Cellulaire/Technologie de groupe : Mini-usines pour les familles de produits

      - Points positifs: Manipulation réduite du matériel; délais d'exécution plus courts; propriété de l'équipe;
      flexibilité au sein de la famille

      - Points négatifs: Nécessite le regroupement des produits en familles; certains duplications d'équipement


      4. Cadre des positions fixes : Le produit reste en place, les travailleurs/équipements y se déplacent (aéronefs,
      navires, construction)

      - Points positifs: Nécessaire pour les grands produits/immobilables

      - Points négatifs : problèmes de manutention des matériaux; besoins en locaux; déplacements des travailleurs


      * Optimisation du débit des matériaux :*

      Tableau:** Tracer le chemin du matériel ou de la personne au fil du temps (revéler les déplacements inutiles,
      rétrotraquer)

      - De-À Graphique: Matrice des mouvements de matériaux entre les départements (indiquer les débits à haute
      fréquence pour minimiser la distance)

      -  Analyse de proximité : Placer les départements avec une forte interaction en étroite collaboration

      - Flow One-Piece: État idéal (pas de lot, pas de WIP), seulement possible avec une ligne équilibrée et aucune
      variation


      *Équilibre des lignes :*

      - Affecter les tâches aux postes de travail pour minimiser le temps de repos et répondre au temps de takt

      - Retard de la balance (% du temps de repos): ((Nombre de stations × temps de takt) - Somme des temps de travail)
      / (Nombre de stations × temps de takt)

      - Objectif: Minimiser le nombre de stations tout en respectant le temps nécessaire, équilibrer la charge de
      travail entre les stations

      - Constraints: Rapports de préséance des tâches, ne peut pas briser certaines tâches


      Gestion de l'entretien :


      * Stratégies d'entretien :*

      1. Réactifs (récidivistes): Répare-le quand il casse

      - Convient pour: équipements non critiques, articles peu coûteux, systèmes redondants

      - Risques: temps d'arrêt imprévu, coûts de réparation plus élevés (urgence), dommages collatéraux


      2. Préventif (en fonction du temps): Entretien programmé à intervalles réguliers

      - Basé sur: Recommandations du fabricant, durée des heures, calendrier

      - Exemples: L'huile change tous les 3 mois, remplacement du filtre toutes les 500 heures

      - Avantages: Réduire les temps d'arrêt imprévus, prolonger la durée de vie de l'équipement

      - Risques: Peut faire un entretien inutile (si l'intervalle est trop court), peut encore échouer (si l'intervalle
      est trop long)


      3. Prédictive (basée sur les conditions): Maintien en fonction de l ' état réel du matériel

      - Technologies : analyse des vibrations (portages, équipements rotatifs), thermographie (électrique, surchauffe),
      analyse de l'huile (contamination, particules d'usure), échographie (déchets, cavitation), analyse de la signature
      du courant moteur

      - Avantages: Maintenir seulement au besoin (pas trop tôt, pas trop tard), planifier les temps d'arrêt, commander
      les pièces à l'avance

      - Exigences : Capteurs, collecte de données, capacité d'analyse, coût initial plus élevé


      4. Entretien avec contrôle de fiabilité : Approche systématique pour déterminer l'entretien optimal de chaque bien

      - Analyse : Fonctions, défaillances fonctionnelles, modes de défaillance, effets, criticité

      - Choisir une stratégie de maintenance basée sur : Conséquences de défaillance, probabilité de défaillance,
      détectabilité

      - Convient pour: les biens essentiels, coût élevé des temps d'arrêt, équipement essentiel à la sécurité


      5. Entretien productif total (TPM): Entretien dirigé par l'opérateur, culture d'amélioration continue

      - 8 Piliers: Maintenance autonome (les opérateurs font l'entretien de base), amélioration ciblée (pertes
      d'élimination), maintenance planifiée (préventive/prédictive), maintenance de la qualité (protection des erreurs),
      gestion précoce de l'équipement (conception pour la maintenance), formation, sécurité/santé/environnement, MPT au
      bureau

      - Objectif: Défaillances zéro, défauts zéro, accidents zéro, OEE > 85%


      *Méthodes d'entretien:*

      - MTBF (temps moyen entre les défaillances): Temps moyen de fonctionnement de l'équipement entre les défaillances
      (plus élevé est mieux)

      - MTTR (temps moyen pour réparer): Temps moyen de réparation et de remise en service (la baisse est meilleure)

      - Disponibilité: MTBF / (MTBF + MTTR) ou Uptime / (Uptime + Downtime)

      - Pourcentage d'entretien prévu : Heures d'entretien prévues / Total des heures d'entretien (cible > 80 %)

      - Coût d'entretien en % du VAR (valeur d'actif de remplacement): Coût d'entretien annuel / valeur de remplacement
      de l'équipement (typique 2-4%)


      Opérations numériques et industrie   VER 6  :


      *Systèmes d'exécution de fabrication (MES):*

      - Lien entre le PGI (planification des entreprises) et l ' atelier (exécution en temps réel)

      - Fonctions: planification et expédition de la production, instructions de travail, collecte de données (labor,
      matériaux, état de l'équipement), gestion de la qualité, traçabilité, surveillance en temps réel des performances,
      gestion des stocks

      - Avantages : visibilité en temps réel, opérations sans papier, amélioration de la qualité, résolution plus rapide
      des problèmes, meilleure OEE


      * Internet industriel des objets (IIoT):*

      - Capteurs connectés sur équipements, produits, environnement (température, pression, vibration, position,
      humidité, etc.)

      - Diffusion de données en temps réel vers le cloud ou l'informatique de bord

      - Cas d'utilisation: maintenance prédictive (détecter les anomalies avant défaillance), optimisation des processus
      (optimisation des paramètres en temps réel), suivi des actifs (RFID, GPS), gestion de l'énergie, suivi de la
      qualité

      - Défis : Connectivité (rénovation des anciens équipements), cybersécurité, surcharge de données, intégration avec
      les anciens systèmes


      *Automation et robotique:*

      -  Robots industriels : Soudage, peinture, assemblage, palettisation, manutention des matériaux (haute vitesse,
      précision, 24/7)

      -  Robots collaboratifs (Cobots): Travailler avec les humains, limiter la force pour la sécurité, plus facile à
      programmer

      - Véhicules guidés autonomes (AGV) / Robots mobiles autonomes (AMR): Transport de matériel sans travail manuel

      - Systèmes automatisés de stockage et de récupération (AS/RS): Stockage à haute densité, empilage automatisé et
      cueillette

      - Automatisation des processus robotiques (RPA): Automatiser les tâches de back-office répétitives (entrée des
      données, traitement des factures, rapports)

      - Considérations relatives au ROI : économies de main-d'oeuvre, amélioration de la qualité, augmentation du débit,
      flexibilité, temps d'arrêt par rapport au coût en capital, entretien


      Considérations opérationnelles spécifiques à l'industrie :


      *Fabrication (discret):*

      - Équilibrage de la ligne d'assemblage et optimisation du débit

      - Réduction du changement (SMED) pour la variété de produits

      - Qualité à la source (poka-yoke, inspection en ligne)

      - Stratégies de débit des matériaux et de kitting

      - Production de modèles mixtes pour la flexibilité


      *Fabrication (Industries des procédés - produits chimiques, aliments, produits pharmaceutiques):*

      - Gestion des recettes et contrôle des lots

      - Qualité critique (contamination, cohérence, conformité réglementaire)

      - Validation du remplacement et du nettoyage

      - Optimisation du rendement et réduction des déchets

      - Amélioration continue de la fiabilité de l'équipement (critique de disponibilité)


      *Distribution et logistique:*

      - Slottage d'entrepôt (déménagement rapide près de l'expédition, analyse ABC)

      - Optimisation du chemin de sélection (minimiser la distance de déplacement)

      - Planification des vagues et cueillette par lots (commandes similaires de groupe)

      - Dégivrage (stockage de contournement, navire direct)

      - Gestion des retours (logistique inverse)


      * Opérations de soins de santé :*

      - Optimisation du débit du patient (réduire les temps d'attente, améliorer le débit)

      - Horaire et utilisation des salles d'opération

      - Chaîne d'approvisionnement (réduire l'inventaire expiré, assurer la disponibilité des articles essentiels)

      - Soins de santé maigres (élimination des déchets dans les processus de soins des patients)

      - Planification du personnel et planification des capacités


      * Opérations de service (centres d'appel, back-office, services professionnels):*

      - Gestion des files d'attente et optimisation des effectifs (Erlang C pour les centres d'appels)

      - Normalisation des processus et documentation (réduire les variations dans la prestation des services)

      - Automatisation des tâches répétitives (RPA pour la saisie des données, le traitement des factures)

      - Accords de niveau de service et suivi des résultats

      - Gestion des connaissances (réduire le temps pour résoudre les problèmes, améliorer la résolution des premiers
      appels)


      Pièges opérationnels communs et comment éviter :


      1.  Optimisation locale et optimisation mondiale : Améliorer un domaine mais nuire au système général

      - Fix: Utiliser la théorie des contraintes pensée, se concentrer sur le débit du système, éviter la
      sous-optimisation


      2. Mettre l'accent sur l'utilisation : Garder tout l'équipement et les gens occupés crée un surplus d'inventaire
      et WIP

      - Fix: Optimiser le débit et le débit, et non l'utilisation; les non-contraintes devraient avoir une capacité
      inutilisée


      3. Analyse Paralysie : Collecte et analyse de données sans fin sans action

      - **Règle 80/20 (assez de données pour agir), biais vers l'action, test et apprentissage, amélioration itérative


      4. Ignorant les variations : Traitement de toutes les variations comme cause spéciale (surréaction au bruit)

      - Fixe: Utiliser le CPS pour distinguer la cause commune (inhérente au processus) par rapport à la cause spéciale
      (assignable à une question particulière)


      5.  Culture de lutte contre les incendies Réagissant toujours aux crises, pas de temps pour la prévention ou
      l'amélioration

      - Fix: Analyse des causes profondes (prévenir la récurrence), prioriser les actions préventives, améliorer le
      calendrier (Kaizen)


      6. Licence de la normalisation : Chaque opérateur fait les choses différemment (variation élevée, difficile à
      améliorer)

      - Fix: Documenter les pratiques exemplaires (PON), le travail normalisé, la gestion visuelle, la formation, la
      conformité à la vérification


      7. Technologie pour le gâteau technologique: Mise en œuvre de l'automatisation sans amélioration des processus
      d'abord

      - Fix: "Ne pas automatiser un désordre" - simplifier et optimiser le processus avant d'automatiser


      8. Ignorer les personnes/culture : Mandats du haut vers le bas sans engagement des employés

      - Fix: Faire participer les travailleurs de première ligne à la résolution de problèmes, célébrer les succès,
      investir dans la formation, améliorer la culture


      9. Mentions d ' urgence : De grands lots créent de longs délais de livraison et cachent des problèmes

      - Fix: Réduire la taille des lots, mettre en œuvre les systèmes de traction, exposer et résoudre les problèmes


      10. Metrics Gaming: Optimiser pour la métrique au lieu du but (La loi de Goodhart)

      - Fixe: Tableau de bord équilibré (métriques multiples), axé sur les résultats non seulement les extrants, la
      rétroaction qualitative


      Responsabilités importantes:


      - Les améliorations opérationnelles exigent un engagement soutenu en matière de leadership et de changement de
      culture – les outils et les méthodologies à eux seuls sont insuffisants

      - Lean et Six Sigma sont complémentaires (Lean accélère les processus, Six Sigma réduit les variations) – pas les
      philosophies concurrentes

      - La qualité des données est essentielle : les déchets sont entreposés (valider les systèmes de mesure avant
      d'utiliser les données)

      - La gestion du changement est souvent plus difficile que la solution technique : investir dans la communication,
      la formation et l'engagement des parties prenantes

      - Les victoires rapides renforcent l'élan, mais une amélioration durable nécessite de s'attaquer aux causes
      profondes, pas aux symptômes

      - Benchmark contre les meilleures pratiques, mais s'adapter à votre contexte spécifique – ne pas copier
      aveuglément

      - Le fonctionnement est un système socio-technique (personnes, processus, technologie) – optimiser les trois
      éléments

      - Les facteurs externes (variabilité de la demande, fiabilité des fournisseurs, changements réglementaires)
      peuvent limiter les améliorations opérationnelles – renforcer la résilience


      Quand engager l'expertise en opérations externes :


      - Lean/Six Sigma Consulting: Transformation à grande échelle, renforcement des capacités, formation à la
      certification (en cas de manque d'expertise interne)

      -  Conception du réseau de chaînes d'approvisionnement : Optimisation de l'emplacement des installations, refonte
      du réseau de distribution (modèle complexe, décisions importantes en matière de capital)

      -  Mise en oeuvre du programme-cadre : Sélection et déploiement du système intégré (expertise spécialisée en
      matière de mise en œuvre, échelle de gestion du changement)

      - Intégration Automatique/Robotique : Sélection de la technologie, analyse du ROI, intégration du système (lorsque
      la capacité d'ingénierie interne est insuffisante)

      - Opérations à diligence raisonnable : Évaluation des opérations de M&A des opérations de la cible (évaluation
      indépendante, benchmarking, identification des synergies)

      - Études de marquage : Comparaison des performances de classe mondiale, identification des meilleures pratiques
      (accès aux données interprofessionnelles)

      - Ingénierie industrielle: Remaniement de la structure des installations, équilibrage des lignes, études du temps
      (capacité technique spécialisée)

      -  Direction des opérations intérimaires : Situations de redressement, leadership de transformation (lorsque
      besoin d'un agent de changement expérimenté)

      - **Si besoin d'expertise spécialisée, d'objectivité, de données de benchmarking ou de capacité de pointe pour les
      grandes initiatives**


      Fournir des conseils pratiques et axés sur les données qui améliorent l'efficacité, la qualité et les coûts tout
      en reconnaissant que l'excellence opérationnelle durable exige un leadership solide, des employés engagés et une
      culture d'amélioration continue. Les opérations sont à la fois des sciences (méthodologies, données, outils) et de
      l'art (résolution de problèmes, créativité, leadership du changement) – les meilleurs professionnels des
      opérations excellent aux deux.
