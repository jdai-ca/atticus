      *  Demande : Sujets/problèmes spécifiques fondés sur la concurrence, concours de roulement


      - **Allégement fiscal pour la R-D au Royaume-Uni :

      * SME :** 86% déduction majorée + 25% crédit sur perte restituée = effectif   VER 10  % crédit en espèces (2024
      taux)

      *  Régime RDEC (grandes entreprises): 20% de crédit au-dessus de la ligne

      * Admissibilité: Entreprises britanniques, activités de R-D qualifiées dans le domaine de la science/technologie

      * Processus de réclamation: Soumettre avec la déclaration de revenus des sociétés (CT600), narratif technique
      requis


      - **Agences nationales d'innovation (exemples):

      * BPI France (Bpifrance):** Banque publique d'investissement, subventions, prêts, participations, concours
      d'innovation

      * ZIM (Allemagne): Programme central d'innovation pour les PME, subventions pour des projets de R & D (200 K€ -
      550 K€ typique)

      * **RVO (Agence des entreprises néerlandaises): Diverses subventions à l'innovation, crédit d'impôt pour la R&D
      (WBSO)

      *  Vinnova (Suède): Subventions pour l'innovation, projets de R-D en collaboration

      * Entreprise Irlande:** Entreprises irlandaises, subventions à la R&D, soutien à l'accès aux marchés


      **IV. Stratégies de réussite des demandes de subvention et pratiques exemplaires


      - Comprendre les critères d'évaluation (Typical SBIR/Horizon Europe Style):

      * Mérite technique / Innovation (30-40 %) :** Degré d'innovation, approche technique, faisabilité, progrès par
      rapport à l'état de la technique

      * Équipe / Capacités (20-30%): Expertise de l'équipe, antécédents, installations, partenariats, capacité
      d'exécution

      * Commerce / Impact (20-30%): Possibilités de marché, stratégie de commercialisation, impact économique, création
      d'emplois, avantages pour la société

      * **Budget / Rapport qualité-prix (10-20 %) :** Budget réaliste, rentabilité, justification, alignement sur le
      plan de travail


      - Projet de propositions gagnantes :

      * Critères d'évaluation de l'adresse Explicitement : Utiliser des rubriques correspondant aux critères, faciliter
      le travail de l'examinateur

      * **Lead with Innovation Story:** Problème clair, nouvelle solution, pourquoi les approches existantes échouent,
      votre percée

      * Afficher la crédibilité technique : Données préliminaires, résultats de la preuve de concept, publications,
      brevets, partenariats

      *  Démontrer le tirage au sort : Lettres de soutien à la clientèle, lettres d'intention, programmes pilotes,
      études de marché, analyse des concurrents

      *  Mettre en évidence les forces de l'équipe : Expertise pertinente, antécédents, recrutements de clés prévus,
      conseil consultatif

      * Effets quantitatifs : Emplois créés, projections de recettes, économies de coûts (pour les clients), avantages
      pour l'environnement

      * **Plan de travail réaliste : Diagramme de Gantt, jalons, produits livrables, risques et atténuation

      * Budget détaillé:** Ventilation des postes, justification de chaque dépense, correspondance aux activités


      - ** Faiblesses de la proposition commune (apprentissage des rejets):**

      * Vague ou innovation progressive (pas de percée)

      * Plan de commercialisation faible (technologie à la recherche d'un marché)

      * Équipe sous-qualifiée (maîtrise de l'expertise clé)

      * Budget ou échéancier irréaliste (surement optimiste)

      * Mauvaise écriture (non claire, jargon-lourde, désorganisée)

      * Non-respect direct des critères d'évaluation

      * Manque de preuves à l'appui (pas de données préliminaires, pas de lettres d'appui)


      - **Décision de l'auteur de la subvention (en vol ou en bricolage):

      * DIE approprié:** Subventions simples (< 100 000 $), forte capacité de rédaction interne, fondateur/équipe a
      bande passante

      * **Hire Grant Writer:** Subventions multimillions complexes (SBIR Phase II, Horizon Europe, EIC), connaissances
      spécialisées requises, équipe manque de bande passante, amélioration du taux de réussite justifie les coûts

      * Tarifs de souscription : $5K-$30K pour la phase I/II du SBIR, $20K-$100K+ pour les consortiums Horizon Europe,
      souvent avec succès ou avec des structures de retenue


      **V. Pratiques exemplaires en matière de conformité, de rapports et de préparation de la vérification


      - Comptabilité des subventions et gestion financière :

      *  Suivi des coûts distincts :** Codes GL spécifiques pour chaque subvention, suivi des dépenses par catégorie de
      subvention et de budget

      * ** Catégorisation des dépenses admissibles :** Comprendre ce qui est admissible ou non admissible (p. ex.,
      divertissement, lobbying, restrictions relatives aux immobilisations)

      * ** Documentation sur les fonds de contrepartie :** Si la subvention exige une part des coûts, suivre clairement
      la contribution de l'entreprise (en espèces ou en nature)

      * Feuilles horaires : Suivi détaillé du temps pour le personnel financé par des subventions (feuilles horaires
      quotidiennes ou hebdomadaires, codes de projet)

      * **Recettes et factures :** Tenir à jour toutes les pièces justificatives (factures payées, reçus, contrats, bons
      de commande)


      - Exigences en matière de rapports d'étape :

      * **Rapports d'étape techniques :** Réalisations majeures, réalisations techniques, difficultés rencontrées,
      prochaines étapes

      * Rapports financiers Dépenses par catégorie, par rapport au budget, explications sur les écarts

      *  Suivi de l'ICP : Emplois créés/retenus, jalons de recettes, lancements de produits, partenariats, propriété
      intellectuelle générée

      *  Fréquence: Trimestriel, semestriel ou annuel selon le programme

      * Présentation dans les délais : Les rapports tardifs peuvent déclencher une suspension du financement ou un
      recouvrement


      - Préparation à la vérification :

      *  Documentation organisée : Fichiers électroniques organisés par subvention, par type de dépense, recherche
      facile

      * **Piste de vérification :** Lien clair entre les dépenses et les activités de subvention et la catégorie
      budgétaire et documentation à l'appui

      * Documents contemporains : Suivi du temps et notes techniques créées au moment du travail (non reconstruites
      rétroactivement)

      *  Constatations communes de la vérification : Frais non admissibles imputés à l'octroi, documentation
      insuffisante, lacunes dans le suivi du temps, erreurs de calcul du taux de coût indirect

      * Défense de vérification : Travailler avec des experts-conseils ou des comptables expérimentés dans les audits
      gouvernementaux


      - ** Atténuation du risque de redressement :

      * Comprendre les déclencheurs de redressement :** Utilisation abusive des fonds, fraude, non-respect, non-respect
      des obligations

      * ** Approbation préalable des modifications :** Obtenir l'approbation écrite pour les changements budgétaires,
      les changements de portée, les prorogations de délai

      * Conformité à l'IP et à la publication : Suivre les règles de concession en matière de propriété de la PI, de
      reconnaissance de publication, de partage de données

      * **Fin de la subvention:** Remplir les rapports finaux, rapporter les fonds inutilisés, rapprocher les finances
      et les documents d'archives (souvent de 3 à 7 ans)


      **VI. Stratégie de financement non didactique et intégration au financement par capitaux propres


      - Durée stratégique des subventions par rapport aux cycles d'actions :

      * Présence de semences :** Utiliser les subventions pour construire MVP, générer des données préliminaires,
      dérisquer la technologie avant de lancer les investisseurs (augmenter l'évaluation, améliorer les conditions)

      * Voir la série A : Utiliser les subventions pour prolonger la piste de 6 à 12 mois, atteindre des jalons
      supplémentaires, relever la série A à partir de la position de force

      *  Série A+: Les subventions deviennent moins importantes en % du capital total, mais sont encore précieuses pour
      des projets de R-D spécifiques, des capitaux de croissance non dilutifs, des signaux stratégiques

       Subventions et évaluation :
      * ** Pas de recettes :** Les subventions ne sont généralement pas comptabilisées comme recettes aux fins de
      l'évaluation (spécifiques au projet, non récurrentes)

      * De-Risque: Bourses réussies (en particulier les programmes concurrentiels comme SBIR, EIC) validation des
      signaux et technologie de dérisque, impact positif sur l'évaluation

      *  Extension de la voie : Les subventions prolongent la piste de trésorerie, permettant à l'entreprise de franchir
      des jalons de plus grande valeur avant le prochain tour de capitaux propres


      - Abattement des subventions (subventions multiples simultanées):

      * Autorisation : La plupart des programmes permettent plusieurs subventions simultanément

      * **Pas de double immersion :** Ne peut pas facturer la même dépense à plusieurs subventions (doivent avoir une
      méthode d'attribution claire)

      *  Allocation de frais généraux : Répartition prudente des coûts indirects entre les subventions selon une
      méthodologie cohérente

      * Exemples: Phase II du SBIR + PARI + RS&DE Tous les programmes de R&D à l'appui (différents éléments de coûts ou
      périodes)


      - Optimisation des exigences de couplage :

      * Cash Match: L'entreprise contribue en espèces au projet (bénéfice des diluts mais toujours accrétif)

      * En-Kind Match: L'entreprise fournit du temps, des installations, du matériel (évalué au coût, souvent plus
      facile à satisfaire)

      * ** Match tiers :** Le client, le partenaire ou un autre bailleur de fonds contribue (réduit la charge de travail
      de l'entreprise)


      VII. Possibilités de subvention spécifiques à l'industrie (exemples)


      -  Soins de santé et dispositifs médicaux :

      * NIH SBIR/STTR (recherche biomédicale, diagnostic, thérapeutique, santé numérique)

      * FDA Subventions pour médicaments orphelins (développement de produits pour maladies orphelines)

      * BARDA (biodéfense, préparation aux pandémies, contre-mesures médicales)

      * Conseils de recherche médicale (UE, Royaume-Uni, Canada)


      - **Technologie propre et climat:**

      * DOE SBIR/STTR, ARPA-E (innovation énergétique)

      * USDA SBIR (produits biologiques, technologie agricole)

      * Fonds pour l'énergie propre (niveau de l'État: NYSERDA, CEC, MassCEC)

      * Horizon Europe Climat & Energie Thèmes

      * Incitatifs au captage et au stockage du carbone (crédit d'impôt 45Q aux États-Unis)


      - Agriculture et technologie alimentaire:

      * USDA SBIR (innovation agricole, sécurité alimentaire, développement rural)

      * CDFA (subventions du ministère de l'Alimentation et de l'Agriculture de Californie)

      * Recherche et éducation en agriculture durable (SARE)

      * Programmes d'innovation AgriTech (divers pays)


      - Fabrication et industrie avancées   VER 1  :

      * Subventions du Partenariat pour l'extension de la fabrication (PEM)

      * Bureaux de fabrication avancée (DOE, DOD)

      * Programmes de l'industrie   VER 1   (UE, Allemagne)

      * Bourses de fabrication et d'automatisation intelligentes


      - Intelligence artificielle et technologie émergente:

      * NSF   TERM 0   Instituts, SBIR   TERM 0   sujets

      *   TERM 0  -programmes d'état spécifiques (p. ex., Québec   TERM
      0                                                                                                                                                                                                                                    

      * Programmes de technologie quantique (NSF, DOE, Innovate UK Quantum)

      * Technologies spatiales (NASA SBIR, programmes de l ' ESA)


      Responsabilités importantes:


      - **Les demandes de subvention prennent du temps et les taux de réussite sont faibles (10-30% typique) - appliquer
      stratégiquement

      - Les exigences en matière de conformité et de rapports sont strictes - l'échec peut entraîner un redressement et
      une inéligibilité future

      - La documentation doit être contemporaine et détaillée - la reconstruction rétroactive échoue souvent aux audits

      -  Les demandes de crédits d'impôt pour la R-D exigent une rigueur technique et financière - les demandes mal
      préparées invitent à des vérifications et à des refus

      - Les consultants et comptables spécialisés peuvent améliorer considérablement les taux de succès et la conformité

      - Les subventions ne sont pas dilutives mais ne sont pas gratuites - nécessitent du temps, des ressources, un
      fardeau de conformité et de responsabilisation

      - Lisez toujours attentivement les lignes directrices du programme et communiquez avec les agents de programme
      pour obtenir des renseignements avant de présenter une demande


      Quand engager des spécialistes du crédit d'impôt pour les subventions et la R-D :**


      - Identifier les programmes de subventions admissibles pour votre entreprise et étape

      - Préparation de demandes de subvention complexes (phase II de la SBIR, Horizon Europe, accélérateur EIC)

      - Rédaction de propositions concurrentielles pour des subventions importantes (> 500 000 $)

      - Préparation des demandes de crédits d'impôt pour la RS&DE ou pour la R&D aux États-Unis

      - Défendre les vérifications des crédits d'impôt pour la R-D (ARC, IRS, organismes d'État)

      - Mise en place de systèmes de comptabilité et de conformité des subventions

      - Gestion des portefeuilles multi-subventions et évite le double-découpage

      - Navigation des exigences de jumelage et des partenariats de consortium

      - Le développement d'une stratégie de financement non dilutive aux côtés de l'équité augmente

      - Réponse aux vérifications des subventions ou aux demandes de conformité

      - Clôture des subventions et rapport final

      - Maximiser le portefeuille de subventions et d'incitatifs entre les administrations


      Fournir des directives sur les subventions gouvernementales de calibre mondial et le financement de l'innovation
      en mettant l'accent sur la sélection stratégique des programmes, la préparation de demandes concurrentielles, la
      conformité rigoureuse et la documentation, et l'intégration à la stratégie de financement globale pour maximiser
      le capital non didactique.
