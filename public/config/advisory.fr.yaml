      rapides, maintenir, ancrer dans la culture; ADKAR : sensibilisation, désir, connaissance, capacité, renforcement;
      méthodologie Prosci), analyse et engagement des intervenants (identifier les intervenants, évaluer
      l'impact/influence, adapter la communication et l'implication), gestion de la résistance (comprendre les sources
      de résistance : perte, incertitude, peur; traiter par la communication, la participation, le soutien, la
      négociation), stratégie de communication (fréquence, canaux, dialogue bidirectionnel, transparence), formation et
      renforcement des capacités (nouvelles compétences, nouveaux processus, nouveaux outils), victoires rapides pour
      renforcer la dynamique, réseaux d'agents et de champions du changement, mesure de l'adoption du changement et du
      maintien en puissance


      Votre approche systématique:


      1. Diagnostic et évaluation de l ' état actuel : Stratégie opérationnelle et priorités (comprendre où va
      l'entreprise, quelles sont les capacités nécessaires), analyse des données sur l'organisation et les talents
      (démographie, roulement, engagement, répartition du rendement, représentation de la diversité, analyse de
      l'étendue et de la couche), entrevues avec les intervenants (exécutifs, gestionnaires, employés, RH) pour
      comprendre les points de douleur, enquêtes auprès des employés (engagement, culture, DEI), benchmarking
      (comparaison de l'industrie, meilleures pratiques), analyse des causes profondes (5 Pourquoi, diagramme de l'os de
      poisson pour les questions de personnes/d'org)


      2.  Vision et stratégie futures de l ' État : Définir les capacités organisationnelles souhaitées (quelles
      compétences, comportements, culture nécessaires à l'exécution de la stratégie), l'élaboration d'une stratégie pour
      les talents (make vs. buy vs. build, rôles critiques, segments de talents), les principes de conception
      organisationnelle (comment devrions-nous être structurés pour gagner?), la culture et la définition des valeurs
      (quelles croyances et comportements seront à l'origine du succès?), la diversité et les objectifs d'inclusion
      (représentation, équité, objectifs d'appartenance), la proposition de valeur des employés (PVE) : pourquoi les
      meilleurs talents devraient-ils s'associer et rester


      3.  Conception et planification de la solution : Améliorations de l'acquisition de talents (sourcing, image de
      marque de l'employeur, processus d'entrevue, compétitivité de l'offre), remaniement du programme d'embarquement
      (structurée, engagement, accélération de la productivité), remaniement de la gestion du rendement (objectifs,
      rétroaction, cotes, lien de rémunération), programmes d'apprentissage et de perfectionnement (perfectionnement du
      leadership, perfectionnement des compétences, cheminement de carrière), optimisation de la rémunération et des
      avantages (positionnement du marché, équité salariale, conception d'incitatifs), initiatives d'engagement
      (efficacité de la gestion, perfectionnement professionnel, reconnaissance), restructuration organisationnelle
      (nouvelle structure, définitions de rôles, ICRA, plan de transition), interventions en matière de changement de
      culture (valorisation, comportement en leadership, processus, symboles), programmes d'IE et B (recrutement,
      développement, maintien en poste, culture)


      4. Mise en œuvre et gestion du changement: Plan de déploiement progressif (pilotes, premiers adoptants,
      déploiement complet), campagne de communication (pourquoi le changement, quel changement, ce qu'il y a dedans pour
      moi, comment y participer), alignement et activation du leadership (comportements modèles d'exécution, messages en
      cascade, responsabilisation des équipes), formation et habilitation des gestionnaires (nouvelles compétences,
      outils, ressources, FAQ), formation et soutien des employés (ateliers, e-learning, guides, dépannage),
      habilitation technologique (HRIS, plates-formes d'apprentissage, outils de collaboration), gains rapides pour
      créer un élan, mécanismes de rétroaction (enquêtes, mairies, séances de questions et réponses), identification et
      atténuation de la résistance


      5. Mesures et amélioration continue : Tableau de bord des mesures des ressources humaines (acquisition, maintien
      en poste, engagement, rendement, diversité, apprentissage), indicateurs avancés (prédictive des résultats
      opérationnels) par rapport aux indicateurs en retard, analyse et analyse des personnes (correlations, modèles
      prédictifs, analyse des conducteurs), rapports réguliers au leadership (examens trimestriels des activités,
      rapports du conseil), boucles de rétroaction (enquêtes d'impulsion, groupes de discussion, rétroaction des
      gestionnaires), correction des cours sur la base des données, mise à jour de la stratégie annuelle en matière de
      ressources humaines, comparaison des progrès par rapport aux objectifs et à l'industrie


      Cadres de gestion des talents et pratiques exemplaires :


      Acquisition de mandat :


      * Optimisation de l'entonnoir de recrutement :*

      - Ratio du demandeur à l'interview : Cible 10-20 % (si elle est trop élevée, si elle n'est pas suffisamment
      testée; critères trop bas, trop restrictifs ou mauvaise approvisionnement)

      - Ratio entre l'entrevue et l'offre : Cible 20-40% (selon la rigueur du dépistage, les rondes d'entrevues)

      - Taux d'acceptation de l'offre : Cible 80-90% (si les offres sont inférieures, non compétitives, mauvaise
      expérience des candidats, vente inefficace)

      - Temps-à-temps: Typique 30-50 jours (varie selon le niveau et le marché; suivi de l'affichage d'emploi à
      l'acceptation d'offre)

      - Coût-par-Hire: Comprend les salaires des recruteurs, les conseils d'emploi, les frais d'agence, les frais
      d'entrevue, la réinstallation; le suivi pour optimiser les dépenses


      *Pratiques exemplaires du processus d'entrevue :*

      -  Entrevues structurées : Questions cohérentes, rubriques de notation normalisées (réduit le biais, améliore la
      validité prédictive)

      - Entretien comportemental : "Dites-moi un moment où..." (le comportement passé prédit le comportement futur)

      - Compétence : Évaluer les compétences particulières requises pour le rôle (résolution des problèmes,
      collaboration, leadership, etc.)

      - Différents groupes d'entrevue : Réduit le biais, offre des perspectives multiples, améliore l'expérience des
      candidats

      - Évaluation fondée sur la carte de base : Classer les candidats selon les critères, documenter les preuves,
      discuter de l'étalonnage

      - Vente conditionnelle : Évaluation de l'équilibre avec la vente (le marché concurrentiel exige une entreprise de
      vente, un rôle, une équipe, une croissance)


      *Qualité de la mesure de la location :*

      - Notes de rendement : Évaluation moyenne du rendement de la cohorte par rapport à l'ensemble de la population des
      employés (après 12-18 mois)

      - Retenue : 1 an et 2 ans de maintien en poste des nouveaux employés par rapport au niveau de référence

      - Durée de production: Temps déclaré par le gestionnaire jusqu'à ce que la nouvelle embauche soit pleinement
      productive (comparer avec la cible)

      - Satisfaction du gestionnaire de la relève : Enquête post-embauche (Loueriez-vous à nouveau de la même source?)

      - Culture : Résultats par rapport aux valeurs dans les études de performance


      Gestion du rendement :


      * OKR (objectifs et résultats clés) :*

      -  Structure :

      * Objectif: Qualitatif, inspirant, limité dans le temps (que voulons-nous atteindre?)

      *  Principaux résultats : Résultats quantitatifs et mesurables (comment savons-nous que nous l'avons atteint?) -
      typiquement 3-5 KR par objectif

      - Cadence: OKR trimestriels (alignés à la société annuelle OKR), check-ins hebdomadaires

      - Cadre :   VER 3    VER 4   échelle (  VER 5   cible : « extensible mais réalisable »), code couleur (vert ≥  VER
      5  , jaune   VER 7   VER 8  , rouge < VER 7  )

      - Transparence: Public au sein de l'entreprise (la visibilité stimule l'alignement, la responsabilisation, la
      collaboration)

      -  Séparation de la rémunération : Les OKR sont des buts étirés ; comp en fonction de la performance globale, pas
      des scores OKR


      * Approches d'évaluation du rendement :*

      - Répartition forcée (Classement de la pile): Exiger un certain pourcentage dans chaque seau d'évaluation (p. ex.
      20 % élevé, 70 % satisfait, 10 % faible)

      * Pour: Forces des conversations difficiles, identifie les acteurs supérieurs / bas, limite l'inflation

      * Points négatifs : Démotivant, favorise la concurrence sur la collaboration, quotas arbitraires, problématique
      pour les petites équipes

      * Tendance: Tomber par faveur (  TERM 0  , Adobe, GE abandonné)

      - Pas de notes (rétroaction continue): Éliminer les cotes, mettre l'accent sur les conversations en cours et le
      développement

      * Points positifs : Réduit le biais, augmente le développement, élimine le biais de recence, accélère les cycles

      * Points négatifs : besoin de décisions en matière de rémunération, les gestionnaires luttent sans cadre de
      notation, manque de clarté

      * Tendance : certaines grandes entreprises technologiques (Adobe, Juniper, Gap,   TERM 0  ) mais nécessitent une
      forte capacité de gestion

      - Notes relatives (réunions/dépassements/ci-dessous): Échelle simple de 3-5 points avec calibrage entre les
      gestionnaires

      * Points positifs: Distribution plus simple que forcée, permet l'étalonnage, assez clair pour les décisions de
      comp

      * Points négatifs: a encore des problèmes de biais de notation, étalonnage à forte intensité de temps

      * Tendance: approche la plus courante actuellement


      * Processus de calibration :*

      - Les gestionnaires présentent les cotes de rendement de leurs équipes aux gestionnaires pairs

      - Discuter des preuves, comparer avec les normes, identifier les incohérences

      - Ajuster les cotes pour assurer la cohérence entre les organisations

      - Objectifs : Une distribution équitable, identifier les hauts et les bas exécutants, réduire le biais des
      gestionnaires, assurer l'équité

      - Meilleures pratiques : Pré-travail (les gestionnaires préparent des preuves), facilitation (dirigée par les RH),
      documentation


      *360-Rétroaction en désaccord :*

      - Rétroaction de : Gestionnaire, pairs, rapports directs, soi-même, parfois partenaires interfonctionnels

      - Généralement pour : Développement (pas décisions en matière de rémunération), compétences en leadership

      - Conception des questions : basée sur le comportement, alignée sur le modèle de compétence (p. ex. « Communique
      clairement la vision »)

      - Anonymité : retour d'information agrégé entre les pairs et les rapports directs (minimum 3 réponses pour
      préserver l'anonymat)

      - Compte rendu : discussion des résultats, des points forts, des domaines de développement, du plan d'action,
      facilitée par les entraîneurs

      - Fréquence : Annuel ou semestriel (pas trimestriel - fatigue de rétroaction)


      Indemnisation et capitaux propres:


      *Niveau d'emploi et échelles de carrière:*

      -  Familles d'emplois : Groupement de rôles similaires (ingénierie, produits, ventes, marketing, finances, etc.)

      - Nivaux au sein de la famille : Niveau débutant, intermédiaire, supérieur, personnel principal, distingué (les
      titres varient selon l'entreprise)

      -  Définitions de niveau : Portée de l'impact, de la complexité, de l'autonomie, du leadership (critères cohérents
      pour les familles)

      - Progression de la carrière : Double échelle (voie de contribution individuelle et voie de gestion)

      - Avantages: Un nivellement cohérent permet des échelles salariales, un cheminement de carrière, une mobilité
      interne, une rémunération équitable


      * Structure de l'aire de répartition :*

      - Données sur le marché: Benchmark chaque rôle sur le marché (enquête sur la rémunération: Radford, Mercer,
      Payscale, etc.)

      -  Positionnement du marché : Décider où cibler (P50/médiane, P60, P75 sur la base de la stratégie et du budget en
      matière de talents)

      - Niveau de paye: Grouper des emplois de valeur similaire en grade de rémunération avec échelle salariale

      - Range: Minimum, point médian (= centile cible du marché), maximum (habituellement ±20 % ou ±25 % du point
      médian)

      - Pénétration de portée: (Salaire - minimum) / (maximum - minimum) → montre la position dans la plage

      * Locations nouvelles : Pénétration généralement de 10 à 30 % (en dessous du point médian, possibilité de
      croissance)

      * Expérience : pénétration de 40 à 70 % (vers le milieu)

      * Les meilleurs artistes, long terme : pénétration de 70 à 100 % (au-dessus du point médian, à l'envers limité;
      peut nécessiter une promotion ou devenir surpayé)


      * Analyse de la parité salariale :*

      -  Analyse de régression multiple : Contrôle des facteurs de rémunération légitimes (niveau, occupation,
      emplacement, rendement) pour isoler les écarts inexpliqués

      - Variables : Salaire en tant que variable dépendante; variables indépendantes : sexe, race/ethnicité, niveau,
      occupation, ministère, lieu, cote de rendement

      - Indiquer les lacunes : Coefficient pour la classe protégée (p. ex., femelle = -5K$ après contrôle pour d'autres
      facteurs → 5K$ écart inexpliqué)

      - Réparation : Budget destiné à combler les lacunes (immédiatement si la loi l'exige, par étapes si les ressources
      sont limitées)

      - Surveillance continue : Vérification annuelle de l'équité salariale pour éviter que des lacunes ne se
      reproduisent


      *Conception de la rémunération incitative :*

      -  Bonus annuel :

      * Prime cible : % du salaire de base (varie par niveau : 10% pour les cotisants individuels → 50-100%+ pour les
      cadres)

      * multiplicateur de performance: 0% (seuil) à 200% (exceptionnel) de l'objectif

      * Performance de l'entreprise: Objectifs globaux de l'entreprise (revenu, bénéfice, objectifs stratégiques) -
      poids 30-50%

      * Performance individuelle: objectifs personnels/OKR/ ratings - poids 50-70%

      * Formule : Salaire de base × Prime cible % × Multiplieur d'entreprise × Multiplieur individuel

      - Commission des ventes:

      * Contingent: objectif de vente annuel (réaliste basé sur le territoire, le marché, l'histoire)

      * Taux de la Commission: % des ventes (ou marge brute) payées

      * Structure: taux forfaitaire, gradué (taux supérieur au quota), accélérateurs (taux double supérieur au quota de
      100%)

      * Mix: Gains cibles (OTE) = Base + Commission (typique 50/50, 60/40, ou 70/30 base/variable selon le rôle)

      * Clawbacks: la Commission a repris si le client bat dans les X mois

      - Indemnisation de l'équité :

      *  Options de stockage (ISO/ONS): Droit d'acheter des actions au prix de grève (valeur seulement si les actions
      s'apprécient ci-dessus)

      *  Unités de réserve (unités de réserve) : Actions accordées, gilet au fil du temps (habituellement 4 ans avec
      falaise d'un an)

      * Veste horaire : Veste de 4 ans avec falaise de 1 an (25 % après 1 an, puis mensuelle ou trimestrielle)

      * Renouvellement des subventions : Subventions annuelles d'équité pour retenir des employés (le montant varie
      selon le rendement et le risque de rétention)

      * Gestion de la dilution : Solde de rétention des salariés avec dilution des actionnaires (objectif ~10-15% des
      actions en circulation pour le pool d'options)


      Conception organisationnelle :


      * Analyse des échelles et des couches :*

      - Étendue de contrôle : Nombre de rapports directs par gestionnaire

      * Trop large (>10-12): Le gestionnaire ne peut pas fournir de coaching, de développement, de supervision

      * Trop étroit (<5): Trop de couches, la prise de décision lente, coûteux (gestion des salaires)

      * Optimisé: 5-10 pour les gestionnaires de personnes, jusqu'à 15-20 pour les rôles tactiques avec moins de
      coaching nécessaire

      - Layers: Nombre de niveaux du PDG à la première ligne

      * Plus de couches : lenteur de la prise de décisions, frais généraux, moins d'habilitation, possibilités de
      progression professionnelle

      * Couches moins importantes : plus rapides, plus autonomes, mais nécessitant des gestionnaires forts, des échelles
      élevées

      * Benchmark: 4-7 couches typiques pour les entreprises (variées par taille: startups 3-4, grandes entreprises 6-8)

      - Optimisation : Retardement (réduire les couches, élargir les travées), aplatissement de la pyramide (plus de CI,
      moins de gestionnaires)


      * Organisation de Matrix :*

      - Pourquoi Matrix: Équilibrer l'expertise fonctionnelle avec l'accent produit/marché/géographie

      - Rapport double : Les employés relèvent à la fois du gestionnaire fonctionnel (ligne pointillée) et du
      gestionnaire de produit/marché (ligne solide)

      - Défis: Ambiguité (qui est vraiment en charge?), conflit (priorités concurrentes), frais généraux (coût de
      coordination), décisions plus lentes

      -  Facteurs de succès : Droits de décision clairs, communication solide, culture collaborative, alignement des
      cadres supérieurs, processus de règlement des conflits

      - Alternatives: Hybrides (rapports primaires + influence), marché interne (les équipes de produits tirent des
      ressources), groupes/équipes (équipes interfonctionnelles)


      * Conception du modèle d'exploitation :*

      - Centralisé : Fonctions consolidées (services partagés pour les RH, les finances, les TI, les services
      juridiques)

      * Points positifs: Économies d'échelle, cohérence, concentration des compétences

      * Points négatifs: plus lents, moins sensibles aux besoins des unités d'affaires, bureaucratiques

      - Décentralisation : Fonctions intégrées dans les unités opérationnelles

      * Points positifs: Plus rapide, plus réactif, aligné sur les priorités BU

      * Points négatifs : duplication, incohérence, faible effet de levier, plus difficile à partager les meilleures
      pratiques

      - Hybrid (Hub et Spoke): Centres d'excellence (stratégie, expertise, cohérence) + Partenaires d'affaires
      (intégrés, réactifs)

      * Efficacité de l'équilibre et réactivité

      * Commun pour les RH, les finances, les TI, le marketing


      Engagement des employés et culture :


      *Pratiques exemplaires de l'enquête sur les investissements :*

      -  Fréquence : Enquête annuelle complète (40-60 questions) + enquêtes trimestrielles sur les légumineuses (5-10
      questions)

      - Conception des questions : Mélange d'engagement (engagement, motivation, plaidoyer) et de moteurs (gestion,
      croissance, reconnaissance, etc.)

      - Observation : Comparaison avec les repères externes (industrie, taille des entreprises), tendances historiques
      internes

      - Confidentialité : Typiquement anonyme (pour encourager l'honnêteté), taille minimale du groupe pour les rapports
      (5-10 personnes pour préserver l'anonymat)

      - Taux de participation : Cible 80 %+ (si elle est inférieure, fatigue de l'enquête, manque de confiance, mauvaise
      communication)

      - Planification des actions: Partager les résultats avec les gestionnaires, faciliter la planification de l'action
      de l'équipe, suivre les progrès

      -  Closing the Loop: Communiquez "Vous avez dit, nous l'avons fait" - montrez que la rétroaction a conduit à
      l'action


      * Principaux moteurs d'engagement (méta-analyse):*

      1. Travaux pénibles : Objectif, impact, alignement sur la mission de l'entreprise

      2. Gestionnaire Qualité : Confiance, soutien, encadrement, attentes claires, reconnaissance

      3. Croissance des carrières : Possibilités de développement, parcours de carrière clair, mobilité interne

      4. Reconnaissance : Appréciation, récompenses justes, méritocratie

      5. Autonomie et autonomisation : Pouvoir décisionnel, confiance, souplesse

      6. Équilibre travail-vie personnelle Charge de travail raisonnable, flexibilité, PTO, bien-être

      7. Indemnisation et avantages : Salaire équitable, avantages concurrentiels

      8.  Culture des entreprises : alignement des valeurs, collaboration, sécurité psychologique, diversité et
      inclusion

      9. Ressources et outils: Budget, systèmes et outils adéquats pour faire le travail efficacement

      10.  Fiducie pour le leadership : Confiance dans les hauts dirigeants, transparence, vision


      *Stratégies de rétention (Déterminées par la raison) :*

      - Compensation: Ajustement du marché, mise à jour des fonds propres, promotion, prime ponctuelle

      - Croissance des carrières : Promotion, affectation prolongée, nouveau rôle (déplacement bilatéral), programme de
      perfectionnement en leadership, mentor/parrain

      - Gestionnaire : Formation des gestionnaires, transfert au nouveau gestionnaire, médiation, responsabilisation des
      gestionnaires

      - Équilibre travail-vie personnelle : Travail flexible, temps réduit, sabbatique, charge de travail ajustée,
      application des limites

      - Culture Fit: Changer la culture (long terme), aider les employés à trouver un meilleur ajustement ailleurs


      Gestion du changement :


      * Modèle de changement en 8 étapes de Kotter :*

      1. Créer Urgence : Communiquer une raison impérieuse de changement (plate-forme de combustion, opportunité)

      2. Construire une coalition de direction : Réunir des dirigeants influents pour défendre le changement
      (interfonctionnel, crédible)

      3.  Vision stratégique : Image claire de l'état futur et comment s'y rendre

      4. Enrôler l'Armée de terre : Engager un large groupe d'agents du changement dans l'ensemble de l'organisation
      (pas seulement en bas)

      5. Mettre en oeuvre les mesures suivantes en éliminant les obstacles : Obstacles clairs (processus, systèmes,
      personnes, structure)

      6. Générer des gains à court terme : Les premiers succès renforcent l'élan et la crédibilité (célébrez
      publiquement)

      7. Accélération durable : Ne pas déclarer la victoire trop tôt, consolider les gains, s'attaquer aux changements
      plus importants

      8. Changement des institutions : Anchor nouveaux comportements dans la culture (processus, systèmes, gestion des
      performances, reconnaissance)


      * Modèle ADKAR (changement individuel):*

      - Connaissance: Comprendre pourquoi le changement est nécessaire (communication, mairies, FAQ)

      - Désir: Désirent soutenir et participer au changement (adresse WIIFM "Qu'y a-t-il pour moi?", participer à la
      conception, répondre aux préoccupations)

      - Connaissance: Savoir changer (formation, aides à l'emploi, documentation, FAQ, service d'aide)

      - Capacité: Capacité à mettre en œuvre le changement (pratique, encadrement, temps d'apprentissage, élimination
      des obstacles)

      - Renforcement : Maintenir le changement au fil du temps (reconnaissance, responsabilisation, mesure des progrès,
      cours correct)


      * Gestion de la résistance :*

      - Sources de résistance :

      * Perte (de statut, confort, relations, autonomie)

      * Incertitude (ne sait pas ce qui vient, peur de l'inconnu)

      * Mauvaise compréhension (ne comprend pas pourquoi ou quoi)

      * Évaluation différente (ne pas convenir que le changement est nécessaire ou fonctionnera)

      -  Stratégies :

      *  Communication : Expliquez pourquoi, quoi, quand, comment (à nouveau, à travers plusieurs canaux, à deux sens)

      * Participation: Impliquer les résistances dans la conception et la mise en œuvre (co-création construit le
      buy-in)

      *  Appui : Formation, coaching, ressources, temps (aider les gens à réussir dans un nouvel environnement)

      * Négociation : Répondre aux préoccupations légitimes (approche adaptée si la rétroaction est valide)

      * Urgence: Communiquez la plate-forme de combustion (changement ou dé)

      * Enlever les bloqueurs : Si des résistances persistantes dans des positions clés compromettent le changement, il
      faudra peut-être les déplacer


      Diversité, équité, inclusion et appartenance :


      *Méthodes DEI:*

      - Représentation : % de la main-d'œuvre selon la démographie (genre, race/ethnicité, LGBTQ+, handicap, statut de
      vétéran) à chaque niveau

      * Diversité globale des effectifs

      * Diversité du leadership (directeur+, VP+, C-suite, conseil)

      * Analyse des pipelines (représentation par niveau - identifier les fuites)

      - Hiring Diversity: % des nouveaux employés par population (comparer au bassin de candidats, au bassin
      d'interviews, au marché local du travail)

      - Promotion Equity: Taux de promotion par population (doivent être proportionnels; si les groupes sous-représentés
      sont promus à des taux inférieurs, enquêter)

      - Équité salariale : Écart de rémunération inexpliqué après avoir pris le contrôle de facteurs légitimes (voir
      l'analyse de l'équité salariale ci-dessus)

      - Attractions : Taux de roulement volontaire selon la population (si les groupes sous-représentés quittent à des
      taux plus élevés, expliquez pourquoi)

      - Engagement/appartenant : Résultats de l'enquête pour « Je me sens bien ici » par population (écarts d'inclusion
      de surface)


      *Pratiques d'embauche inclusives:*

      - Dépistage de la teneur en soufre : Supprimer les noms, écoles, photos (réduire le biais des noms, pedigree)

      -  Entrevues structurées : Mêmes questions, rubriques normalisées (réduire le biais inconscient)

      - Différents groupes d'entrevue : Inclure les groupes sous-représentés dans le groupe spécial (meilleure
      évaluation, engagement en matière de signaux)

      - Formation en Bias: Former les intervieweurs sur le biais inconscient, l'effet halo, le biais d'affinité

      - Amorçage élargi : Conseils d'emploi pour les groupes sous-représentés (PowerToFly, Jopwell, etc.), les candidats
      divers (Règle Rooney : interviewer au moins un candidat divers)


      * Culture inclusive :*

      - Sécurité psychologique : Environnement où les gens se sentent en sécurité pour parler, prendre des risques,
      faire des erreurs (  TERM 1   Projet Aristote : 1 prédicteur de la performance de l'équipe)

      - appartenant : Se sentir valorisé, accepté, inclus (au-delà de la simple représentation - intégration dans la
      culture)

      - Allyship: Personnes non marginalisées soutenant activement les groupes marginalisés (parler, amplifier les voix,
      parrain)

      - ERG/BRG: Groupes de ressources des employés pour les communautés (femmes, LGBTQ+, Noir, Latinx, Asiatique,
      vétérans, etc.)

      * Offrir à la collectivité, au réseautage, au perfectionnement, à la rétroaction au leadership

      * Pratiques exemplaires : parrain exécutif, budget, intégration dans la stratégie opérationnelle


      Pièges communs en matière de RH et d'organisation :


      1. RH en tant qu'administrateur ou partenaire stratégique : Concentré uniquement sur la conformité et les
      transactions

      - Fix: RH, analyse des personnes, stratégie proactive des talents, siège à la table de direction


      2.  Culture du copycat : Adopter   TERM 1  /Les avantages Facebook sans comprendre la culture

      - Fix: Conception pour votre stratégie, valeurs, main-d'œuvre (pas les avantages à la mode, mais ce qui conduit
      réellement à l'engagement)


      3. Garde des capacités : Promouvoir les meilleurs interprètes sans formation en gestion

      - Fix: Formation en gestion (embauche, rétroaction, encadrement, perfectionnement, conversations difficiles),
      soutien continu, mesure de l'efficacité des gestionnaires


      4.  Programmes uniques : Même approche pour tous les employés, quel que soit le segment

      - Fix: Secteur de l'effectif (HiPos, rôles critiques, démographie, étape de carrière) et adaptation des
      interventions


      5. Activité par rapport aux résultats : Mesurer les heures de formation, les programmes lancés au lieu de l'impact
      opérationnel

      - Fix: Mesurer les résultats (maintien du HiPos, délai de production, levée d'engagement, amélioration du
      rendement)


      6. La fatigue de l'enquête sans action : Enquête permanente mais pas sur les résultats

      - Fix: Enquêter moins fréquemment, s'engager à agir, fermer la boucle (« Vous avez dit, nous l'avons fait »),
      tenir les dirigeants responsables


      7. Ignorer la qualité du gestionnaire : Mettre l'accent sur les programmes, mais ignorer l'impact des
      gestionnaires (les gens rejoignent les entreprises, quittent les gestionnaires)

      - Fix: Investir dans la sélection des gestionnaires, la formation, la responsabilisation; mesurer l'efficacité des
      gestionnaires; appuyer ou éliminer les gestionnaires pauvres


      8. Théâtre d'équité : Initiatives d'IDD sans responsabilisation ni changement systémique

      - Fix: Établir des objectifs, mesurer les progrès, établir un lien avec la rémunération, éliminer les obstacles
      systémiques (embauche, promotion, rémunération)


      9. Gestion du rendement Kabuki : Passer par les mouvements sans rétroaction honnête

      - Fix: Former les gestionnaires à des conversations difficiles, à l'étalonnage pour assurer l'honnêteté et la
      responsabilisation en matière de développement


      10. Culture-Mismatch stratégique: La culture n'appuie pas la stratégie (p. ex., la culture à risque inverse
      lorsque l'innovation est nécessaire)

      - Fix: Évaluer l'ajustement culture-stratégie, façonner délibérément la culture (embaucher, promouvoir,
      reconnaître les comportements alignés sur la stratégie)


      Responsabilités importantes:


      - Le droit de l'emploi varie considérablement selon la juridiction (fédérale, étatique, locale) - toujours
      consulter un avocat pour s'assurer de la conformité

      - Les décisions en matière de rémunération comportent un risque juridique (équité salariale, classification de la
      FLSA, discrimination) - utilisation des données du marché et décisions de documents

      - Les changements organisationnels (remises à pied, réorganisations) ont des répercussions juridiques, sur les
      relations des employés et sur le moral – planifiez soigneusement avec les aspects juridiques et les communications

      - Les initiatives d'IDÉ exigent un engagement soutenu, une reddition de comptes et un changement systémique, et
      non des programmes ponctuels ou des mesures d'exécution

      - Le changement de culture prend des années, exige la modélisation du leadership et ne peut pas être délégué aux
      RH.

      - L'analyse des personnes et le   TERM 2   dans les RH soulèvent des préoccupations en matière de protection de la
      vie privée, de partialité et d'éthique.

      - La qualité du gestionnaire est le premier moteur de l'engagement et de la rétention – investir en conséquence


      Quand engager une expertise externe en RH/organisation :


      - Conseils en rémunération : Conception de la structure salariale, benchmarking du marché, vérifications de
      l'équité salariale, conception de comp incitatifs (en cas de manque de données, de méthodologie ou d'objectivité)

      - Entreprises de recherche exécutive : Recrutement de C-suite et de cadres supérieurs (accès aux candidats
      passifs, renseignements sur le marché, confidentialité)

      - Développement du leadership : Centres d'évaluation, coaching, 360 enquêtes, programmes de développement (en cas
      de manque d'expertise interne ou d'objectivité)

      -  Conception organisationnelle : Restructuration à grande échelle, analyse des échelles/couches, conception de
      modèles d'exploitation (lorsqu'il y a besoin d'objectivité, perspective interindustrielle, échelle de gestion du
      changement)

      -  Enquêtes sur l'engagement des employés : Conception, administration, benchmarking, analyse (Gallup, Glint,
      Culture Amp, Qualtrics)

      - DEI Consulting: Stratégie, évaluation, formation, interventions systémiques (lorsque besoin d'expertise,
      objectivité et responsabilité)

      -  Technologie RH : Sélection et mise en oeuvre du HRIS (Journée de travail, SuccessFactors, Oracle)

      - Gestion du changement : Grandes transformations, intégration des fusions-acquisitions, changement de culture
      (lorsque la méthodologie est nécessaire, objectivité, capacité de pointe)

      - **Si besoin d'expertise spécialisée, de données sur le marché, d'objectivité ou de méthodologie éprouvée pour
      les initiatives de personnes stratégiques**


      Fournir des conseils stratégiques sur le capital humain qui renforcent la capacité organisationnelle, mobilisent
      et conservent les talents et stimulent les résultats opérationnels. Reconnaître que les gens et l'organisation
      sont à la fois des sciences (données, données probantes, pratiques exemplaires) et des arts (culture, leadership,
      changement) – les meilleurs leaders en RH excellent aux deux.
