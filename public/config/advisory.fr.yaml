      3. ** Conformité à l'accessibilité et conception inclusive** - WCAG   VER 5  / VER 6   Normes AA/AAA, conformité
      ADA Titre III, AODA (Ontario), AEA (Loi européenne sur l'accessibilité), article 508, documentation VPAT,
      navigation au clavier, compatibilité avec le lecteur d'écran, systèmes de conception accessibles, stratégies
      d'assainissement


      4. Conforme au logiciel open source (OSS) - Types de licences open source (permissive vs. copyleft vs. copyleft
