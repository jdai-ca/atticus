      IX. Mesures et repères en matière de fusion-acquisition


      - ** Multiples de valorisation (médiane par secteur, 2023-2024):**

      * Technologie (logiciel): EV/Revenu 5-10x, EV/EBITDA 15-25x (forte croissance, SaaS commandes de revenus
      récurrents premium)

      * Soins de santé: EV/EBITDA 12-18x (varie largement par segment: pharmaco, appareils, services)

      * Industriel/Fabrication: EV/EBITDA 8-12x (cyclique, à forte intensité de capital)

      * Consommateur/retail: EV/EBITDA 8-14x (résistance de la marque, capacités omnicanal drive premium)

      * Services financiers : P/E 10-15x, P/Book 1-2x (réglementation, capital intensif)

      * Note : Les multiples varient considérablement selon le taux de croissance, la rentabilité, la position sur le
      marché, les revenus récurrents


      - ** Prime de contrôle (acquisitions de sociétés publiques) :**

      * Prime de contrôle moyenne: 20-40% par rapport au cours de l'action non affectée (préannonce)

      * Prises de contrôle hostiles : primes souvent plus élevées (30-50%+)

      * Négociations amicales : Primes moins élevées (15-25 %)


      - **Taille de la synergie (en % des recettes cibles):**

      * Gamme typique: 5 à 25% des recettes cibles ( synergies annuelles)

      * Les synergies de coûts : Plus certain, généralement 70 à 85 % des synergies totales

      * Les synergies de revenus: moins certaines, généralement 15-30% du total des synergies

      * Meilleures affaires en classe : 20-30% de synergies, réalisées en 3 ans


      - Durée de l'intégration:

      * Intégration fonctionnelle: 12-24 mois (systèmes, processus, structure)

      * Intégration culturelle : 2-3 ans (normes, identité, assimilation complète)

      * Intégration des systèmes informatiques: 6-18 mois (systèmes de base), 18-36 mois (paysage complet)


      - Méthodes de réussite de l'intégration :

      * Maintien en poste des employés (cadres cibles) : 80 à 90 % de maintien en poste pendant la première année est
      élevé

      * Conservation des clients : 90-95% + rétention des meilleurs clients

      * Réalisation synergique : 90-100 % des synergies engagées réalisées d'ici la troisième année

      * Croissance des revenus : Maintenir ou dépasser le plan autonome

      * Intégration culturelle : les résultats de l'engagement des employés reviennent aux niveaux d'avant les épreuves
      par année 2


      - **Taux de réussite (création de valeur) :**

      * Études universitaires: 50 à 70 % des transactions ne créent pas de valeur pour les actionnaires acquéreurs

      * Raisons communes de l'échec : trop-payé, mauvaise intégration, conflit culturel, inadéquation stratégique

      * Meilleures performances : justification stratégique claire, évaluation disciplinée, excellente exécution
      d'intégration


      **X. Stratégies particulières de M&A et de sortie pour le démarrage


      - Acqui-Hire Transactions :

      * Raison:** L'acheteur veut des talents (équipe d'ingénierie, équipe de produits), pas des produits/clients

      * Typical Price: 1-5 M$ total (500 K$-1 M$ par ingénieur), parfois plus pour les équipes exceptionnelles

      * Structure: Achat d'actifs (IP + employés), l'entreprise s'effondre après la transaction

      *  Traitement des employés : Primes de maintien en poste (12-24 mois), subventions d'actions dans les rôles
      d'acquéreur, d'ingénieur (pas de leadership)

      * Résultats de la fondation : Souvent rejoindre l'acquéreur en tant que contributeurs individuels ou gestionnaires
      de niveau intermédiaire, pas C-suite

      * ** Retours des investisseurs :** Souvent en dessous de la préférence (< 5 M$ de sortie renvoie rarement
      l'investissement du fonds de CR)


      -  Optimisation fiscale pour les sorties de démarrage :

      * **QSBS (US - IRC Section 1202) :**

      - Qualification : C-Corp, actifs bruts de 50 M$ lors de l'émission d'actions, période de détention de 5 ans,
      activité active (pas investissement passif)

      - Avantage : exclusion de 100 % des gains en capital fédéraux (jusqu'à 10 M$ ou 10x selon le coût, le plus élevé
      étant retenu)

      - Planification: DOIT planifier à la constitution en société et l'émission d'actions (ne peut pas fixer
      rétroactivement)

      - Traitement de l'État: CA n'honore pas l'exemption QSBS (toujours imposable), la plupart des États font

      * LCGE (exemption des gains en capital à vie au Canada)

      - Avantage : ~1 M$ CAD Exemption des gains en capital pour les actions admissibles de petite entreprise (QSBC)

      - Qualification : SPCC (Société privée sous contrôle canadien), 90 % et plus actifs actifs, 50 % et plus actifs
      actifs actifs pendant 24 mois

      - Planification: Purifier la société (supprimer les actifs passifs) avant la vente, structure comme vente
      d'actions (pas la vente d'actifs)

      - Exemption multiple : Chaque actionnaire (y compris les membres de la famille) peut utiliser la LCGE, de sorte
      que les fiducies familiales ou les actions conjugales peuvent multiplier l'exemption

      * ** Vente de stocks et d'actifs :** Les acheteurs préfèrent souvent les achats d'actifs (dépôt de base, actifs de
      cerises, éviter les passifs), mais les vendeurs préfèrent les ventes d'actions (traitement QSBS/LCGE, impôt à un
      seul niveau)


      - Structures de gains pour les startups :

      *  Objet : Écart d'évaluation des ponts, mécanisme de rétention, alignement des incitations des vendeurs sur les
      résultats après fermeture

      * Typical Terms: 1-3 ans, 20-40% de la contrepartie totale, liée aux revenus, EBITDA, jalons de produit, ou
      conservation

      * Risques pour les vendeurs: L'acheteur contrôle les activités post-fermeture (peut manipuler les gains), risque
      de litige, ambiguïté de mesure, fardeau de conservation

      * Conseils de négociation : Définitions claires (comment mesurer, ce qui compte), droits d'audit, engagements de
      l'acheteur (opérer en cours de route ordinaire, de bonne foi), accélération du changement de contrôle ou de
      résiliation sans cause

      *  Traitement fiscal : Revenu ordinaire si conditionné à l'emploi, gain en capital si lié uniquement à la
      performance de l'entreprise (questions de structure)


      - OPI c. Cadre décisionnel d'acquisition :

      * Avantages de l'IPO : Maintenir le contrôle (fondateur/gestion), évaluation potentiellement plus élevée
      (multiples de marchés publics), liquidité en cours (après lock-up), valeur de la marque/recrutement, monnaie pour
      les acquisitions

      * **IPO Inconvénients :** Charges des entreprises publiques (conformité SOX, pressions trimestrielles sur les
      bénéfices, exigences de divulgation), coûts (5-10 millions de dollars + coûts des offices de propriété
      intellectuelle, 2-5 millions de dollars de conformité annuelle), période de fermeture (6 mois), risque de
      calendrier du marché

      * Acquisition Avantages : Certitude (prix d'achat définitif), liquidité immédiate (en espèces à faible ou à faible
      revenu), accès aux ressources (force de vente de l'acheteur, infrastructure, marque), transfert de risque
      (l'acheteur assume le risque commercial)

      * Acquisition Inconvénients : Perte de contrôle, changement de culture, risque d'intégration (intégration
      produit/équipe dans une grande entreprise), incertitude sur les gains, conditions d'emploi (souvent de 2 à 4 ans)

      * Deuxième processus de suivi : Poursuivre l'OPI et l'acquisition en même temps pour l'optionnalité et l'effet de
      levier (faible ressources, nécessite des banquiers expérimentés)


      Responsabilités importantes:


      - **Les opérations de M&A sont complexes et nécessitent des conseillers professionnels expérimentés

      - Les banquiers d'investissement sont essentiels pour l'évaluation, la structuration des transactions, la
      négociation et la gestion des processus

      -  Un conseiller juridique en gestion est requis pour la diligence raisonnable, la négociation d'une entente
      d'achat, les approbations réglementaires et la clôture

      - Les conseillers fiscaux sont essentiels pour la structuration fiscale, l'optimisation de QSBS/LCGE et la
      réduction des fuites fiscales

      - Les consultants en intégration peuvent accélérer le PMI et améliorer la réalisation des synergies (Big 4, les
      entreprises d'intégration de boutiques)

      - Les taux de réussite pour les fusions-acquisitions sont modestes (50-70% créer de la valeur), rendant l'approche
      disciplinée critique

      - L'intégration est là où la valeur est gagnée ou perdue - planifier tôt, exécuter avec discipline, suivre les
      synergies rigoureusement

      - L'intégration culturelle est souvent sous-estimée mais essentielle à la conservation et à la création de valeur

      - Les sorties de démarrage ont des considérations uniques (QSBS, gains, acqui-locations) - obtenir un conseil
      spécialisé


      Quand engager des conseillers en M et A :**


      - Élaborer une stratégie de fusion-acquisition ou envisager des acquisitions

      - Évaluation des objectifs d'acquisition ou des intérêts d'acquisition reçus

      - Faire preuve de diligence raisonnable en ce qui concerne les objectifs d'acquisition

      - Négocier une lettre d'intention ou un accord d'achat définitif

